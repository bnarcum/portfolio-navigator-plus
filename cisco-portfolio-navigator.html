/* ════════════════════════════════════════════════════════════════════════
   [15a] ADAPTIVE SEARCH PLACEHOLDER

   The search input shares the main topbar row with logo, view-mode
   segmented control, category pills, and two dropdowns — Reset, Guided
   Plan, and Account Planner live on a separate action bar below. The
   search box ends up with whatever's left (often ~260–340 px on 1280–
   1440 px windows). The full "Search products, models, use cases…"
   placeholder doesn't fit and gets clipped without an ellipsis (CSS
   text-overflow doesn't apply to placeholders).

   Solution: ResizeObserver on .sw swaps to progressively shorter
   placeholder text as the rendered input narrows. Three tiers,
   chosen so each tier comfortably fits at 13 px font-size:
     ≥ 360 px → full hint
     ≥ 240 px → medium hint
     <  240 px → short hint
   The full hint is also exposed via `title` so power users can
   hover the input for the long-form description.
   ════════════════════════════════════════════════════════════════════════*/
function wireAdaptivePlaceholder(){
  const inp = $("#search");
  const sw  = document.querySelector(".sw");
  if (!inp || !sw || typeof ResizeObserver === "undefined") return;
  const PLACEHOLDERS = [
    {min: 360, text: "Search products, models, use cases…"},
    {min: 240, text: "Search products & families…"},
    {min: 0,   text: "Search…"}
  ];
  const FULL_HINT = "Search products, models, use cases — try a model name, family (ISE, Meraki), or use case (zero trust, AI networking)";
  inp.setAttribute("title", FULL_HINT);
  inp.setAttribute("aria-label", FULL_HINT);
  const apply = (w) => {
    const next = PLACEHOLDERS.find(p => w >= p.min).text;
    if (inp.placeholder !== next) inp.placeholder = next;
  };
  // Initial sync (ResizeObserver fires once on observe in modern browsers, but be safe)
  apply(sw.getBoundingClientRect().width);
  const ro = new ResizeObserver(([entry]) => apply(entry.contentRect.width));
  ro.observe(sw);
}

function syncTopbarHeight(){
  const chrome = document.getElementById("app-chrome");
  if (!chrome) return;
  document.documentElement.style.setProperty("--topbar-h", chrome.offsetHeight + "px");
}
function wireTopbarHeightSync(){
  const chrome = document.getElementById("app-chrome");
  if (!chrome || typeof ResizeObserver === "undefined") return;
  syncTopbarHeight();
  const ro = new ResizeObserver(() => syncTopbarHeight());
  ro.observe(chrome);
  window.addEventListener("resize", syncTopbarHeight);
}

/* ════════════════════════════════════════════════════════════════════════
   [14] RIGHT-CLICK context menu
   ════════════════════════════════════════════════════════════════════════*/
function buildContextMenu(){
  const m = document.createElement("div");
  m.id = "ctx-menu"; m.setAttribute("role","menu");
  document.body.appendChild(m);
  // Attach right-click handler to D3 nodes
  ndEl.on("contextmenu", function(ev, d){
    ev.preventDefault();
    const inStk = stack.has(d.id);
    const pinned = lsGet(STORAGE_KEYS.pinned, []).includes(d.id);
    m.innerHTML = `
      <button class="ctx-i" data-act="open">↗ Open details</button>
      <button class="ctx-i" data-act="${inStk?"remove":"add"}">${inStk?"✕ Remove from stack":"+ Add to stack"}</button>
      <button class="ctx-i" data-act="cmp">⇆ Add to compare</button>
      <button class="ctx-i" data-act="pin">${pinned?"☆ Unpin":"★ Pin"}</button>
      <div class="ctx-sep"></div>
      <button class="ctx-i" data-act="connections">↦ Connections only (filter)</button>
      <button class="ctx-i" data-act="cat">◉ Category only (filter)</button>
      <button class="ctx-i" data-act="copy">📋 Copy product page URL</button>
    `;
    m.style.left = Math.min(ev.clientX, window.innerWidth - 220) + "px";
    m.style.top  = Math.min(ev.clientY, window.innerHeight - 280) + "px";
    m.classList.add("show");

    m.querySelectorAll("[data-act]").forEach(b => b.addEventListener("click", () => {
      const a = b.dataset.act;
      m.classList.remove("show");
      if (a === "open") window.jumpTo(d.id);
      else if (a === "add")    window.addToStack(d.id, "node");
      else if (a === "remove") window.removeFromStack(d.id);
      else if (a === "cmp")    addToCompare(d.id, "node");
      else if (a === "pin")    togglePin(d.id);
      else if (a === "connections"){
        const depth = 2;
        const cons = connectionNodeSet(d.id, depth);
        ndEl.style("display", n => cons.has(n.id) ? null : "none");
        [lviz,lhit].forEach(s => s.style("display", l => cons.has(sid(l)) && cons.has(tid(l)) ? null : "none"));
        $("#fbadge").textContent = `Showing ${cons.size} families within ${depth} hops of ${d.name}`;
        $("#fbadge").style.display = "block";
      }
      else if (a === "cat"){
        activeCats = new Set([d.category]);
        $$(".cp").forEach(b => b.classList.toggle("off", !activeCats.has(b.dataset.cat)));
        applyFilters();
      }
      else if (a === "copy"){
        navigator.clipboard.writeText(d.url || "").then(() => showToast("URL copied")).catch(() => {});
      }
    }));
  });
  document.addEventListener("click", () => m.classList.remove("show"));
  document.addEventListener("keydown", ev => { if (ev.key === "Escape") m.classList.remove("show"); });
}

/* ════════════════════════════════════════════════════════════════════════
   [19] TIMELINE view (EOS/EOL)
   ════════════════════════════════════════════════════════════════════════*/
/* Timeline state — zoom (1.0 = comfortable density default), only-stack filter,
   and the live year span that the FIT button + cursor-anchored wheel zoom both
   need. yearSpan is refreshed by every renderTimeline() pass; minZoom is
   recomputed each render so the user can always zoom out to fit-to-data even
   if their window is wider than the default 1620 px (18yrs × 90 px/yr). */
const TL = { zoom: 1.0, minZoom: 0.2, maxZoom: 6, onlyStack: false, families: new Set(), yearSpan: 0 };

/* Layout constants used by both the renderer and the zoom math. Keep these in
   sync with the .tl-axis / .tl-row CSS: column 1 is TL_LABEL_W wide, gap is
   TL_GAP wide, column 2 (the 1fr data track) holds the bars, and TL_PAD_R is
   the right-side gutter that lives on the row itself. The total #tl-inner
   width is therefore TL_LABEL_W + TL_GAP + dataW + TL_PAD_R, where
   dataW = yearSpan × TL_BASE_PX_PER_YEAR × zoom. We pick 90 px/year as the
   comfortable-density default — about a third wider than the old fit-to-canvas
   density, enough to fit most product names on a 5-year EOS→EOL band without
   looking sparse on a 1-year bar. */
const TL_BASE_PX_PER_YEAR = 90;
const TL_LABEL_W = 222; // 200 visible + 22 padding-left baked into the cell
const TL_GAP     = 14;
const TL_PAD_R   = 22;

function buildTimelineView(){
  const tl = document.createElement("div");
  tl.id = "tl-wrap";
  tl.innerHTML = `
    <div id="tl-ambient" aria-hidden="true"></div>
    <div id="tl-head">
      <div>
        <div class="tl-title">Refresh Timeline</div>
        <div class="tl-sub">Current, End-of-Sale, and End-of-Life products by family. Scroll horizontally to pan years · hover narrow blocks for names · ⌘/Ctrl + scroll to zoom.</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <div class="tl-zoom" role="group" aria-label="Zoom">
          <button id="tl-zoom-out" title="Zoom out (−)">−</button>
          <div class="tl-zoom-lvl" id="tl-zoom-lvl">100%</div>
          <button id="tl-zoom-in" title="Zoom in (+)">+</button>
          <button id="tl-zoom-fit" title="Fit data span to viewport (no horizontal scroll)" style="border-left:1px solid var(--border);font-size:10px;letter-spacing:.04em">FIT</button>
        </div>
        <div class="tl-fam-wrap">
          <button type="button" class="tbs tl-fam-btn" id="tl-fam-btn" title="Filter by product family" aria-haspopup="true" aria-expanded="false">All families ▾</button>
          <div id="tl-fam-drop" class="tl-fam-drop" role="dialog" aria-label="Family filter">
            <input type="search" id="tl-fam-search" class="tl-fam-search" placeholder="Search families…" autocomplete="off">
            <div id="tl-fam-list" class="tl-fam-list"></div>
            <button type="button" class="fac-clr" id="tl-fam-clr" hidden>Clear family filter</button>
          </div>
        </div>
        <button class="rc-btn" id="tl-only-stack">Show only stack items</button>
        <button class="rc-btn" id="tl-close">Close</button>
      </div>
    </div>
    <div id="tl-canvas"><div id="tl-inner"></div></div>
  `;
  document.body.appendChild(tl);

  const tlFamBtn   = $("#tl-fam-btn");
  const tlFamDrop  = $("#tl-fam-drop");
  const tlFamList  = $("#tl-fam-list");
  const tlFamSearch = $("#tl-fam-search");
  const tlFamClr   = $("#tl-fam-clr");

  function timelineFamiliesForFilter(){
    const ids = new Set();
    PRODUCTS.forEach(p => {
      if (TL.onlyStack && !stack.has(p.id) && !stack.has(p.family)) return;
      if (!productVisibleInTimeline(p)) return;
      ids.add(p.family);
    });
    return [...ids].sort((a, b) => (nodeById[a]?.name || "").localeCompare(nodeById[b]?.name || ""));
  }

  function updateTimelineFamilyBtn(){
    const n = TL.families.size;
    if (n === 0) tlFamBtn.textContent = "All families ▾";
    else if (n === 1){
      const id = [...TL.families][0];
      tlFamBtn.textContent = (nodeById[id]?.name || id) + " ▾";
    } else tlFamBtn.textContent = `${n} families ▾`;
    tlFamClr.hidden = n === 0;
  }

  function populateTimelineFamilyList(q = ""){
    const query = q.trim().toLowerCase();
    const famIds = timelineFamiliesForFilter();
    tlFamList.innerHTML = famIds.map(famId => {
      const n = nodeById[famId]; if (!n) return "";
      if (query && !n.name.toLowerCase().includes(query)) return "";
      const checked = TL.families.has(famId) ? "checked" : "";
      return `<label class="fac-row"><input type="checkbox" data-fam="${famId}" ${checked}>
        <span class="ld" style="width:7px;height:7px;border-radius:50%;background:${catColor(n.category)};flex-shrink:0"></span>
        ${escapeHtml(n.name)}</label>`;
    }).join("") || `<div style="font-size:11px;color:var(--subtle);padding:6px 2px">No matching families</div>`;
    tlFamList.querySelectorAll("input[data-fam]").forEach(inp => {
      inp.addEventListener("change", () => {
        const id = inp.dataset.fam;
        if (inp.checked) TL.families.add(id); else TL.families.delete(id);
        updateTimelineFamilyBtn();
        renderTimeline();
      });
    });
  }

  function openTimelineFamilyDrop(open){
    const show = open ?? !tlFamDrop.classList.contains("show");
    tlFamDrop.classList.toggle("show", show);
    tlFamBtn.setAttribute("aria-expanded", show ? "true" : "false");
    if (show){ populateTimelineFamilyList(tlFamSearch.value); tlFamSearch.focus(); }
    else tlFamSearch.value = "";
  }

  tlFamBtn.addEventListener("click", ev => { ev.stopPropagation(); openTimelineFamilyDrop(); });
  tlFamSearch.addEventListener("input", () => populateTimelineFamilyList(tlFamSearch.value));
  tlFamSearch.addEventListener("keydown", ev => { if (ev.key === "Escape") openTimelineFamilyDrop(false); });
  tlFamClr.addEventListener("click", () => {
    TL.families.clear();
    updateTimelineFamilyBtn();
    populateTimelineFamilyList();
    renderTimeline();
  });
  document.addEventListener("click", ev => {
    if (tlFamDrop.classList.contains("show") && !tlFamDrop.contains(ev.target) && ev.target !== tlFamBtn)
      openTimelineFamilyDrop(false);
  });

  $("#tl-only-stack").addEventListener("click", () => {
    TL.onlyStack = !TL.onlyStack;
    $("#tl-only-stack").textContent = TL.onlyStack ? "Show all" : "Show only stack items";
    renderTimeline();
  });
  $("#tl-close").addEventListener("click", closeTimelineView);
  $("#tl-zoom-in").addEventListener("click",  () => setTimelineZoom(TL.zoom * 1.4));
  $("#tl-zoom-out").addEventListener("click", () => setTimelineZoom(TL.zoom / 1.4));
  // FIT now means "shrink the data to fit the current viewport" — it computes
  // the zoom that exactly fills the canvas track width with the full year span,
  // which may be below 1.0 on small viewports. The "0" keyboard shortcut below
  // resets to the comfortable-density default (1.0 = TL_BASE_PX_PER_YEAR).
  $("#tl-zoom-fit").addEventListener("click", () => setTimelineZoom(fitTimelineZoom()));

  // ⌘/Ctrl + scroll zooms with the cursor as the anchor; plain scroll pans naturally.
  $("#tl-canvas").addEventListener("wheel", ev => {
    if (!(ev.ctrlKey || ev.metaKey)) return;
    ev.preventDefault();
    const canvas = $("#tl-canvas");
    const prevZ = TL.zoom;
    const factor = ev.deltaY > 0 ? 1/1.15 : 1.15;
    const newZ = Math.max(TL.minZoom, Math.min(TL.maxZoom, prevZ * factor));
    if (newZ === prevZ) return;
    // Anchor zoom at cursor: keep the date under the cursor in the same screen x.
    // The data track lives in the 1fr column, which starts at TL_LABEL_W + TL_GAP
    // inside #tl-inner. Its width = TL.yearSpan × TL_BASE_PX_PER_YEAR × zoom (no
    // longer canvas-relative), so we anchor the cursor's ratio across that new
    // pixel range and update scrollLeft so the same date stays under the cursor.
    const trackOffset = TL_LABEL_W + TL_GAP;
    const oldTrackW = TL.yearSpan * TL_BASE_PX_PER_YEAR * prevZ;
    const sx = ev.clientX - canvas.getBoundingClientRect().left;
    // If the cursor is over the sticky label column (or the year span is zero,
    // which shouldn't happen but guards against div-by-zero on first paint),
    // just zoom in place — there's no data under the cursor to anchor to.
    if (sx < TL_LABEL_W || oldTrackW <= 0){ setTimelineZoom(newZ); return; }
    const xWithinTrack = canvas.scrollLeft + sx - trackOffset;
    const ratio = xWithinTrack / oldTrackW;
    setTimelineZoom(newZ);
    const newTrackW = TL.yearSpan * TL_BASE_PX_PER_YEAR * newZ;
    canvas.scrollLeft = ratio * newTrackW + trackOffset - sx;
  }, { passive: false });

  // Keyboard shortcuts while timeline is open: +, -, 0
  // "0" resets to 1.0 (the new comfortable-density default = TL_BASE_PX_PER_YEAR).
  // To fit the whole data span into the viewport instead, use the FIT button.
  document.addEventListener("keydown", ev => {
    if (!$("#tl-wrap").classList.contains("show")) return;
    const tag = (ev.target.tagName || "").toLowerCase();
    if (tag === "input" || tag === "textarea" || tag === "select") return;
    if (ev.key === "+" || ev.key === "=") { setTimelineZoom(TL.zoom * 1.4); ev.preventDefault(); }
    else if (ev.key === "-" || ev.key === "_") { setTimelineZoom(TL.zoom / 1.4); ev.preventDefault(); }
    else if (ev.key === "0") { setTimelineZoom(1.0); ev.preventDefault(); }
  });

  // Toolbar button (replaces old legend toggle)
  const tBtn = document.createElement("button");
  tBtn.className = "tools-btn";
  tBtn.id = "tools-timeline";
  tBtn.innerHTML = `<span class="ti">⏱</span><span>Refresh Timeline</span>`;
  tBtn.title = "Open Refresh Timeline — current, EOS, and EOL dates across the portfolio (T)";
  tBtn.addEventListener("click", () => {
    const open = $("#tl-wrap").classList.contains("show");
    if (open) { closeTimelineView(); tBtn.classList.remove("active"); }
    else      { openTimelineView();  tBtn.classList.add("active"); }
  });
  $("#tools").appendChild(tBtn);
}
function setTimelineZoom(z){
  TL.zoom = Math.max(TL.minZoom, Math.min(TL.maxZoom, z));
  $("#tl-zoom-lvl").textContent = Math.round(TL.zoom * 100) + "%";
  $("#tl-zoom-out").disabled = TL.zoom <= TL.minZoom + 0.001;
  $("#tl-zoom-in").disabled  = TL.zoom >= TL.maxZoom - 0.001;
  renderTimeline();
}
/* Compute the zoom value that exactly fits the full data range (TL.yearSpan)
   into the visible canvas track width. Used by the FIT button and by
   renderTimeline() to lower TL.minZoom so bird's-eye viewing is always
   reachable, even when the data span is wider than the viewport at 1.0. */
function fitTimelineZoom(){
  const canvas = $("#tl-canvas");
  if (!canvas || TL.yearSpan <= 0) return 1;
  const trackPx = canvas.clientWidth - TL_LABEL_W - TL_GAP - TL_PAD_R;
  if (trackPx <= 0) return 1;
  return Math.max(0.05, trackPx / (TL.yearSpan * TL_BASE_PX_PER_YEAR));
}
function openTimelineView(){
  $("#tl-wrap").classList.add("show");
  document.body.classList.add("tl-open");
  $("#tools-timeline")?.classList.add("active");
  $("#tl-fam-drop")?.classList.remove("show");
  $("#tl-fam-btn")?.setAttribute("aria-expanded", "false");
  setTimelineZoom(TL.zoom);
}
function closeTimelineView(){
  $("#tl-wrap").classList.remove("show");
  document.body.classList.remove("tl-open");
  $("#tools-timeline")?.classList.remove("active");
}

/* Pack a set of {left%, right%} blocks into the minimum number of horizontal
   lanes such that no two blocks in the same lane overlap. Returns the lane
   count and assigns .lane to each block. */
function packIntoLanes(blocks){
  // Drop any non-finite blocks defensively — the timeline builder already
  // filters these out, but if a future code path forgets the guard, NaN
  // coordinates would silently put bars in their own lane forever.
  const safe = blocks.filter(b => Number.isFinite(b.left) && Number.isFinite(b.right));
  const sorted = [...safe].sort((a,b) => a.left - b.left);
  const lanes = []; // each = end of last block in that lane (%)
  sorted.forEach(b => {
    let lane = -1;
    for (let i = 0; i < lanes.length; i++){
      if (lanes[i] <= b.left + 0.05){ // small tolerance to avoid pixel kissing
        lane = i; break;
      }
    }
    if (lane === -1){ lane = lanes.length; lanes.push(0); }
    lanes[lane] = b.right;
    b.lane = lane;
  });
  return lanes.length;
}

function productVisibleInTimeline(p){
  if (!p) return false;
  if (!activeCats.has(p.category)) return false;
  const fam = nodeById[p.family];
  if (activeUC && !((fam?.useCases || []).includes(activeUC))) return false;
  if (activeInd && !((fam?.industries || []).includes(activeInd))) return false;
  if (!["current", "eos", "eol"].includes(p.status)) return false;
  if (facetState.tier.size > 0){
    const tiers = window.__cpnV2?.TIERS;
    const tier = tiers?.[p.family]?.tier || "";
    if (![...facetState.tier].some(label => tier.toLowerCase().includes(label.toLowerCase()))) return false;
  }
  return true;
}

function renderTimeline(){
  const inner = $("#tl-inner"); if (!inner) return;
  const canvas = $("#tl-canvas");
  // innerW is set below once the data year span is known — see "Window sizing".
  // The new sizing is years × TL_BASE_PX_PER_YEAR × zoom rather than canvas-
  // relative, so the timeline always renders at a comfortable density and the
  // canvas's overflow:auto produces a native horizontal scrollbar as needed.

  const now = new Date();

  /* Tolerant date parser used by the timeline.
     Returns a Date or null. Handles:
       ISO              "2026-10-31"
       Long-form        "Oct 28, 2026", "Aug 2, 2021"
       Month + year     "Aug 2017", "Oct 2019"
       Bare year        "2017"
       Approximate      "~2016"          → 2016-06-30 (mid-year)
       Approximate range"~2018-2021"     → 2019-06-30 (midpoint, mid-year)
       Unknown          "TBD", "TBD …"   → null

     IMPORTANT: every supported format is parsed by explicit regex below — we
     deliberately do NOT rely on `new Date(string)` because non-ISO formats
     ("Oct 2019", "2017", etc.) parse inconsistently across engines. V8/Chrome
     is lenient and returns valid dates, Safari and some older WebKit builds
     return Invalid Date for the same input. Without explicit parsing, products
     whose EOS/EOL dates use "MMM YYYY" (e.g. MX700, MX800, ASA-5505) would
     silently collapse to unknown-both mode in Safari and render as 8% striped
     bars near "today" instead of their actual lifecycle bands. The native Date
     parser is only used as a last-resort fallback and returns null on NaN. */
  const MONTH_MAP = {
    jan:0, feb:1, mar:2, apr:3, may:4, jun:5,
    jul:6, aug:7, sep:8, sept:8, oct:9, nov:10, dec:11,
    january:0, february:1, march:2, april:3, june:5,
    july:6, august:7, september:8, october:9, november:10, december:11
  };
  const parseFuzzyDate = (s) => {
    if (!s || typeof s !== "string") return null;
    const t = s.trim();
    if (!t || /^TBD\b/i.test(t)) return null;
    let m;
    // Approximate single year: "~2016" → 2016-06-30
    if ((m = t.match(/^~\s*(\d{4})$/)))
      return new Date(+m[1], 5, 30);
    // Approximate range: "~2018-2021" → midpoint, mid-year
    if ((m = t.match(/^~\s*(\d{4})\s*-\s*(\d{4})$/)))
      return new Date(Math.round((+m[1] + +m[2]) / 2), 5, 30);
    // ISO calendar date: "2026-10-31"
    if ((m = t.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/)))
      return new Date(+m[1], +m[2] - 1, +m[3]);
    // Long-form with explicit day: "Oct 28, 2026" or "October 28 2026"
    if ((m = t.match(/^([A-Za-z]+)\s+(\d{1,2}),?\s+(\d{4})$/))) {
      const mon = MONTH_MAP[m[1].toLowerCase()];
      if (mon != null) return new Date(+m[3], mon, +m[2]);
    }
    // Month + year only: "Aug 2017", "October 2019"
    if ((m = t.match(/^([A-Za-z]+)\s+(\d{4})$/))) {
      const mon = MONTH_MAP[m[1].toLowerCase()];
      if (mon != null) return new Date(+m[2], mon, 1);
    }
    // Bare year: "2017"
    if ((m = t.match(/^(\d{4})$/)))
      return new Date(+m[1], 0, 1);
    // Last-resort fallback for anything we haven't anticipated
    const d = new Date(t);
    return Number.isNaN(d.getTime()) ? null : d;
  };

  /* Window sizing.
     Floor at now-5 / now+6 so the default still feels familiar when no old
     data is present, but EXPAND outward when products have older EOLs or
     further-out EOS milestones. Without this, ~19 legacy products with
     pre-2021 EOS dates clamp visually to the left edge instead of landing
     at their real position. */
  // Apply the same category / use-case / industry / stack filters the graph
  // view uses, so toggling a chip or dropdown updates Timeline immediately.
  // productMatchesFilters() is defined alongside applyFilters() — single
  // source of truth so timeline + graph can never disagree.
  const visibleProducts = PRODUCTS.filter(p => {
    if (TL.onlyStack && !stack.has(p.id) && !stack.has(p.family)) return false;
    if (TL.families.size > 0 && !TL.families.has(p.family)) return false;
    return productVisibleInTimeline(p);
  });

  let startY = now.getFullYear() - 5;
  let endY   = now.getFullYear() + 6;
  visibleProducts.forEach(p => {
    for (const s of [p.eosDate, p.eolDate]) {
      const d = parseFuzzyDate(s); if (!d) continue;
      const y = d.getFullYear();
      if (y     < startY) startY = y;
      if (y + 1 > endY)   endY   = y + 1;
    }
  });

  /* Now that we know the year span, size #tl-inner in pixels (px-per-year
     model) and refresh the dynamic minZoom so the user can always zoom
     out to fit-the-data. The data track itself (the 1fr column) is
     `dataW` wide; #tl-inner adds the sticky label column (TL_LABEL_W),
     grid gap (TL_GAP), and a right-side gutter (TL_PAD_R). If TL.zoom is
     currently below the fresh fit-zoom (e.g. the user resized the window
     smaller after zooming out), clamp it back into range and let the next
     setTimelineZoom call repaint cleanly. */
  TL.yearSpan = endY - startY;
  const fitZ = fitTimelineZoom();
  TL.minZoom = Math.min(1, fitZ);
  if (TL.zoom < TL.minZoom) TL.zoom = TL.minZoom;
  const dataW  = TL.yearSpan * TL_BASE_PX_PER_YEAR * TL.zoom;
  const innerW = TL_LABEL_W + TL_GAP + dataW + TL_PAD_R;
  inner.style.width = innerW + "px";
  // Keep the zoom-out button enabled state correct against the new minZoom.
  const zoomOutBtn = $("#tl-zoom-out");
  if (zoomOutBtn) zoomOutBtn.disabled = TL.zoom <= TL.minZoom + 0.001;

  const totalMs = (endY - startY) * 365.25 * 86400e3;
  const startMs = new Date(startY, 0, 1).getTime();
  const xFromDate = (s) => {
    const d = parseFuzzyDate(s);
    if (!d) return null;
    return Math.max(0, Math.min(100, ((d.getTime() - startMs) / totalMs) * 100));
  };

  // Group products by family — uses the pre-filtered set so families with
  // zero matching products don't render an empty row.
  const fams = {};
  visibleProducts.forEach(p => {
    (fams[p.family] = fams[p.family] || []).push(p);
  });

  // Tick density adapts to zoom: more zoom → more ticks shown
  const yearStep = TL.zoom < 1   ? 2
                 : TL.zoom < 2.5 ? 1
                 : TL.zoom < 4   ? 0.5
                 :                 0.25;
  const ticks = [];
  for (let y = startY; y <= endY; y += yearStep){
    const pct = ((new Date(y, 0, 1).getTime() - startMs) / totalMs) * 100;
    const isMajor = Math.abs(y - Math.round(y)) < 0.01;
    ticks.push({ y, pct, label: isMajor ? String(Math.round(y)) : "", major: isMajor });
  }
  const todayPct = ((now.getTime() - startMs) / totalMs) * 100;
  // The empty first cell gets a class so it can be position:sticky on
  // horizontal scroll, matching the .tl-row-lbl behavior below.
  const axisHtml = `<div class="tl-axis">
    <div class="tl-axis-lbl"></div>
    <div class="tl-axis-track">
      ${ticks.map(t => `<div class="tl-axis-tick ${t.major?"major":""}" style="left:${t.pct}%">${t.label}</div>`).join("")}
      <div class="tl-axis-today" style="left:${todayPct}%"></div>
    </div>
  </div>`;

  // Per-row HTML, with lane packing so blocks never overlap
  const rowHtml = Object.entries(fams).sort((a,b) => (nodeById[a[0]]?.name||"").localeCompare(nodeById[b[0]]?.name||""))
    .map(([famId, prods]) => {
      const n = nodeById[famId]; if (!n) return "";
      // Build block geometry. Each block resolves to {left, right} percentages
      // plus optional unknownLeft/unknownRight flags that drive the dashed-fade
      // CSS treatment for products with TBD / unscheduled milestones.
      const blocks = prods.map(p => {
        let left = null, right = null, unknownLeft = false, unknownRight = false;
        if (p.status === "current"){
          // Current products anchor at "two years ago" and run to the right edge.
          left  = xFromDate(new Date(now.getFullYear() - 2, 0, 1).toISOString());
          right = 100;
        } else {
          const eosX = xFromDate(p.eosDate);
          const eolX = xFromDate(p.eolDate);
          if (eosX != null && eolX != null){
            // Both milestones known — draw the full lifecycle band.
            left = eosX; right = eolX;
          } else if (eosX != null){
            // EOS known, EOL TBD — anchor at EOS, extend ~12% rightward and fade.
            left = eosX; right = Math.min(100, eosX + 12); unknownRight = true;
          } else if (eolX != null){
            // EOL known, EOS TBD — anchor at EOL, extend ~12% leftward and fade.
            right = eolX; left = Math.max(0, eolX - 12); unknownLeft = true;
          } else {
            // Both TBD — center on "today" with stripes + ? badge so the user
            // sees "scheduled but unscheduled" instead of a ghost bar at year 0.
            left  = Math.max(0, todayPct - 4);
            right = Math.min(100, todayPct + 4);
            unknownLeft = unknownRight = true;
          }
        }
        // Defensive: anything still non-finite is dropped rather than emitted
        // with NaN coordinates (which CSS treats as "auto" and ghosts at left:0).
        if (!Number.isFinite(left) || !Number.isFinite(right)) return null;
        // Floor at 1.2% of the timeline window so same-day EOS/EOL products
        // (e.g. SecureX, where EOS and EOL both land on Jul 31, 2024) still
        // render as a recognizable marker instead of a sub-pixel sliver. At
        // an 18-year window that floor is ≈80 days — still clearly "instant"
        // but visible on screen and clickable.
        return { p, left, right: Math.max(right, left + 1.2), unknownLeft, unknownRight };
      }).filter(Boolean);
      const laneCount = packIntoLanes(blocks);
      const laneH = 18, laneGap = 2;
      const trackH = laneCount * laneH + (laneCount - 1) * laneGap + 4;
      // Decide which blocks get text labels: only when block is wide enough
      // in PIXELS to fit the name (rough proxy: width-percent * trackPx >= 28).
      // The data track (the 1fr column) is exactly dataW wide, so the bar's
      // pixel width is widthPct/100 * dataW.
      const trackPx = dataW;
      const blocksHtml = blocks.map(b => {
        const widthPct = b.right - b.left;
        const widthPx = widthPct/100 * trackPx;
        // Threshold of 28 px — bars wider than this show their name with
        // a clean text-overflow:ellipsis when needed. Below 28 px even "..."
        // doesn't render usefully, so we hide the label and rely on the
        // existing tooltip + .narrow:hover expand-on-hover behavior.
        const narrow = widthPx < 28;
        const top = b.lane * (laneH + laneGap);
        const label = narrow ? "" : escapeHtml(b.p.name);
        // If either milestone is unknown, tag the block so CSS can fade the
        // ambiguous edge (or stripe the whole bar if both ends are TBD).
        const unkCls = (b.unknownLeft && b.unknownRight) ? " unknown-both"
                     : b.unknownLeft  ? " unknown-left"
                     : b.unknownRight ? " unknown-right"
                     : "";
        return `<div class="tl-block ${b.p.status}${narrow?" narrow":""}${unkCls}"
                  style="left:${b.left}%;width:${widthPct}%;top:${top}px;height:${laneH}px"
                  title="${escapeHtml(b.p.name)} — ${b.p.status.toUpperCase()}${b.p.eosDate?" · EOS "+b.p.eosDate:""}${b.p.eolDate?" · EOL "+b.p.eolDate:""}"
                  onclick="window.showProductDetail('${b.p.id}')">${label}</div>`;
      }).join("");
      const todayX = ((now.getTime() - startMs) / totalMs) * 100;
      return `<div class="tl-row">
        <div class="tl-row-lbl">
          <span class="ld" style="background:${catColor(n.category)}"></span>
          <span class="nm" title="${escapeHtml(n.name)}">${escapeHtml(n.name)}</span>
        </div>
        <div class="tl-row-track" style="height:${trackH}px">
          <div class="tl-today" style="left:${todayX}%"></div>
          ${blocksHtml}
        </div>
      </div>`;
    }).join("");

  // Stats line
  const totalShown = Object.values(fams).reduce((a,b) => a + b.length, 0);
  const eolCount = Object.values(fams).flat().filter(p => p.status === "eol").length;
  const eosCount = Object.values(fams).flat().filter(p => p.status === "eos").length;
  const stats = `<div style="padding:18px 22px 6px;font-size:11px;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap">
    Showing <strong style="color:var(--text)">${totalShown}</strong> product${totalShown!==1?"s":""} across <strong style="color:var(--text)">${Object.keys(fams).length}</strong> famil${Object.keys(fams).length!==1?"ies":"y"}
    · <strong style="color:#ef4444">${eolCount}</strong> EOL · <strong style="color:#FF9000">${eosCount}</strong> EOS
  </div>`;

  const legend = `<div style="margin:14px 22px;display:flex;gap:14px;font-size:11px;color:var(--muted);flex-wrap:wrap">
    <span style="display:inline-flex;align-items:center;gap:5px"><span style="width:12px;height:10px;background:rgba(45,206,92,.65);border-radius:2px"></span>Current</span>
    <span style="display:inline-flex;align-items:center;gap:5px"><span style="width:12px;height:10px;background:rgba(245,158,11,.7);border-radius:2px"></span>End of Sale</span>
    <span style="display:inline-flex;align-items:center;gap:5px"><span style="width:12px;height:10px;background:rgba(239,68,68,.78);border-radius:2px"></span>End of Life</span>
    <span style="display:inline-flex;align-items:center;gap:5px"><span style="width:3px;height:10px;background:#02C8FF"></span>Today</span>
    <span style="margin-left:auto;color:var(--subtle)">Zoom: <code style="background:var(--surface2);padding:1px 5px;border-radius:3px">+</code> / <code style="background:var(--surface2);padding:1px 5px;border-radius:3px">−</code> / <code style="background:var(--surface2);padding:1px 5px;border-radius:3px">0</code> reset · <code style="background:var(--surface2);padding:1px 5px;border-radius:3px">FIT</code> fit-to-data · <code style="background:var(--surface2);padding:1px 5px;border-radius:3px">⌘/Ctrl+scroll</code></span>
  </div>`;

  inner.innerHTML = stats + axisHtml + rowHtml + legend;
}

/* ════════════════════════════════════════════════════════════════════════
   [20] STACK DIFF (snapshot vs current)
   ════════════════════════════════════════════════════════════════════════*/
function buildDiffModal(){
  const m = document.createElement("div");
  m.id = "diff-modal";
  m.innerHTML = `
    <div class="diff-box">
      <div class="diff-h">
        <h3>Stack Diff</h3>
        <button id="diff-x" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--muted);width:26px;height:26px;font-size:14px;cursor:pointer">×</button>
      </div>
      <div class="diff-body" id="diff-body"></div>
      <div class="diff-snap">
        <span id="diff-snap-info"></span>
        <button class="rc-btn" id="diff-snap-btn">Snapshot current as baseline</button>
      </div>
    </div>
  `;
  document.body.appendChild(m);
  $("#diff-x").addEventListener("click", () => m.classList.remove("show"));
  $("#diff-snap-btn").addEventListener("click", () => {
    lsSet("cpn-snapshot-v2", { ts: Date.now(), state: readState() });
    showStackDiff();
  });
  m.addEventListener("click", e => { if (e.target === m) m.classList.remove("show"); });
}
function showStackDiff(){
  const m = $("#diff-modal"); m.classList.add("show");
  const snap = lsGet("cpn-snapshot-v2", null);
  const body = $("#diff-body");
  if (!snap){
    body.innerHTML = `<div class="diff-empty">No snapshot yet. Click "Snapshot current as baseline" to record a starting point — then come back here after you make changes to see the diff.</div>`;
    $("#diff-snap-info").textContent = "No baseline";
    return;
  }
  $("#diff-snap-info").textContent = `Baseline taken ${relTime(snap.ts)}`;
  const oldIds = new Set((snap.state.stack || []).map(it => it.id));
  const newIds = new Set([...stack]);
  const added = [...newIds].filter(id => !oldIds.has(id));
  const removed = [...oldIds].filter(id => !newIds.has(id));
  const kept   = [...newIds].filter(id => oldIds.has(id));
  body.innerHTML = `
    <div class="diff-cols">
      <div class="diff-col">
        <h4>Baseline (${oldIds.size})</h4>
        <ul class="diff-list">
          ${[...oldIds].map(id => `<li class="diff-item ${added.includes(id)?"":removed.includes(id)?"diff-rem":"diff-keep"}"><span class="d-d"></span>${escapeHtml(nameOf(id))}</li>`).join("")}
        </ul>
      </div>
      <div class="diff-col">
        <h4>Current (${newIds.size})</h4>
        <ul class="diff-list">
          ${[...newIds].map(id => `<li class="diff-item ${added.includes(id)?"diff-add":"diff-keep"}"><span class="d-d"></span>${escapeHtml(nameOf(id))}</li>`).join("")}
        </ul>
      </div>
    </div>
    <div style="margin-top:14px;font-size:12px;color:var(--muted)">
      <strong style="color:var(--green)">+ ${added.length} added</strong> ·
      <strong style="color:#ef4444">– ${removed.length} removed</strong> ·
      <strong>${kept.length} kept</strong>
    </div>
  `;
}

/* ════════════════════════════════════════════════════════════════════════
   [22] FACETED filtering (by status, tier, family)
   ════════════════════════════════════════════════════════════════════════*/
function buildFacets(){
  const f = document.createElement("div");
  f.id = "facets";
  document.body.appendChild(f);
}
function renderFacets(){
  const f = $("#facets");
  const statusCounts = {current:0, eol:0};
  PRODUCTS.forEach(p => {
    if (p.status === "eos") return;
    statusCounts[p.status] = (statusCounts[p.status]||0) + 1;
  });
  const eosHidden = PRODUCTS.filter(p => p.status === "eos").length;
  const tierLabels = [...new Set(Object.values(TIERS).flatMap(t => t.tier.split("/").map(s => s.trim())))].sort();
  const fnCount = FIELD_NOTICES.length;
  f.innerHTML = `
    <div class="fac-h">More Filters
      <button class="fac-x" id="fac-x">×</button>
    </div>
    <div class="fac-sec">
      <div class="fac-st">Product Status</div>
      ${["current","eol"].map(s => `
        <label class="fac-row"><input type="checkbox" data-status="${s}" ${facetState.status.has(s)?"checked":""}>
          <span>${s === "eol" ? "EOL" : s.toUpperCase()}</span><span class="cnt">${statusCounts[s]||0}</span></label>`).join("")}
      ${eosHidden ? `<div style="font-size:10px;color:var(--muted);margin-top:6px;padding:0 2px">${eosHidden} End-of-Sale products hidden from all views</div>` : ""}
    </div>
    <div class="fac-sec">
      <div class="fac-st">Licensing Tier (contains)</div>
      ${tierLabels.slice(0, 10).map(t => `
        <label class="fac-row"><input type="checkbox" data-tier="${escapeHtml(t)}" ${facetState.tier.has(t)?"checked":""}>
          <span>${escapeHtml(t)}</span></label>`).join("")}
    </div>
    <div class="fac-sec">
      <div class="fac-st">Other</div>
      <div style="font-size:11px;color:var(--muted)"><strong>${fnCount}</strong> active field notice${fnCount!==1?"s":""}</div>
    </div>
    <button class="fac-clr" id="fac-clr">Clear facets</button>
  `;
  $("#fac-x").addEventListener("click", () => f.classList.remove("show"));
  f.querySelectorAll("[data-status]").forEach(c => c.addEventListener("change", () => {
    if (c.checked) facetState.status.add(c.dataset.status); else facetState.status.delete(c.dataset.status);
    applyFilters();
  }));
  f.querySelectorAll("[data-tier]").forEach(c => c.addEventListener("change", () => {
    if (c.checked) facetState.tier.add(c.dataset.tier); else facetState.tier.delete(c.dataset.tier);
    applyFilters();
  }));
  $("#fac-clr").addEventListener("click", () => {
    facetState.status = new Set(["current"]);
    facetState.tier.clear();
    renderFacets();
    applyFilters();
  });
}
function applyFacets(){ applyFilters(); }

/* ════════════════════════════════════════════════════════════════════════
   [12] AI ASSISTANT (bring-your-own-key)
   ════════════════════════════════════════════════════════════════════════*/
function buildAiAssistant(){
  const p = document.createElement("div");
  p.id = "ai-panel";
  p.innerHTML = `
    <div class="ai-h">
      <div class="t">Ask AI <span style="font-weight:400;color:var(--muted);font-size:10px;margin-left:6px">BYOK</span></div>
      <div class="acts">
        <button id="ai-cfg">Configure</button>
        <button id="ai-clr">Clear</button>
        <button id="ai-x" title="Close">×</button>
      </div>
    </div>
    <div id="ai-msgs"></div>
    <div class="ai-input-wrap">
      <textarea id="ai-input" placeholder="e.g. 'Hospital with 800 beds, refreshing network + replacing Zoom'" rows="1"></textarea>
      <button id="ai-send" title="Send (Enter)">→</button>
    </div>
  `;
  document.body.appendChild(p);

  const m = document.createElement("div");
  m.id = "ai-cfg-modal";
  m.innerHTML = `
    <div class="ai-cfg-box">
      <h3>Configure AI Assistant</h3>
      <p>Bring-your-own-key for an OpenAI-compatible chat completions endpoint.
        Key is stored only in <code>localStorage</code> on this device.</p>

      <label>Provider</label>
      <select id="ai-cfg-prov">
        <option value="openrouter">OpenRouter — works from file:// (recommended)</option>
        <option value="groq">Groq — works from file://</option>
        <option value="lmstudio">LM Studio (local) — no key needed</option>
        <option value="ollama">Ollama (local) — no key needed</option>
        <option value="openai">OpenAI — needs http:// or custom proxy</option>
        <option value="anthropic">Anthropic — needs http:// or custom proxy</option>
        <option value="custom">Custom endpoint…</option>
      </select>

      <div id="ai-cfg-incompat" style="display:none;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.45);border-radius:7px;padding:10px 12px;font-size:11.5px;color:#FF9000;margin-top:10px;line-height:1.5">
        <strong>⚠ This provider blocks browser requests from <code>file://</code> origins.</strong>
        Pick a reliable path:
        <div style="margin-top:8px;display:flex;flex-direction:column;gap:5px">
          <div><strong>① Easiest:</strong> <button class="ai-cfg-fix" id="ai-cfg-switch-or">Switch to OpenRouter</button> — same OpenAI/Anthropic models, browser-friendly.</div>
          <div><strong>② Same key:</strong> <button class="ai-cfg-fix" id="ai-cfg-show-serve">Run a local HTTP server</button> — your existing key keeps working.</div>
          <div><strong>③ Advanced:</strong> use a self-hosted CORS proxy in the <em>Advanced</em> section below.</div>
        </div>
        <div id="ai-cfg-serve-howto" style="display:none;margin-top:10px;padding:9px 11px;background:rgba(0,0,0,.25);border-radius:6px;color:var(--muted);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;line-height:1.6">
          From the folder containing this file:<br>
          <span style="color:var(--accent)">cd "$(dirname '<filename>')"<br>python3 -m http.server 8000</span><br>
          Then open: <span style="color:var(--accent)">http://localhost:8000/cisco-portfolio-navigator.html</span><br>
          <span style="color:var(--subtle)">Or any equivalent: <code>npx serve</code>, <code>php -S localhost:8000</code>, etc.</span>
        </div>
      </div>

      <label>Endpoint URL</label>
      <input id="ai-cfg-url" placeholder="https://openrouter.ai/api/v1/chat/completions"/>
      <label>API key</label>
      <input id="ai-cfg-key" type="password" placeholder="sk-... (stored locally only)"/>
      <label>Model</label>
      <input id="ai-cfg-model" placeholder="openai/gpt-4o-mini"/>

      <details style="margin-top:12px;font-size:11px;color:var(--muted)">
        <summary style="cursor:pointer;color:var(--subtle);font-weight:600;text-transform:uppercase;letter-spacing:.06em;font-size:10px">Advanced — custom CORS proxy</summary>
        <input id="ai-cfg-proxy" placeholder="https://your-proxy.example/?" style="margin-top:8px"/>
        <div style="margin-top:6px;line-height:1.5">A URL prefix that wraps the endpoint. Useful only if you host your own CORS proxy that forwards the <code>Authorization</code> header (public free proxies are unreliable for API keys). Leave blank otherwise.</div>
      </details>

      <div class="ai-cfg-act" style="justify-content:space-between;margin-top:14px">
        <button id="ai-cfg-test" style="margin-right:auto">Test connection</button>
        <button id="ai-cfg-cancel">Cancel</button>
        <button id="ai-cfg-save" class="prim">Save &amp; test</button>
      </div>
      <div id="ai-cfg-status" style="margin-top:10px;font-size:11.5px;line-height:1.45"></div>
    </div>
  `;
  document.body.appendChild(m);

  const PROVIDERS = {
    openrouter: { url: "https://openrouter.ai/api/v1/chat/completions", model: "openai/gpt-4o-mini",
                  keyHelp: "Get a key at openrouter.ai/keys",        worksFromFile: true,  needsKey: true },
    openai:     { url: "https://api.openai.com/v1/chat/completions",  model: "gpt-4o-mini",
                  keyHelp: "Get a key at platform.openai.com/api-keys", worksFromFile: false, needsKey: true },
    anthropic:  { url: "https://api.anthropic.com/v1/chat/completions", model: "claude-3-5-sonnet-latest",
                  keyHelp: "Get a key at console.anthropic.com",      worksFromFile: false, needsKey: true },
    groq:       { url: "https://api.groq.com/openai/v1/chat/completions", model: "llama-3.3-70b-versatile",
                  keyHelp: "Get a key at console.groq.com",           worksFromFile: true,  needsKey: true },
    lmstudio:   { url: "http://localhost:1234/v1/chat/completions",   model: "local-model",
                  keyHelp: "Local — any value works, key not checked",  worksFromFile: true,  needsKey: false },
    ollama:     { url: "http://localhost:11434/v1/chat/completions",  model: "llama3.2",
                  keyHelp: "Local — any value works, key not checked",  worksFromFile: true,  needsKey: false },
    custom:     { url: "",                                             model: "",
                  keyHelp: "",                                          worksFromFile: true,  needsKey: true }
  };

  function providerFromUrl(url){
    if (!url) return "openrouter";
    if (/openrouter\.ai/i.test(url)) return "openrouter";
    if (/api\.openai\.com/i.test(url)) return "openai";
    if (/api\.anthropic\.com/i.test(url)) return "anthropic";
    if (/api\.groq\.com/i.test(url)) return "groq";
    if (/localhost:1234/i.test(url)) return "lmstudio";
    if (/localhost:11434/i.test(url)) return "ollama";
    return "custom";
  }

  function applyProviderPreset(name){
    const pre = PROVIDERS[name] || PROVIDERS.openrouter;
    const isFile = location.protocol === "file:";
    if (pre.url)   $("#ai-cfg-url").value   = pre.url;
    if (pre.model) $("#ai-cfg-model").value = pre.model;
    $("#ai-cfg-key").placeholder = pre.keyHelp ? pre.keyHelp : "sk-...";
    // Show the incompat panel only when this provider truly won't work from this origin
    const incompat = isFile && !pre.worksFromFile;
    $("#ai-cfg-incompat").style.display = incompat ? "block" : "none";
  }

  function resolveProxy(){
    return $("#ai-cfg-proxy").value.trim();
  }

  function readCfgInputs(){
    return {
      url:   $("#ai-cfg-url").value.trim(),
      model: $("#ai-cfg-model").value.trim() || "gpt-4o-mini",
      proxy: resolveProxy()
    };
  }

  async function runTest(cfg, key){
    if (!cfg.url){ return { ok:false, html:`<span style="color:#ef4444">Endpoint URL is required.</span>` }; }
    const url = cfg.proxy ? cfg.proxy + encodeURIComponent(cfg.url) : cfg.url;
    try {
      const r = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + (key || "x") },
        body: JSON.stringify({ model: cfg.model, messages:[{role:"user",content:"ping"}], max_tokens: 4 })
      });
      if (r.ok) return { ok:true, html:`<span style="color:var(--green)">✓ Connected — HTTP ${r.status}.</span>` };
      const txt = await r.text().catch(()=>"");
      // 401 with a real provider is "URL/proxy reachable, key wrong"
      const isAuth = r.status === 401 || r.status === 403;
      return { ok:false, html:`<span style="color:#ef4444">HTTP ${r.status}</span> ${isAuth?"— check your API key. (Endpoint is reachable.)":""}<br><code style="font-size:10.5px;color:var(--subtle);word-break:break-all">${escapeHtml(txt.slice(0,220))}</code>` };
    } catch (e) {
      return { ok:false, html: aiErrorMessage(e, cfg) };
    }
  }

  function syncAiBtnState(open){
    $("#ai-btn")?.classList.toggle("active", !!open);
  }

  function toggleAiPanel(forceOpen){
    const show = forceOpen === true ? true : forceOpen === false ? false : !p.classList.contains("show");
    p.classList.toggle("show", show);
    syncAiBtnState(show);
    if (show && !$("#ai-msgs").children.length) renderAiWelcome();

function aiErrorMessage(err, cfg){
  const isFile = location.protocol === "file:";
  // TypeError "Failed to fetch" / "NetworkError" usually means CORS or unreachable.
  const msg = String(err && err.message || err);
  const looksLikeCors = err instanceof TypeError ||
    /NetworkError|Failed to fetch|CORS|Load failed/i.test(msg);
  if (!looksLikeCors) return `<span style="color:#ef4444">Error:</span> ${escapeHtml(msg)}`;
  let host = "";
  try { host = new URL(cfg && cfg.url).host; } catch(e){}
  const isOpenAI = /api\.openai\.com/i.test(host);
  const isAnthropic = /api\.anthropic\.com/i.test(host);
  const isLocal = /localhost|127\.0\.0\.1/i.test(host);
  let advice;
  if (isOpenAI || isAnthropic){
    const provName = isOpenAI ? "OpenAI" : "Anthropic";
    advice = `<strong>${provName}'s API blocks browser requests from <code>file://</code> origins.</strong> Reliable options:
      <ul style="margin:4px 0 0 16px;padding:0">
        <li><strong>Use <a href="https://openrouter.ai" target="_blank" rel="noopener" style="color:var(--accent)">OpenRouter</a></strong> — the same ${provName} models, but its endpoint is browser-friendly. Free credits on signup.</li>
        <li><strong>Serve this page over HTTP</strong> instead of opening it as a file: <code>python3 -m http.server 8000</code> in this folder, then visit <code>http://localhost:8000/cisco-portfolio-navigator.html</code>. Your ${provName} key then works directly.</li>
        <li><strong>Run a local model</strong> (<a href="https://lmstudio.ai" target="_blank" rel="noopener" style="color:var(--accent)">LM Studio</a> / <a href="https://ollama.com" target="_blank" rel="noopener" style="color:var(--accent)">Ollama</a>) — no key needed.</li>
      </ul>
      <div style="margin-top:6px;color:var(--subtle)">Note: public CORS proxies (corsproxy.io, allorigins, etc.) are unreliable and most are blocked or strip the <code>Authorization</code> header.</div>`;
  } else if (isLocal){
    advice = `Can't reach <code>${escapeHtml(host)}</code>. Is the local server running? Check that the port matches and CORS is enabled in the server's settings.`;
  } else if (isFile){
    advice = `Browser blocked the request because the page is loaded from <code>file://</code>. Switch to a CORS-friendly endpoint (OpenRouter, LM Studio, Ollama, Groq), or serve this file over <code>http://localhost</code>.`;
  } else {
    advice = `Likely a CORS or network problem. Open Configure → <strong>Test connection</strong> for diagnostics.`;
  }
  return `<div><strong style="color:#ef4444">Network / CORS error</strong> calling <code>${escapeHtml(host || "endpoint")}</code>.</div>
    <div style="margin-top:6px;color:var(--muted);font-weight:400;font-size:11.5px">${advice}</div>`;
}

async function fetchAiResponse(userPrompt) {
  const key = lsGet(STORAGE_KEYS.aiKey, "");
  const cfg = lsGet(STORAGE_KEYS.aiCfg, {});
  if (!key || !cfg.url) return { error: "no_config" };
  const ctx = buildAiContext();
  const planCtx = buildPlanContext();
  let sys = `You are a Cisco solution architect. Recommend specific Cisco products from the catalog below.
When suggesting products, use exact names from the catalog so they can be linked.
Respond concisely (max 5 short paragraphs or a bulleted stack).`;
  if (planCtx) {
    sys += `\n\nCURRENT ACCOUNT PLAN (from Account Planner / Guided Plan — treat as ground truth for this conversation):\n${planCtx}`;
  }
  sys += `\n\nCATALOG:\n${ctx}`;
  const maxTok = planCtx ? 1200 : 700;
  try {
    const url = cfg.proxy ? cfg.proxy + encodeURIComponent(cfg.url) : cfg.url;
    const r = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + key },
      body: JSON.stringify({
        model: cfg.model || "gpt-4o-mini",
        messages: [{ role: "system", content: sys }, { role: "user", content: userPrompt }],
        temperature: 0.3, max_tokens: maxTok
      })
    });
    if (!r.ok) {
      const body = await r.text().catch(() => "");
      return { error: "api", message: `HTTP ${r.status} — ${body.slice(0, 240)}`, cfg };
    }
    const data = await r.json();
    return { text: data.choices?.[0]?.message?.content || "(no response)" };
  } catch (e) {
    const looksCors = e instanceof TypeError ||
      /NetworkError|Failed to fetch|CORS|Load failed/i.test(String(e && e.message));
    return { error: looksCors ? "cors" : "network", message: String(e && e.message || e), cfg };
  }
}

function buildPlanContext(){
  if (!stack.size && !legacySel.size) return "";
  const s = planSummary();
  const lines = [];
  lines.push(`Account: ${s.acct}`);
  if (wizardState.industry) {
    const t = INDUSTRY_TEMPLATES.find(x => x.id === wizardState.industry);
    if (t) lines.push(`Industry (guided plan): ${t.name}`);
    if (wizardState.size) lines.push(`Size: ${wizardState.size}`);
    if (wizardState.domains.size) {
      const domNames = [...wizardState.domains]
        .map(id => WIZARD_DOMAINS.find(d => d.id === id)?.label).filter(Boolean);
      if (domNames.length) lines.push(`Capabilities confirmed: ${domNames.join(", ")}`);
    }
  } else if (s.profile.vertical || s.profile.size || s.profile.mode) {
    lines.push(`Profile: ${[s.profile.vertical, s.profile.size, s.profile.mode].filter(Boolean).join(" · ")}`);
  }
  lines.push(`Their products (${s.items.length}): ${s.items.map(i => i.name).join(", ")}`);
  if (s.recs.length) lines.push(`Top suggestions: ${s.recs.slice(0, 6).map(r => r.name).join(", ")}`);
  if (s.legacy.length) {
    lines.push(`Legacy / refresh triggers: ${s.legacy.map(l => l.name).join(", ")}`);
    s.legacy.forEach(l => {
      const tos = (l.replaces || []).map(r => nameOf(r)).filter(Boolean).join(", ");
      if (tos) lines.push(`  Migration: ${l.name} → ${tos}`);
    });
  }
  if (s.bundles.length) {
    lines.push(`Strongest bundle: ${s.bundles[0].name} (${s.bundles[0].pct}%)`);
    const weak = s.bundles[s.bundles.length - 1];
    if (weak && weak.pct < 60) lines.push(`Biggest gap: ${weak.name} (${weak.pct}%)`);
  }
  if (wizardState.industry) {
    try { lines.push(`Summary: ${wizardNarrative()}`); } catch(e){}
  }
  return lines.join("\n");
}

   [13] KEYBOARD navigation + ARIA

function wireKeyboardA11y(){
  // Arrow keys to walk between nodes when a node is selected
  document.addEventListener("keydown", ev => {
    // Ignore when typing in inputs
    const tag = (ev.target.tagName || "").toLowerCase();
    if (tag === "input" || tag === "textarea" || tag === "select") return;

    if (ev.key === "/"){ ev.preventDefault(); $("#search").focus(); $("#search").select(); }
    else if (ev.key.toLowerCase() === "p"){ $("#planner-btn").click(); }
    else if (ev.key.toLowerCase() === "g"){ openGuidedWizard(); }
    else if (ev.key.toLowerCase() === "t"){ $("#tl-wrap")?.classList.contains("show") ? closeTimelineView() : openTimelineView(); }
    else if (ev.key.toLowerCase() === "a"){ window.toggleAiPanel?.(); }
    else if (ev.key === "?"){ window.startTour && window.startTour(); }
    else if (selected && ["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(ev.key)){
      ev.preventDefault();
      // Move to neighbor with best directional fit
      const links = LINKS.filter(l => sid(l)===selected.id || tid(l)===selected.id);
      const neighbors = links.map(l => nodeById[sid(l)===selected.id ? tid(l) : sid(l)]);
      if (!neighbors.length) return;
      const dx = ev.key === "ArrowLeft" ? -1 : ev.key === "ArrowRight" ? 1 : 0;
      const dy = ev.key === "ArrowUp"   ? -1 : ev.key === "ArrowDown"  ? 1 : 0;
      const ranked = neighbors.map(n => ({n, score: (n.x - selected.x)*dx + (n.y - selected.y)*dy}))
        .sort((a,b) => b.score - a.score);
      if (ranked[0]) window.jumpTo(ranked[0].n.id);
    }
  });
  // ARIA on icons (each node)
  ndEl.attr("role", "button").attr("tabindex", 0)
      .attr("aria-label", d => `${d.name}, ${CATS[d.category].label} category. Press Enter to view details.`);
  ndEl.on("keydown", function(ev, d){
    if (ev.key === "Enter" || ev.key === " ") { ev.preventDefault(); window.jumpTo(d.id); }
  });
}

function initAmbientBackground(){
  const canvas = document.getElementById("bg-mesh");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  if (!ctx) return;
  const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  const NODE_COUNT = 28;
  const LINK_DIST = 190;
  let w = 0, h = 0;
  let nodes = [];
  let rafId = null;
  let lastTs = 0;

  function resize(){
    const host = document.getElementById("gw");
    w = host?.clientWidth || window.innerWidth;
    h = host?.clientHeight || window.innerHeight;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    canvas.style.width = w + "px";
    canvas.style.height = h + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function initNodes(){
    nodes = Array.from({length: NODE_COUNT}, () => ({
      x: Math.random() * w,
      y: Math.random() * h,
      vx: (Math.random() - 0.5) * (reducedMotion ? 0 : 0.11),
      vy: (Math.random() - 0.5) * (reducedMotion ? 0 : 0.11),
      phase: Math.random() * Math.PI * 2
    }));
  }

  function drawMesh(now){
    const t = now * 0.001;
    const dt = lastTs ? Math.min(0.032, (now - lastTs) / 1000) : 1 / 60;
    lastTs = now;
    ctx.clearRect(0, 0, w, h);

    if (!reducedMotion){
      const edge = 24;
      for (const n of nodes){
        n.x += n.vx * dt * 60;
        n.y += n.vy * dt * 60;
        if (n.x < edge){
          n.x = edge;
          n.vx = Math.abs(n.vx) * 0.96;
        } else if (n.x > w - edge){
          n.x = w - edge;
          n.vx = -Math.abs(n.vx) * 0.96;
        }
        if (n.y < edge){
          n.y = edge;
          n.vy = Math.abs(n.vy) * 0.96;
        } else if (n.y > h - edge){
          n.y = h - edge;
          n.vy = -Math.abs(n.vy) * 0.96;
        }
      }
    }

    for (let i = 0; i < nodes.length; i++){
      for (let j = i + 1; j < nodes.length; j++){
        const a = nodes[i], b = nodes[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const dist = Math.hypot(dx, dy);
        if (dist < LINK_DIST){
          const alpha = (1 - dist / LINK_DIST) * 0.22;
          ctx.strokeStyle = `rgba(2,200,255,${alpha})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }
    }

    for (const n of nodes){
      const pulse = 0.5 + 0.5 * Math.sin(t * 0.85 + n.phase);
      const alpha = 0.26 + pulse * 0.14;
      const radius = 1.45 + pulse * 0.35;
      ctx.fillStyle = `rgba(2,200,255,${alpha})`;
      ctx.beginPath();
      ctx.arc(n.x, n.y, radius, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function tick(now){
    drawMesh(now ?? performance.now());
    if (!reducedMotion) rafId = requestAnimationFrame(tick);
  }

  function start(){
    lastTs = 0;
    tick(performance.now());
    if (!reducedMotion && rafId == null) rafId = requestAnimationFrame(tick);
  }

  function stop(){
    if (rafId != null){ cancelAnimationFrame(rafId); rafId = null; }
  }

  resize();
  initNodes();
  start();

  window.addEventListener("resize", () => { resize(); initNodes(); start(); });
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) stop();
    else start();
  });
}

function wireThemeToggle(){
  const btn = document.getElementById("theme-toggle");
  if (!btn) return;
  const KEY = "cpn-theme-v1";
  const apply = (theme) => {
    if (theme === "light") document.documentElement.setAttribute("data-theme", "light");
    else document.documentElement.removeAttribute("data-theme");
    btn.textContent = theme === "light" ? "🌙 Dark" : "☀ Light";
    btn.title = theme === "light" ? "Switch to dark theme" : "Switch to light theme (presentations)";
    refreshThemeVisuals();
  };
  let theme = "dark";
  try { theme = localStorage.getItem(KEY) || "dark"; } catch (e){}
  apply(theme);
  btn.addEventListener("click", () => {
    theme = document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light";
    apply(theme);
    try { localStorage.setItem(KEY, theme); } catch (e){}
  });
}
