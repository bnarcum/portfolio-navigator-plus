function loadSpriteTextLib(){
  if (window.SpriteText && window.__cpnThreeExtras) return Promise.resolve();
  if (spatialState.spritePromise) return spatialState.spritePromise;
  spatialState.spritePromise = new Promise((resolve, reject) => {
    const onReady = () => {
      if (window.SpriteText && window.__cpnThreeExtras) resolve();
      else { spatialState.spritePromise = null; reject(new Error("sprite-export")); }
    };
    window.addEventListener("spatial-spritetext-ready", onReady, { once: true });
    const s = document.createElement("script");
    s.type = "module";
    s.textContent = `import SpriteText from "./vendor/three-spritetext.mjs";
import { CanvasTexture, Sprite, SpriteMaterial, Group, Mesh, MeshBasicMaterial, MeshLambertMaterial, SphereGeometry, RingGeometry, PlaneGeometry, AmbientLight, DirectionalLight } from "./vendor/three.module.min.js";
window.SpriteText = SpriteText.default || SpriteText;
window.__cpnThreeExtras = { CanvasTexture, Sprite, SpriteMaterial, Group, Mesh, MeshBasicMaterial, MeshLambertMaterial, SphereGeometry, RingGeometry, PlaneGeometry, AmbientLight, DirectionalLight };
window.dispatchEvent(new Event("spatial-spritetext-ready"));`;
    s.onerror = () => {
      window.removeEventListener("spatial-spritetext-ready", onReady);
      spatialState.spritePromise = null;
      reject(new Error("sprite-lib"));
    };
    document.head.appendChild(s);
  });
  return spatialState.spritePromise;
}

function finishSpatialGraphSetup(){
  return ensureSpatialNodeRenderer(0);
}

function spatialHexToRgba(hex, alpha){
  const n = spatialHexToNum(hex);
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return `rgba(${r},${g},${b},${alpha})`;
}

function styleSpatialLabelSprite(sprite, node){
  const palette = spatialCategoryPalette(node);
  const textH = spatialLabelTextHeight(node);
  const isSel = selected && selected.id === node.id;
  const isStk = stack.has(node.id);
  const isHov = spatialState.hoveredId === node.id;
  sprite.color = "#ffffff";
  sprite.textHeight = textH * (isSel ? 1.06 : 1);
  sprite.padding = isSel ? 5 : 4;
  sprite.borderRadius = 8;
  sprite.fontWeight = isSel ? "700" : "600";
  if (isSel){
    sprite.backgroundColor = "rgba(4,20,36,0.88)";
    sprite.strokeColor = "rgba(102,224,255,0.95)";
    sprite.strokeWidth = 0.65;
  } else if (isStk){
    sprite.backgroundColor = spatialHexToRgba(palette.base, 0.32);
    sprite.strokeColor = "rgba(255,215,0,0.85)";
    sprite.strokeWidth = 0.48;
  } else {
    sprite.backgroundColor = spatialHexToRgba(palette.base, isHov ? 0.38 : 0.26);
    sprite.strokeColor = spatialHexToRgba(palette.glow, isHov ? 0.72 : 0.48);
    sprite.strokeWidth = 0.38;
  }
}

function getSpatialLabelSprite(node){
  let sprite = spatialState.labelCache.get(node.id);
  const labelText = spatialDisplayName(node);
  if (!sprite){
    sprite = new SpriteText(labelText);
    sprite.userData.role = "label";
    sprite.padding = 4;
    sprite.borderRadius = 8;
    sprite.fontWeight = "600";
    sprite.center.set(0.5, 0);
    if (sprite.material){
      sprite.material.depthWrite = false;
      sprite.material.depthTest = false;
    }
    spatialState.labelCache.set(node.id, sprite);
  } else if (sprite.text !== labelText){
    sprite.text = labelText;
  }
  styleSpatialLabelSprite(sprite, node);
  return sprite;
}

function refreshSpatialLabelStyles(){
  spatialState.labelCache.forEach((sprite, id) => {
    styleSpatialLabelSprite(sprite, { id, name: spatialResolveName(id) });
  });
}

function getSpatialDims(){
  const gw = document.getElementById("gw");
  return { w: gw ? gw.clientWidth : window.innerWidth, h: gw ? gw.clientHeight : window.innerHeight - 52 };
}

function getFilteredFamilyIds(){
  const vis = new Set();
  NODES.forEach(n => {
    if (familyNodeVisible(n)) vis.add(n.id);
  });
  return vis;
}

function familyPassesTierFilter(n){
  if (facetState.tier.size === 0) return true;
  const tiers = window.__cpnV2?.TIERS;
  const tier = tiers?.[n.id]?.tier || "";
  return [...facetState.tier].some(label => tier.toLowerCase().includes(label.toLowerCase()));
}

function familyNodeVisible(n){
  if (activePillars.size > 0 && !activePillars.has(familyPillar(n.id))) return false;
  if (!activeCats.has(n.category)) return false;
  if (activeUC && !(n.useCases || []).includes(activeUC)) return false;
  if (activeInd && !(n.industries || []).includes(activeInd)) return false;
  if (!familyPassesTierFilter(n)) return false;
  const fProds = PRODUCTS.filter(p => p.family === n.id);
  if (fProds.length === 0){
    const active = facetState.status.size > 0 ? facetState.status : new Set(["current"]);
    return active.has("current");
  }
  return fProds.some(p => productMatchesFilters(p));
}

function buildSpatialGraphData(){
  const vis = getFilteredFamilyIds();
  const nodes = NODES.filter(n => vis.has(n.id)).map(n => ({
    id: n.id,
    name: n.name,
    category: n.category,
    color: CATS[n.category].color,
    val: stack.has(n.id) ? 3 : Math.max(0.6, rscale(degree[n.id] || 0) / 10)
  }));
  const nodeSet = new Set(nodes.map(n => n.id));
  const links = LINKS.filter(l => nodeSet.has(sid(l)) && nodeSet.has(tid(l))).map(l => ({
    source: sid(l), target: tid(l), type: l.type, label: l.label
  }));
  return { nodes, links };
}

function loadSpatialLib(){
  if (window.ForceGraph3D) return Promise.resolve();
  if (spatialState.libPromise) return spatialState.libPromise;
  spatialState.libPromise = new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = SPATIAL_LIB;
    s.async = true;
    s.onload = () => {
      if (window.ForceGraph3D) resolve();
      else { spatialState.libPromise = null; reject(new Error("spatial-export")); }
    };
    s.onerror = () => { spatialState.libPromise = null; reject(new Error("spatial-lib")); };
    document.head.appendChild(s);
  });
  return spatialState.libPromise;
}

function ensureSpatialDOM(){
  let wrap = document.getElementById("spatial-wrap");
  if (wrap){
    const lbl = wrap.querySelector("#spatial-style-bar .ssb-label");
    if (lbl) lbl.textContent = "Views";
    return wrap;
  }
  wrap = document.createElement("div");
  wrap.id = "spatial-wrap";
  wrap.innerHTML = `<div id="spatial-style-bar" role="group" aria-label="Spatial view style">
      <span class="ssb-label">Views</span>
      <button type="button" data-spatial-style="curved" data-title="Curved mesh — all integrations lit">Curved mesh</button>
      <button type="button" data-spatial-style="straight" data-title="Straight spokes — all integrations lit">Straight</button>
      <button type="button" data-spatial-style="focus" data-title="Dim background — click a family to spotlight its links">Focus</button>
    </div>
    <div id="spatial-hud"></div>
    <div id="spatial-graph"></div>`;
  document.getElementById("gw").appendChild(wrap);
  spatialState.linkPreset = readSpatialLinkPreset();
  bindSpatialStyleBar();
  updateSpatialStyleBar();
  updateSpatialHud();
  return wrap;
}

function spatialNodeColor(n){
  if (selected && selected.id === n.id) return "#ffffff";
  if (stack.has(n.id)) return "#FFFFFF";
  return n.color;
}

function configureSpatialBackground(){
  if (!spatialState.graph) return;
  spatialState.graph.backgroundColor("rgba(0,0,0,0)");
  try {
    const ren = spatialState.graph.renderer();
    if (ren){
      ren.setClearColor(0x000000, 0);
      ren.domElement.style.background = "transparent";
    }
    const scene = spatialState.graph.scene();
    if (scene) scene.background = null;
  } catch (e) { /* renderer not ready yet */ }
}

function initSpatialGraph(){
  const el = document.getElementById("spatial-graph");
  if (!el || spatialState.graph) return;
  const { w, h } = getSpatialDims();
  spatialState.graph = ForceGraph3D()(el)
    .width(w).height(h)
    .backgroundColor("rgba(0,0,0,0)")
    .showNavInfo(false)
    .nodeVal("val")
    .linkColor(spatialLinkColorResolved)
    .linkWidth(spatialLinkWidth)
    .linkOpacity(1)
    .linkDirectionalParticles(spatialLinkParticles)
    .linkDirectionalParticleWidth(spatialLinkParticleWidth)
    .linkDirectionalParticleColor(spatialLinkParticleColor)
    .linkDirectionalParticleResolution(spatialLinkParticleResolution)
    .linkDirectionalParticleSpeed(spatialLinkParticleSpeed())
    .onNodeClick(node => {
      const now = Date.now();
      const prev = spatialState.lastNodeClick;
      if (prev && prev.id === node.id && now - prev.time < 400){
        spatialState.lastNodeClick = null;
        if (!spatialState.focusFamily && nodeById[node.id] && PRODUCTS.some(p => p.family === node.id)){
          enterSpatialComposition(node.id);
        }
        return;
      }
      spatialState.lastNodeClick = { id: node.id, time: now };
      setTimeout(() => {
        const lc = spatialState.lastNodeClick;
        if (!lc || lc.id !== node.id || lc.time !== now) return;
        spatialState.lastNodeClick = null;
        if (spatialState.focusFamily && prodById[node.id]){
          selected = null;
          hideTip();
          showProductDetail(node.id);
          if (spatialState.graph){
            refreshSpatialNodeVisuals();
            focusSpatialNode(node.id, 700);
          }
          return;
        }
        const d = nodeById[node.id];
        if (d) selectNodeSpatial(d, node);
      }, 350);
    })
    .onNodeHover(node => {
      document.body.style.cursor = node ? "pointer" : null;
      const next = node?.id || null;
      if (spatialState.hoveredId !== next){
        spatialState.hoveredId = next;
        refreshSpatialNodeVisuals();
      }
    })
    .onLinkHover(link => {
      document.body.style.cursor = link ? "pointer" : null;
      const ev = { clientX: lastPointer.x, clientY: lastPointer.y };
      onLinkPointer(ev, link);
    })
    .onEngineStop(() => {});
  spatialState.graph.graphData({ nodes: [{ id: "__three_probe__", val: 1 }], links: [] });
  configureSpatialBackground();
  configureSpatialForces();
  ensureSpatialLights();

  if (!spatialState.resizeObs){
    spatialState.resizeObs = new ResizeObserver(() => {
      if (!spatialState.active || !spatialState.graph) return;
      const dims = getSpatialDims();
      spatialState.graph.width(dims.w).height(dims.h);
    });
    spatialState.resizeObs.observe(document.getElementById("gw"));
  }
}

function refreshSpatialGraph(){
  if (!spatialState.active) return;
  const data = spatialState.focusFamily
    ? buildSpatialCompositionData(spatialState.focusFamily)
    : buildSpatialGraphData();
  spatialState.filterBoost = spatialFilterBoost();
  spatialState.filterActive = spatialFiltersActive() && !spatialState.focusFamily;
  spatialState.lastStats = spatialState.filterActive ? {
    families: data.nodes.length,
    links: data.links.length,
    direct: data.links.filter(l => l.type === "direct").length,
    adjacent: data.links.filter(l => l.type === "adjacent").length
  } : null;
  if (!spatialState.graph) initSpatialGraph();
  if (!spatialState.graph) return;
  const applyData = (attempt = 0) => {
    if (!ensureSpatialNodeRenderer(attempt)){
      if (attempt < 40) requestAnimationFrame(() => applyData(attempt + 1));
      return;
    }
    preloadSpatialTiles(data.nodes);
    spatialState.graph.graphData(data);
    configureSpatialForces();
    ensureSpatialLights();
    refreshSpatialNodeVisuals();
    refreshSpatialLinkStyles();
    updateSpatialHud();
    scheduleSpatialFit(spatialState.filterActive ? 780 : 920);
  };
  requestAnimationFrame(() => requestAnimationFrame(() => applyData(0)));
}

function focusSpatialNode(id, ms){
  if (!spatialState.graph) return;
  const gData = spatialState.graph.graphData();
  const node = gData.nodes.find(n => n.id === id);
  if (!node || node.x == null) return;
  const dist = spatialState.focusFamily ? 95 : 140;
  spatialState.graph.cameraPosition(
    { x: node.x, y: node.y + 40, z: node.z + dist },
    node,
    ms == null ? 800 : ms
  );
}

function selectNodeSpatial(d, graphNode){
  selected = resolveFamilyForPanel(d);
  hideTip();
  showDetailPanel(selected);
  const pb = document.getElementById("pbody");
  if (pb){ pb.dataset.lastId = d.id; pb.dataset.lastKind = "node"; }
  window.__cpnV2?.phases?.enhanceDetailPanel?.();
  if (spatialState.graph){
    refreshSpatialNodeVisuals();
    refreshSpatialLinkStyles();
    const focus = () => focusSpatialNode(d.id, 700);
    if (graphNode) focus();
    else setTimeout(focus, 500);
  }
}

function validFamilyFocus(id){
  return id && nodeById[id] && PRODUCTS.some(p => p.family === id && productMatchesFilters(p)) ? id : null;
}

function resolveFamilyFocus(opts = {}){
  return validFamilyFocus(opts.focusFamily || viewFocus || spatialState.focusFamily);
}

function enterSpatialView(){
  clearViewTransitionClasses();
  spatialState.active = true;
  spatialState.linkPreset = readSpatialLinkPreset();
  document.body.classList.add("spatial-open");
  updatePillarLegend(false);
  svgEl.style.display = "none";
  const wrap = ensureSpatialDOM();
  wrap.style.display = "block";
  return loadSpatialLib()
    .then(() => loadSpriteTextLib())
    .then(() => {
      if (!spatialState.active) return;
      initSpatialGraph();
      configureSpatialBackground();
      const dims = getSpatialDims();
      if (spatialState.graph) spatialState.graph.width(dims.w).height(dims.h);
    })
    .catch(err => {
      const reason = err && err.message;
      let msg = "Spatial view failed to start.";
      if (reason === "spatial-lib" || reason === "spatial-export"){
        msg = "Spatial view could not load the 3D library.";
      } else if (reason === "sprite-lib" || reason === "sprite-export"){
        msg = "Spatial view could not load label rendering.";
      } else if (!window.WebGLRenderingContext){
        msg = "Spatial view needs WebGL, which is unavailable in this browser.";
      } else {
        msg = "Spatial view failed to start (WebGL may be disabled or unavailable).";
      }
      if (typeof showToast === "function") showToast(msg);
      applyViewLevel("families");
    });
}

function exitSpatialView(){
  spatialState.active = false;
  spatialState.focusFamily = null;
  document.body.classList.remove("spatial-open");
  svgEl.style.display = "block";
  const wrap = document.getElementById("spatial-wrap");
  if (wrap) wrap.style.display = "none";
  document.body.style.cursor = null;
}

// ── Switch the current view level. Public-facing API.
// mode:   "overview" | "families" | "composition" | "all-products" | "spatial"
// opts:   { focusFamily, focusCategory, initial }
function applyViewLevel(mode, opts){
  opts = opts || {};
  const prev = viewMode;

  const applySwitch = () => {
  if (prev === "spatial" && mode !== "spatial"){
    if (mode === "composition" && !opts.focusFamily && spatialState.focusFamily){
      opts.focusFamily = spatialState.focusFamily;
    }
    exitSpatialView();
  }

  if (mode === "spatial"){
    const familyFocus = resolveFamilyFocus(opts);
    viewMode = "spatial";
    viewFocus = null;
    spatialState.focusFamily = familyFocus;
    selected = null;
    closePanel();
    hideTip();
    updateViewModeUI();
    updateBreadcrumb();
    if (!opts.initial){
      try{ localStorage.setItem(VIEW_MODE_KEY, viewMode); }catch(e){}
      try{ localStorage.setItem(VIEW_FOCUS_KEY, familyFocus || ""); }catch(e){}
    }
    enterSpatialView().then(() => {
      applyFilters();
      updateSpatialHud();
      updateBreadcrumb();
      const echoPillar = opts.focusPillar || (familyFocus ? familyPillar(familyFocus) : (singlePillarFocused() ? focusedPillarId() : null));
      if (echoPillar){
        setAmbientPillarTint(echoPillar);
        setTimeout(() => setAmbientPillarTint(null), 2400);
      }
      if (familyFocus) setTimeout(() => focusSpatialNode(familyFocus, 900), 350);
    });
    return;
  }

  if (mode === "composition"){
    const family = opts.focusFamily || viewFocus;
    if (!family || !nodeById[family] || PRODUCTS.filter(p => p.family === family && productMatchesFilters(p)).length === 0){
      // No valid focus — fall back to families.
      mode = "families";
    } else {
      viewFocus = family;
    }
  }
  if (mode !== "composition") viewFocus = null;
  viewMode = mode;
  if (mode !== "composition"){ compositionHoverId = null; compositionOrbitR = 0; pillarHoverId = null; }

  // Build the data set for the new mode.
  if (mode === "overview"){
    clearPillarFilter();
    const v = buildOverviewView();
    viewNodes = v.nodes; viewLinks = v.links;
  } else if (mode === "composition"){
    svg.interrupt();
    clearTimeout(nodeClickTimer);
    nodeClickTimer = null;
    closePanel();
    hideTip();
    clearLinkSelection();
    const v = buildCompositionView(viewFocus);
    viewNodes = v.nodes; viewLinks = v.links;
  } else if (mode === "all-products"){
    const v = buildAllProductsView();
    viewNodes = v.nodes; viewLinks = v.links;
  } else {
    // Families mode = the full graph; optionally focus a category by activating it.
    if (opts.focusPillar) focusPillarOnly(opts.focusPillar);
    else clearPillarFilter();
    viewNodes = NODES.slice(); viewLinks = LINKS.slice();
    // Annotate each family with the count of its specific products so the
    // node renders a "+N" badge in this mode.
    const counts = {};
    PRODUCTS.forEach(p => { if (productMatchesFilters(p)) counts[p.family] = (counts[p.family]||0) + 1; });
    viewNodes.forEach(n => { n._badge = counts[n.id] && counts[n.id] > 1 ? "+"+counts[n.id] : null; });
    if (opts.focusCategory){
      activeCats = new Set([opts.focusCategory]);
      document.querySelectorAll(".cp").forEach(b => {
        b.classList.toggle("off", b.dataset.cat !== opts.focusCategory);
      });
    }
  }

  // Clear any per-node force fixes that would survive across rebinds.
  NODES.forEach(n => {
    if (n._pinned === true) return;
    n.fx = null; n.fy = null; n._pillarPinned = false;
  });

  configureForcesForMode(mode);
  rebindGraph({ restart: !(mode === "families" && usePillarLayout()) });

  // Reset highlight / clear selection on a mode change.
  selected = null; resetHL();

  // Update UI surfaces.
  updateViewModeUI();
  updateBreadcrumb();
  updateCompositionHint();

  // Run the appropriate post-mode filter pass.
  if (mode !== "spatial") applyFilters();

  if (mode === "composition") fitCompositionView();
  if (mode === "composition" && viewFocus && !opts.initial){
    openFamilyProductDrawer(viewFocus);
  }

  // Persist user preference (skip on the initial boot load so we don't clobber).
  if (!opts.initial){
    try{ localStorage.setItem(VIEW_MODE_KEY,  viewMode); }catch(e){}
    try{ localStorage.setItem(VIEW_FOCUS_KEY, viewFocus || ""); }catch(e){}
  }

  // Recenter view after mode change so the user always sees the new content.
  scheduleGraphFit(mode);
  updateCanvasFocusState();
  if (opts.focusPillar) setAmbientPillarTint(opts.focusPillar);
  else if (mode === "overview" || mode === "all-products" || mode === "composition") setAmbientPillarTint(null);
  };

  if (opts.initial || prev === mode) applySwitch();
  else runViewTransition(applySwitch, prev, mode);
}

// ── Force-tuning per mode so each view feels right.
function configureForcesForMode(mode){
  if (mode === "overview"){
    sim.force("charge",  d3.forceManyBody().strength(-200));
    sim.force("collide", d3.forceCollide(d => d._r + 40).strength(0.95));
    sim.force("link").distance(320).strength(0.08);
    sim.force("pillar", null);
  } else if (mode === "composition"){
    sim.force("charge",  d3.forceManyBody().strength(0));
    sim.force("collide", d3.forceCollide(0));
    sim.force("link").distance(() => 1).strength(0);
    sim.force("pillar", null);
  } else if (mode === "all-products"){
    sim.force("charge",  d3.forceManyBody().strength(d => d._kind === "family" ? -380 : -45));
    sim.force("collide", d3.forceCollide(d => d._r + (d._kind === "family" ? 14 : 8)).strength(0.92));
    sim.force("link").distance(d => {
      if (d.type === "composition")  return 32;
      if (d.type === "succession")   return 80;
      if (d.type === "direct")       return 180;
      return 240;
    }).strength(d => d.type === "composition" ? 0.9 : 0.25);
    sim.force("pillar", null);
  } else {
    const pillarLayout = usePillarLayout();
    sim.force("center", pillarLayout ? null : d3.forceCenter(0, 0));
    if (pillarLayout){
      sim.force("charge", d3.forceManyBody().strength(0));
      sim.force("collide", null);
      sim.force("link")
        .distance(d => d.type === "direct" ? 95 : 130)
        .strength(d => {
          const pid = focusedPillarId();
          if (!pid) return 0;
          const sp = familyPillar(sid(d)), tp = familyPillar(tid(d));
          return sp === tp && sp === pid ? (d.type === "direct" ? 0.12 : 0.06) : 0;
        });
      sim.force("pillar", null);
    } else {
      sim.force("center", d3.forceCenter(0, 0));
      sim.force("charge",  d3.forceManyBody().strength(-560));
      sim.force("collide", d3.forceCollide(d => d._r + 30).strength(0.85));
      sim.force("link")
        .distance(d => d.type === "direct" ? 150 : 230)
        .strength(d => d.type === "direct" ? 0.55 : 0.25);
      sim.force("pillar", null);
    }
  }
}

// ── Update the segmented control + disable irrelevant filters.
function updateViewModeUI(){
  const seg = document.getElementById("vm-seg");
  if (seg) seg.querySelectorAll("button[data-vm]").forEach(b => {
    b.classList.toggle("active", b.dataset.vm === viewMode);
  });
  // Composition button enabled only when we have a valid focus to drill into.
  const compBtn = seg && seg.querySelector('button[data-vm="composition"]');
  if (compBtn){
    const compFocus = viewFocus || spatialState.focusFamily;
    const canComp = !!compFocus;
    compBtn.disabled = !canComp && viewMode !== "composition";
    compBtn.title = canComp || viewMode === "composition"
      ? `Composition — ${nodeById[compFocus]?.name || "current focus"}`
      : "Composition — pick a family first";
  }
  // Category pills and filter dropdowns: active in Families + All-Products,
  // muted otherwise (Overview / Composition operate on synthesized data).
  const pills = document.getElementById("cpills");
  const ucs = document.getElementById("ucs");
  const inds = document.getElementById("inds");
  const muted = !(viewMode === "families" || viewMode === "all-products" || viewMode === "spatial");
  [pills, ucs, inds].forEach(el => {
    if (!el) return;
    el.style.opacity = muted ? 0.45 : 1;
    el.style.pointerEvents = muted ? "none" : "auto";
  });
  document.body.classList.toggle("families-mode", viewMode === "families");
  document.body.classList.toggle("overview-mode", viewMode === "overview");
}

// ── Breadcrumb chip rendering (used by Phase-3 polish; built in now so
//    state stays consistent across mode switches).
function updateBreadcrumb(){
  const cb = document.getElementById("vm-crumb"); if (!cb) return;
  if (viewMode === "families"){
    cb.classList.remove("show"); cb.innerHTML = ""; return;
  }
  if (viewMode === "spatial"){
    if (spatialState.focusFamily){
      const fam = nodeById[spatialState.focusFamily];
      cb.innerHTML = `<span class="vm-cb-step" data-spatial-back="1">Spatial</span>
        <span class="vm-cb-sep">›</span>
        <span class="vm-cb-current">${fam?.name || "Family"}</span>
        <button class="vm-cb-x" title="Back to spatial map" aria-label="Close family composition">×</button>`;
    } else {
      cb.innerHTML = `<span class="vm-cb-current">Spatial view</span>
        <button class="vm-cb-x" title="Back to families" aria-label="Close spatial view">×</button>`;
    }
    cb.classList.add("show");
    return;
  }
  if (viewMode === "overview"){
    cb.classList.remove("show"); cb.innerHTML = ""; return;
  }
  // Composition mode breadcrumb: All families › <category> › <family>
  const fam = nodeById[viewFocus]; if (!fam){ cb.classList.remove("show"); return; }
  cb.innerHTML = `
    <span class="vm-cb-step" data-vm-jump="overview">All</span>
    <span class="vm-cb-sep">›</span>
    <span class="vm-cb-step" data-vm-jump="families" data-vm-cat="${fam.category}">${CATS[fam.category].label}</span>
    <span class="vm-cb-sep">›</span>
    <span class="vm-cb-current">${fam.name}</span>
    <button class="vm-cb-x" title="Back to families" aria-label="Close composition view">×</button>`;
  cb.classList.add("show");
}

// Delegate breadcrumb clicks.
document.addEventListener("click", ev => {
  const t = ev.target;
  if (!t || !t.closest) return;
  const crumb = t.closest("#vm-crumb"); if (!crumb) return;
  if (t.matches(".vm-cb-x")){
    if (viewMode === "spatial" && spatialState.focusFamily) exitSpatialComposition();
    else applyViewLevel("families");
    return;
  }
  if (t.matches("[data-spatial-back]")){ exitSpatialComposition(); return; }
  const step = t.closest(".vm-cb-step"); if (!step) return;
  const jumpTo = step.dataset.vmJump;
  if (jumpTo === "overview") applyViewLevel("overview");
  else if (jumpTo === "families"){
    const cat = step.dataset.vmCat;
    applyViewLevel("families", cat ? { focusCategory: cat } : {});
  }
});

window.applyViewLevel = applyViewLevel;
window.getViewMode    = () => viewMode;
window.getViewFocus   = () => viewFocus;
window.getSpatialFocus = () => spatialState.focusFamily;
window.__cpnSpatialGraph = () => spatialState.graph;
window.__cpnSpatialCameraStats = () => {
  const g = spatialState.graph;
  if (!g) return null;
  const pos = g.cameraPosition();
  const nodes = spatialGraphNodes();
  const bounds = spatialNodeBounds(nodes, { minNeeded: 1 });
  let dist = 0;
  if (pos && bounds){
    dist = Math.hypot(pos.x - bounds.cx, pos.y - bounds.cy, pos.z - bounds.cz);
  }
  return {
    nodeCount: nodes.length,
    filterActive: spatialState.filterActive,
    focusFamily: spatialState.focusFamily,
    dist,
    span: bounds?.span ?? 0
  };
};
window.__cpnSpatialTileStats = () => {
  let ready = 0, matrix = 0, pending = 0;
  spatialState.tileCache.forEach((entry, key) => {
    if (entry.ready) ready++;
    else pending++;
    if (key.includes("matrix:")) matrix++;
  });
  const g = spatialState.graph;
  const scene = g?.scene?.();
  let groups = 0, withTile = 0;
  scene?.traverse(o => {
    if (!o.userData?.nodeId) return;
    groups++;
    let hasTile = false;
    o.traverse(c => { if (c.userData?.role === "tile") hasTile = true; });
    if (hasTile) withTile++;
  });
  return { cacheReady: ready, cachePending: pending, cacheMatrix: matrix, groups, withTile };
};
window.__cpnMatrixOverlayOpen = () => matrixOverlayState.open;
window.__cpnMatrixDeviceUrl = (id, view) => matrixDeviceUrl(id, view);
window.__cpnSpatialVisibleLabels = () => {
  let visible = 0;
  spatialState.labelCache.forEach(sprite => {
    if (sprite.visible !== false) visible++;
  });
  return { total: spatialState.labelCache.size, visible };
};

// ── Initial mount: read persisted preferences and render the right view.
(function bootViewLevel(){
  let savedMode = null, savedFocus = null;
  try{
    savedMode  = localStorage.getItem(VIEW_MODE_KEY);
    savedFocus = localStorage.getItem(VIEW_FOCUS_KEY) || null;
  }catch(e){}
  // Validate persisted state. If a composition focus is missing or stale,
  // fall back to Families so the user is never stuck on an empty view.
  if (savedMode === "composition"){
    if (savedFocus && nodeById[savedFocus] && PRODUCTS.some(p => p.family === savedFocus)){
      applyViewLevel("composition", { focusFamily: savedFocus, initial: true });
      return;
    }
  } else if (savedMode === "all-products"){
    applyViewLevel("all-products", { initial: true });
    return;
  } else if (savedMode === "spatial"){
    const ff = validFamilyFocus(savedFocus);
    applyViewLevel("spatial", { focusFamily: ff || undefined, initial: true });
    return;
  }
  applyViewLevel("overview", { initial: true });
})();

function applyConnectionHighlight(d, depth = connectionHighlightDepth){
  if (viewMode === "composition"){
    applyCompositionNodeStyles();
    return;
  }
  if (viewMode === "all-products"){
    applyAllProductsNodeStyles(d);
    const conn = connectionNodeSet(d.id, depth);
    if (lviz) lviz.each(function(l){
      const s = sid(l), t = tid(l);
      const inSet = conn.has(s) && conn.has(t);
      const mine = s === d.id || t === d.id;
      d3.select(this).attr("stroke", inSet ? catColor(d.category) : "#0d2847")
        .attr("stroke-opacity", inSet ? (mine ? 1 : .55) : .06)
        .attr("stroke-width", inSet ? (mine ? (l.type === "direct" ? 2.5 : 1.5) : 1.2) : (l.type === "direct" ? 1.8 : 1));
    });
    return;
  }
  if (usePillarLayout()){
    applyPillarNodeVisualState(d);
    applyPillarLabelStyles(d);
    const conn = connectionNodeSet(d.id, depth);
    if (lviz) lviz.attr("stroke-opacity", l => {
      const s = sid(l), t = tid(l);
      const lit = conn.has(s) && conn.has(t);
      if (!lit) return pillarLinkOpacity(l) * 0.35;
      return l.type === "direct" ? 0.62 : 0.38;
    });
    return;
  }
  const conn = connectionNodeSet(d.id, depth);
  ndEl.each(function(nd){
    const isSel = nd.id === d.id, isC = conn.has(nd.id);
    d3.select(this).select(".gr").attr("fill-opacity", isSel ? .3 : 0);
    d3.select(this).select(".mc").attr("fill-opacity", isC ? .95 : .1).attr("stroke", isSel ? "#fff" : "transparent");
    d3.select(this).select(".icn").attr("opacity", isC ? 1 : .12);
    d3.select(this).select(".nl").style("fill", isC ? (isSel ? GRAPH_LABEL.active : GRAPH_LABEL.connected) : GRAPH_LABEL.muted);
  });
  lviz.each(function(l){
    const s = sid(l), t = tid(l);
    const inSet = conn.has(s) && conn.has(t);
    const mine = s === d.id || t === d.id;
    d3.select(this).attr("stroke", inSet ? catColor(d.category) : "#0d2847")
      .attr("stroke-opacity", inSet ? (mine ? 1 : .55) : .08)
      .attr("stroke-width", inSet ? (mine ? (l.type === "direct" ? 2.5 : 1.5) : 1.2) : (l.type === "direct" ? 1.8 : 1));
  });
}

function selectNode(d, opts = {}) {
  if (opts.connectionDepth) connectionHighlightDepth = opts.connectionDepth;
  clearLinkSelection();
  selected = d; hideTip();
  applyConnectionHighlight(d, connectionHighlightDepth);
  if (usePillarLayout()) applyPillarNodeVisualState(d);
  showDetailPanel(d);
  if (viewMode === "spatial"){
    focusSpatialNode(d.id, 700);
    if (spatialState.graph){
      refreshSpatialNodeVisuals();
      refreshSpatialLinkStyles();
    }
    syncAmbientReactivity(null);
    return;
  }
  if (viewMode === "composition"){
    if (d._kind === "family") fitCompositionView();
    else {
      const t = d3.zoomTransform(svgEl);
      applyGraphTransform(d.x, d.y, Math.max(t.k, 0.85), true);
    }
    return;
  }
  const {w,h}=getDims(), t=d3.zoomTransform(svgEl);
  const pw=plannerOpen?490:390;
  svg.transition().duration(500).call(zoom.transform,
    d3.zoomIdentity.translate(-d.x*t.k+(w-pw)/2,-d.y*t.k+h/2).scale(t.k));
}

function resetHL() {
  if (viewMode === "spatial"){
    if (spatialState.graph){
      refreshSpatialNodeVisuals();
      refreshSpatialLinkStyles();
    }
    syncAmbientReactivity(null);
    return;
  }
  if (viewMode === "all-products"){
    applyAllProductsNodeStyles(null);
    return;
  }
  if (viewMode === "composition"){
    compositionHoverId = null;
    applyCompositionNodeStyles();
    return;
  }
  if (usePillarLayout()){
    applyPillarNodeVisualState(null);
    if (lviz && singlePillarFocused()) lviz.attr("stroke-opacity", pillarLinkOpacity);
    else if (lviz) lviz.attr("stroke-opacity", l => pillarLinkOpacity(l));
    applyPillarLabelStyles(null);
    return;
  }
  ndEl.each(function(nd){
    const inStk=stack.has(nd.id);
    d3.select(this).select(".gr").attr("fill-opacity",inStk?.25:0);
    d3.select(this).select(".mc").attr("fill-opacity",inStk?1:.88).attr("stroke",inStk?"#fff":"transparent");
    d3.select(this).select(".icn").attr("opacity",1);
    d3.select(this).select(".nl").style("fill", GRAPH_LABEL.default);
  });
  lviz.attr("stroke",d=>d.type==="direct"?"#4a5568":"#2d3748")
    .attr("stroke-opacity",d=>d.type==="direct"?.75:.45)
    .attr("stroke-width",d=>d.type==="direct"?1.8:1);
}

function highlightStack() {
  if (viewMode === "spatial"){
    if (spatialState.graph) refreshSpatialNodeVisuals();
    return;
  }
  if (viewMode === "composition"){
    if (selected) return;
    resetHL();
    return;
  }
  if (viewMode === "all-products"){
    if (selected) return;
    if (!stack.size){ resetHL(); return; }
    applyAllProductsNodeStyles(null);
    ndEl.each(function(nd){
      if (stack.has(nd.id)) return;
      d3.select(this).select(".mc").attr("fill-opacity", 0.22);
      d3.select(this).select(".icn").attr("opacity", 0.2);
    });
    lviz.each(function(l){
      const s=sid(l),t=tid(l),both=stack.has(s)&&stack.has(t);
      d3.select(this).attr("stroke",both?"#525E6C":"#0d2847")
        .attr("stroke-opacity",both?.6:.04).attr("stroke-width",both?2:1);
    });
    return;
  }
  if (usePillarLayout()){
    if (selected) return;
    applyPillarNodeVisualState(null);
    return;
  }
  if(selected) return; if(!stack.size){ resetHL(); return; }
  ndEl.each(function(nd){
    const inStk=stack.has(nd.id);
    d3.select(this).select(".gr").attr("fill-opacity",inStk?.3:0);
    d3.select(this).select(".mc").attr("fill-opacity",inStk?1:.2).attr("stroke",inStk?"#fff":"transparent");
    d3.select(this).select(".icn").attr("opacity",inStk?1:.18);
    d3.select(this).select(".nl").style("fill", inStk ? GRAPH_LABEL.active : GRAPH_LABEL.default);
  });
  lviz.each(function(l){
    const s=sid(l),t=tid(l),both=stack.has(s)&&stack.has(t);
    d3.select(this).attr("stroke",both?"#525E6C":"#0d2847")
      .attr("stroke-opacity",both?.6:.04).attr("stroke-width",both?2:1);
  });
}

window.jumpTo = (id, opts = {}) => {
  const d=nodeById[id]; if(!d) return;
  if (opts.connectionDepth) connectionHighlightDepth = opts.connectionDepth;
  if (opts.closePanel) closePanel();
  activeCats=new Set(Object.keys(CATS)); activeUC=""; activeInd="";
  ucEl.value=""; indEl.value="";
  document.querySelectorAll(".cp").forEach(b=>b.classList.remove("off"));
  if (viewMode === "spatial"){
    applyFilters();
    selectNodeSpatial(d);
    return;
  }
  // Auto-promote to Families if we're sitting in Overview/Composition so the
  // user always lands on the family graph when they pick a family from search.
  if (viewMode !== "families"){
    applyViewLevel("families");
    setTimeout(() => { applyFilters(); selectNode(d, opts); }, 360);
    return;
  }
  applyFilters(); setTimeout(()=>selectNode(d, opts),60);
};

// ── Filtering
/* Facet state — default shows Current products only; EoS is always hidden. */

function productStatusVisible(p){
  if (!p) return false;
  if (p.status === "eos") return false;
  const active = facetState.status.size > 0 ? facetState.status : new Set(["current"]);
  return active.has(p.status);
}

/* Single source of truth for "does this product pass the current filters?".
   Mirrors the all-products branch of applyFilters() below — product category
   must be active, and the product's FAMILY must include the active use-case
   and industry (products don't carry useCases/industries directly; they
   inherit them from their family node). Status/tier facets apply here too.
   Reused by timeline, composition, search, and panels. */
function productMatchesFilters(p){
  if (!p) return false;
  if (!activeCats.has(p.category)) return false;
  const fam = nodeById[p.family];
  if (activeUC  && !((fam?.useCases  || []).includes(activeUC )))  return false;
  if (activeInd && !((fam?.industries|| []).includes(activeInd)))  return false;
  if (!productStatusVisible(p)) return false;
  if (facetState.tier.size > 0){
    const tiers = window.__cpnV2?.TIERS;
    const tier = tiers?.[p.family]?.tier || "";
    if (![...facetState.tier].some(label => tier.toLowerCase().includes(label.toLowerCase()))) return false;
  }
  return true;
}
/* Refresh the Timeline view if it's open. renderTimeline lives inside the
   v2 IIFE while applyFilters() is in the outer scope, so we reach it through
   the documented `window.__cpnV2.phases.renderTimeline` export rather than a
   direct call (which would be a ReferenceError). Safe to call before v2 has
   booted — the optional chaining short-circuits to no-op. */
function refreshTimelineIfOpen(){
  if (!document.querySelector("#tl-wrap.show")) return;
  window.__cpnV2?.phases?.renderTimeline?.();
}
function applyFilters() {
  if (viewMode === "composition" && viewFocus){
    const v = buildCompositionView(viewFocus);
    viewNodes = v.nodes;
    viewLinks = v.links;
    rebindGraph();
    if (ndEl) ndEl.style("display", null);
    if (lviz) lviz.style("display", null);
    if (lhit) lhit.style("display", null);
    applyCompositionNodeStyles();
    updateCompositionHint();
    refreshTimelineIfOpen();
    fitCompositionView();
    scheduleGraphFit("composition");
    updateCanvasFocusState();
    return;
  }
  if (viewMode === "overview"){
    const badge = document.getElementById("fbadge"); if (badge) badge.style.display = "none";
    refreshTimelineIfOpen();
    updateCanvasFocusState();
    return;
  }
  if (viewMode === "spatial"){
    updatePillarLegend(false);
    const vis = getFilteredFamilyIds();
    const badge = document.getElementById("fbadge");
    const f = activeUC || activeInd || activeCats.size < Object.keys(CATS).length
      || facetState.status.size !== 1 || !facetState.status.has("current") || facetState.tier.size > 0;
    if (f && badge){
      badge.textContent = `Showing ${vis.size} of ${NODES.length} portfolio families`;
      badge.style.display = "block";
    } else if (badge) badge.style.display = "none";
    refreshSpatialGraph();
    refreshTimelineIfOpen();
    updateCanvasFocusState();
    return;
  }
  const vis=new Set();
  if (viewMode === "all-products"){
    NODES.forEach(n => { if (familyNodeVisible(n)) vis.add(n.id); });
    PRODUCTS.forEach(p => { if (productMatchesFilters(p)) vis.add(p.id); });
  } else {
    NODES.forEach(n => { if (familyNodeVisible(n)) vis.add(n.id); });
  }
  if (ndEl) ndEl.style("display",d=>vis.has(d.id)?null:"none");
  if (lviz) lviz.style("display",l=>vis.has(sid(l))&&vis.has(tid(l))?null:"none");
  if (lhit) lhit.style("display",l=>vis.has(sid(l))&&vis.has(tid(l))?null:"none");
  const badge=document.getElementById("fbadge");
  const f=activePillars.size>0||activeUC||activeInd||activeCats.size<Object.keys(CATS).length
    || facetState.status.size !== 1 || !facetState.status.has("current") || facetState.tier.size > 0;
  if(f){
    const total = viewMode === "all-products" ? (NODES.length + PRODUCTS.length) : NODES.length;
    const label = viewMode === "all-products" ? "items" : "portfolio families";
    if (activePillars.size > 0 && viewMode === "families"){
      const names = [...activePillars].map(id => PILLAR_ZONE_BY_ID[id]?.shortLabel || id).join(" + ");
      badge.textContent = `${names} · ${vis.size} families · Click All pillars or Reset to show all`;
    } else if (viewMode === "all-products"){
      badge.textContent = `Showing ${vis.size} of ${total} ${label} · Hover products for names · dense power-user view`;
    } else {
      badge.textContent=`Showing ${vis.size} of ${total} ${label}`;
    }
    badge.style.display="block";
  }
  else badge.style.display="none";
  if (viewMode === "families"){
    if (activePillars.size > 0 && !usePillarLayout()) clearPillarFilter();
    if (usePillarLayout()){
      applyPillarLayout(vis);
      if (lviz){
        lviz.style("display", l => vis.has(sid(l)) && vis.has(tid(l)) && pillarLinkOpacity(l) > 0 ? null : "none");
        lviz.attr("stroke-opacity", pillarLinkOpacity);
      }
      if (lhit) lhit.style("display", l => vis.has(sid(l)) && vis.has(tid(l)) && pillarLinkOpacity(l) > 0 ? null : "none");
    } else {
      viewNodes.forEach(n => {
        if (!n._pinned){
          n.fx = null; n.fy = null; n._shortName = null;
          if (nodeById[n.id]) n._r = rscale(degree[n.id] || 0);
        }
      });
      configureForcesForMode("families");
      sim.alpha(0.55).restart();
      if (lviz) lviz.style("display", null);
      if (lhit) lhit.style("display", null);
    }
    applyPillarLabelStyles(selected);
    updatePillarGuides();
  }
  refreshTimelineIfOpen();
  if (viewMode === "families" || viewMode === "composition") scheduleGraphFit(viewMode);
  updateCanvasFocusState();
}

function resetAll() {

const searchEl=document.getElementById("search"), srEl=document.getElementById("sr");
let srActiveIdx = -1;

function updateSearchHighlight(){

searchEl.addEventListener("input",()=>{
  const q=searchEl.value.trim().toLowerCase();

  if(!q){srEl.style.display="none";return;}

  const nMatch=NODES.filter(n=>
    n.name.toLowerCase().includes(q)||n.desc.toLowerCase().includes(q)||
    n.useCases.some(u=>u.toLowerCase().includes(q))||n.industries.some(i=>i.toLowerCase().includes(q))||
    CATS[n.category].label.toLowerCase().includes(q)).slice(0,5);

  const pMatch=PRODUCTS.filter(p=>
    productMatchesFilters(p) && (

    (p.successor&&(prodById[p.successor]||nodeById[p.successor])?.name.toLowerCase().includes(q)))).slice(0,8);

  const dMatch = typeof window.dcloudSearchEntries === "function" ? window.dcloudSearchEntries(q, 8) : [];

      srEl.style.display = "none";
      srEl.innerHTML = "";

      onSelect();
    });

  if(pMatch.length){
    const hdr=document.createElement("div"); hdr.className="sr-group"; hdr.textContent="Specific Products";

      const fam = nodeById[p.family];

        p.name,
        `${CATS[p.category].label} · ${fam?.name||""}`,

        () => {

            applyViewLevel("composition", { focusFamily: p.family });

      const sub = [e.duration, e.level, e.demoType === "instant" ? "Instant" : "Scheduled", famLabel].filter(Boolean).join(" · ");
      const btn = makeSearchItem(

      if (textWrap){

    browse.type = "button";
    browse.className = "sri";
    browse.style.cssText = "width:100%;border:none;background:transparent;color:inherit;font:inherit;text-align:left";
    browse.innerHTML = `<div class="sri-dot sri-dot--dcloud" style="pointer-events:none"></div>
      <div class="sri-text" style="pointer-events:none"><div style="font-size:12px;font-weight:600;color:var(--accent)">Browse all dCloud labs…</div></div>`;
    browse.addEventListener("click", ev => {
      ev.preventDefault();
      searchEl.value = "";
      srEl.style.display = "none";
      srEl.innerHTML = "";
      if (typeof window.openDcloudBrowser === "function") window.openDcloudBrowser({ query: q });
    });
    srEl.appendChild(browse);
  }
  srEl.style.display="block";
  srActiveIdx = 0;
  updateSearchHighlight();
});

document.addEventListener("click", ev => {
  if (srEl.style.display === "block" && !srEl.contains(ev.target) && ev.target !== searchEl) {
    srEl.style.display = "none";
    srActiveIdx = -1;
  }
});
searchEl.addEventListener("keydown",ev=>{
  const items = srEl.querySelectorAll(".sri");
  if (ev.key === "ArrowDown" && items.length){
    ev.preventDefault();
    srActiveIdx = Math.min(srActiveIdx + 1, items.length - 1);
    updateSearchHighlight();
  } else if (ev.key === "ArrowUp" && items.length){
    ev.preventDefault();
    srActiveIdx = Math.max(srActiveIdx - 1, 0);
    updateSearchHighlight();
  } else if (ev.key === "Enter" && srActiveIdx >= 0 && items[srActiveIdx]){
    ev.preventDefault();
    items[srActiveIdx].click();
  } else if (ev.key === "Escape"){
    searchEl.value="";
    srEl.style.display="none";
    srActiveIdx = -1;
  }
});

// Stack items: {id, type: "node"|"product"}
const stackItems = new Map(); // id -> type

function addToStack(id, type) {
  if(stackItems.has(id)) return;
  stackItems.set(id, type);
  stack.add(id);
  renderChips(); updateAB(); highlightStack();
  if(analyzed) runAnalysis();
}
function removeFromStack(id) {
  stackItems.delete(id); stack.delete(id);
  renderChips(); updateAB(); highlightStack();
  if(analyzed) runAnalysis();
}
// addToStack & removeFromStack are exposed on window automatically via top-level
// function declarations in classic scripts — DO NOT reassign window.addToStack
// (that creates a self-referencing arrow → infinite recursion).

function getEffectiveNodeId(id) {
  // For products, return their family node ID for graph analysis
  if(stackItems.get(id)==="product") return prodById[id]?.family || id;
  return id;
}

function stackPillarCoverage(){
  const eff = new Set([...stack].map(id => getEffectiveNodeId(id)));
  const hit = { "ai-dc": false, workplaces: false, resilience: false };
  eff.forEach(id => { if (nodeById[id]) hit[familyPillar(id)] = true; });
  return hit;
}
function renderPillarCoverage(){
  let el = document.getElementById("pillar-cov");
  if (!el){
    el = document.createElement("div");
    el.id = "pillar-cov";
    el.className = "pillar-cov";
    chipsEl.parentNode.insertBefore(el, chipsEl);
  }
  if (!stack.size){ el.innerHTML = ""; el.style.display = "none"; return; }
  const hit = stackPillarCoverage();
  const rows = ONE_CISCO.pillars;
  el.style.display = "block";
  el.innerHTML = `<div class="pillar-cov-t">One Cisco pillars represented</div>
    <div class="pillar-cov-row">${rows.map(r =>
      `<span class="pillar-pill ${hit[r.id] ? "on" : "off"}" style="--pc:${r.color}">${r.shortLabel}</span>`
    ).join("")}</div>`;
}

function renderChips() {
  stackCntEl.textContent=`${stack.size} product${stack.size!==1?"s":""}`;
  renderPillarCoverage();
  chipsEl.innerHTML="";
  [...stack].forEach(id=>{
    const isProd=stackItems.get(id)==="product";
    const item=isProd?prodById[id]:nodeById[id]; if(!item) return;
    const isEol=isProd&&item.status==="eol";
    const isEos=isProd&&item.status==="eos";
    const chip=document.createElement("span");
    chip.className=`chip${isEol?" eol-chip":isEos?" eos-chip":""}`;
    if(!isEol&&!isEos) chip.style.cssText=`background:${catColor(item.category)}22;border:1px solid ${catColor(item.category)}55;color:${catColor(item.category)}`;
    chip.innerHTML=`${item.name}${isEol?" ⚠":isEos?" ▲":""} <button class="chip-x" onclick="removeFromStack('${id}')">&#xd7;</button>`;
    chipsEl.appendChild(chip);
  });
  updatePlannerUI();
}

ab.addEventListener("click",()=>{
  const wasAnalyzed=analyzed;
  analyzed=true;
  plannerSetupExpanded=false;
  window.runAnalysis();
  updatePlannerUI();

function runAnalysis() {
  // Build effective node set for graph analysis (map products to family nodes)
  const effectiveNodes = new Set([...stack].map(id=>getEffectiveNodeId(id)));

  // Score non-stack family nodes
  const scores = {};
  NODES.forEach(n=>{ if(!effectiveNodes.has(n.id)) scores[n.id]={direct:0,adjacent:0,connTo:[]}; });

  LINKS.forEach(l=>{
    const s=sid(l),t=tid(l);
    const sIn=effectiveNodes.has(s),tIn=effectiveNodes.has(t);
    if(sIn&&!effectiveNodes.has(t)&&scores[t]){
      if(l.type==="direct"){scores[t].direct++;scores[t].connTo.push({id:s,label:l.label});}
      else{scores[t].adjacent++;scores[t].connTo.push({id:s,label:l.label});}
    }
    if(tIn&&!effectiveNodes.has(s)&&scores[s]){
      if(l.type==="direct"){scores[s].direct++;scores[s].connTo.push({id:t,label:l.label});}
      else{scores[s].adjacent++;scores[s].connTo.push({id:t,label:l.label});}
    }
  });

  const stackUCs=new Set([...effectiveNodes].flatMap(id=>nodeById[id]?.useCases||[]));
  NODES.forEach(n=>{ if(!scores[n.id]) return; scores[n.id].ucScore=n.useCases.filter(u=>stackUCs.has(u)).length; });

  const recs=Object.entries(scores)
    .filter(([,s])=>s.direct>0||s.adjacent>0)
    .map(([id,s])=>({
      id, node:nodeById[id],
      score:s.direct*3+s.adjacent+s.ucScore*0.5,
      direct:s.direct,adjacent:s.adjacent,
      connTo:[...new Map(s.connTo.map(c=>[c.id,c])).values()],
      priority:s.direct>=3?1:s.direct>=1?2:3
    })).sort((a,b)=>b.score-a.score);

  // Replacements: from legacy selection AND from EOL products in stack
  const replacements=[];
  legacySel.forEach(legId=>{
    const leg=LEGACY_NODES.find(l=>l.id===legId); if(!leg) return;
    leg.replaces.forEach(repId=>{
      if(!effectiveNodes.has(repId)&&!replacements.some(r=>r.toId===repId&&r.fromName===leg.name))
        replacements.push({fromName:leg.name,toId:repId,toNode:nodeById[repId],reason:leg.reason,isLegacy:true});
    });
  });
  // EOL/EOS products in stack
  [...stack].forEach(id=>{
    if(stackItems.get(id)!=="product") return;
    const p=prodById[id]; if(!p||p.status==="current") return;
    if(p.successor){
      const succ=prodById[p.successor]||nodeById[p.successor];
      if(succ&&!stack.has(p.successor)&&!replacements.some(r=>r.fromName===p.name))
        replacements.push({fromName:p.name,toId:p.successor,toNode:succ,
          reason:p.migNote||"Upgrade to the current replacement product.",
          eosDate:p.eosDate,eolDate:p.eolDate,isEol:true});
    }
  });

  const stackCats=new Set([...effectiveNodes].map(id=>nodeById[id]?.category).filter(Boolean));
  const missCats=Object.keys(CATS).filter(c=>!stackCats.has(c));

  const bundles=BUNDLES.map(b=>{
    const owned=b.products.filter(p=>effectiveNodes.has(p));
    return {...b,owned,missing:b.products.filter(p=>!effectiveNodes.has(p)),
      pct:Math.round(owned.length/b.products.length*100)};
  }).sort((a,b)=>b.pct-a.pct);

  const covUCs=[...stackUCs].sort();
  const allUCSet=new Set(NODES.flatMap(n=>n.useCases));
  const gapUCs=[...allUCSet].filter(u=>!stackUCs.has(u)).sort();

  document.getElementById("no-analysis").style.display="none";
  document.getElementById("stack-hint").style.display="none";
  document.getElementById("analysis-results").style.display="block";
  document.getElementById("rec-cnt").textContent=recs.length+missCats.length;
  document.getElementById("rep-cnt").textContent=replacements.length;

  renderRecs(recs, missCats, stackCats);
  renderReps(replacements);
  renderBundles(bundles);
  renderCov(covUCs, gapUCs, stackCats, missCats);
}

// Export
document.getElementById("exp-btn").addEventListener("click",()=>{
  const acct=document.getElementById("acct-name").value.trim()||"Unnamed Account";
  const date=new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
  let out=`CISCO ACCOUNT PLAN\n${"─".repeat(52)}\nAccount:   ${acct}\nGenerated: ${date}\n\n`;
  out+=`THEIR PRODUCTS (${stack.size} items)\n${"─".repeat(40)}\n`;
  [...stack].forEach(id=>{
    const isProd=stackItems.get(id)==="product";
    const item=isProd?prodById[id]:nodeById[id];
    const stat=isProd&&item.status!=="current"?` [${item.status.toUpperCase()}]`:"";
    out+=`  • ${item?.name||id}${stat} (${CATS[item?.category]?.label||""})\n`;
  });
  const legArr=[...legacySel].map(id=>LEGACY_NODES.find(l=>l.id===id)).filter(Boolean);
  if(legArr.length){
    out+=`\nLEGACY / OUTGOING TECHNOLOGY\n${"─".repeat(40)}\n`;
    legArr.forEach(l=>{const m=l.replaces.map(id=>(nodeById[id]||prodById[id])?.name||id).join(", ");out+=`  • ${l.name}  →  ${m}\n`;});
  }
  if(analyzed){
    const effNodes=new Set([...stack].map(id=>getEffectiveNodeId(id)));
    const sc={};NODES.forEach(n=>{if(!effNodes.has(n.id))sc[n.id]={d:0,a:0};});
    LINKS.forEach(l=>{const s=sid(l),t=tid(l);
      if(effNodes.has(s)&&!effNodes.has(t)&&sc[t])l.type==="direct"?sc[t].d++:sc[t].a++;
      if(effNodes.has(t)&&!effNodes.has(s)&&sc[s])l.type==="direct"?sc[s].d++:sc[s].a++;});
    const top=Object.entries(sc).filter(([,s])=>s.d>0)
      .map(([id,s])=>({id,n:nodeById[id],score:s.d*3+s.a}))
      .sort((a,b)=>b.score-a.score).slice(0,5);
    out+=`\nTOP SUGGESTIONS\n${"─".repeat(40)}\n`;
    top.forEach((r,i)=>out+=`  ${i+1}. ${r.n?.name} (${CATS[r.n?.category]?.label}) — score: ${r.score}\n`);
    const sUCs=new Set([...effNodes].flatMap(id=>nodeById[id]?.useCases||[]));
    const aUCs=[...new Set(NODES.flatMap(n=>n.useCases))].sort();
    out+=`\nNEEDS ADDRESSED\n${"─".repeat(40)}\n`;
    aUCs.forEach(u=>out+=`  ${sUCs.has(u)?"✓":"✗"} ${u}\n`);
    out+=`\nSOLUTION PACKAGES\n${"─".repeat(40)}\n`;
    BUNDLES.forEach(b=>{const own=b.products.filter(p=>effNodes.has(p)).length;const pct=Math.round(own/b.products.length*100);
      const bar="█".repeat(Math.round(pct/10))+"░".repeat(10-Math.round(pct/10));
      out+=`  ${b.name.padEnd(30)} ${bar} ${pct}% (${own}/${b.products.length})\n`;});
  }
  out+=`\n${"─".repeat(52)}\nGenerated by Portfolio Navigator Plus\n`;
  navigator.clipboard.writeText(out).then(()=>showToast("Plan copied to clipboard!")).catch(()=>{
    const a=document.createElement("a");a.href="data:text/plain;charset=utf-8,"+encodeURIComponent(out);
    a.download=`Cisco_Plan_${acct.replace(/\s+/g,"-")}.txt`;a.click();showToast("Plan downloaded!");
  });
});

  let stepIdx = 0;

  function start() {
    stepIdx = 0; active = true;
    backdrop.classList.add("show");
    fab.classList.remove("pulse");
    fab.classList.remove("new-badge");

  }
  function end(completed = true) {
    active = false;
    backdrop.classList.remove("show");
    spotlight.classList.remove("show");
    popover.classList.remove("show");
    // Tidy any state that step.before() may have left around
    try {
      document.getElementById("plans-menu")?.classList.remove("show");
      document.getElementById("exp-menu")?.classList.remove("show");
      document.getElementById("cmp-panel")?.classList.remove("open");

        localStorage.setItem(STORAGE_KEY_LATEST, TOUR_VERSION);
      } catch(e){}
    }
  }
  function showStep() {
    const step = STEPS[stepIdx];
    if (!step) { end(true); return; }
    if (step.before) {
      try { step.before(); } catch(e){ console.warn("tour step.before failed", e); }
    }
    // Render content
    const isFirst = stepIdx === 0;
    const isLast = stepIdx === STEPS.length - 1;
    const dots = STEPS.map((_, i) => {
      const cls = i === stepIdx ? "tp-dot active" : (i < stepIdx ? "tp-dot done" : "tp-dot");
      return `<span class="${cls}"></span>`;
    }).join("");
    const primText = isLast ? (step.finalBtnText || "Done") : (step.ctaText || "Next →");
    popover.innerHTML = `
      <div class="tp-step">Step ${stepIdx + 1} of ${STEPS.length}</div>
      <div class="tp-title">${step.title}</div>
      <div class="tp-body">${step.body}</div>
      ${step.tip ? `<div class="tp-tip">${step.tip}</div>` : ""}
      <div class="tp-bar">
        <div class="tp-dots">${dots}</div>
        <div class="tp-btns">
          ${!isFirst ? `<button class="tp-btn" data-act="back">Back</button>` : ""}
          ${!isLast  ? `<button class="tp-btn skip" data-act="skip">Skip</button>` : ""}
          <button class="tp-btn prim" data-act="next">${primText}</button>
        </div>
      </div>
    `;
    // Position spotlight + popover (wait for before() DOM/layout — e.g. Guided Plan wizard open)
    requestAnimationFrame(() => {
      requestAnimationFrame(() => positionStep(step));
    });
  }
  function positionStep(step) {
    // Reset arrow classes
    popover.className = "";

    if (!step.target || step.place === "center") {
      spotlight.classList.remove("show");
      spotlight.classList.add("centered");
      popover.classList.add("center", "show");
      return;
    }
    spotlight.classList.remove("centered");
    const el = document.querySelector(step.target);
    if (!el) {
      // Target missing — fall back to centered
      spotlight.classList.remove("show");
      popover.classList.add("center", "show");
      return;
    }
    const r = el.getBoundingClientRect();
    const pad = 6;
    spotlight.style.top    = (r.top  - pad) + "px";
    spotlight.style.left   = (r.left - pad) + "px";
    spotlight.style.width  = (r.width  + pad*2) + "px";
    spotlight.style.height = (r.height + pad*2) + "px";
    spotlight.classList.add("show");

    // Show popover hidden first to measure
    popover.style.visibility = "hidden";
    popover.classList.add("show");
    const pr = popover.getBoundingClientRect();
    const vw = window.innerWidth, vh = window.innerHeight;
    const gap = 14;

    // Choose placement (use hint or auto)
    let place = step.place;
    if (!place) {
      // pick the side with most room
      const room = { bottom: vh - r.bottom, top: r.top, right: vw - r.right, left: r.left };
      place = Object.entries(room).sort((a,b)=>b[1]-a[1])[0][0];
    }
    let top, left;
    if (place === "bottom") {
      top  = r.bottom + gap;
      left = Math.max(10, Math.min(vw - pr.width - 10, r.left + r.width/2 - 30));
      popover.classList.add("arrow-top");
    } else if (place === "top") {
      top  = r.top - pr.height - gap;
      left = Math.max(10, Math.min(vw - pr.width - 10, r.left + r.width/2 - 30));
      popover.classList.add("arrow-bottom");
    } else if (place === "left") {
      left = r.left - pr.width - gap;
      top  = Math.max(10, Math.min(vh - pr.height - 10, r.top + r.height/2 - 30));
      popover.classList.add("arrow-right");
    } else { // right
      left = r.right + gap;
      top  = Math.max(10, Math.min(vh - pr.height - 10, r.top + r.height/2 - 30));
      popover.classList.add("arrow-left");
    }

    // Clamp on-screen
    if (top  < 10) top  = 10;
    if (left < 10) left = 10;
    if (top + pr.height > vh - 10) top = vh - pr.height - 10;
    if (left + pr.width > vw - 10) left = vw - pr.width - 10;

    popover.style.top  = top  + "px";
    popover.style.left = left + "px";
    popover.style.visibility = "";

    // Scroll target into view if needed
    if (r.top < 0 || r.bottom > vh) {
      el.scrollIntoView({ behavior: "smooth", block: "center" });
    }
  }

  // Re-position on window resize while tour is active
  window.addEventListener("resize", () => {
    if (active) positionStep(STEPS[stepIdx]);
  });

  // Popover button delegation
  popover.addEventListener("click", ev => {
    const btn = ev.target.closest(".tp-btn");
    if (!btn) return;
    const act = btn.dataset.act;
    if (act === "next") {
      if (stepIdx >= STEPS.length - 1) { end(true); }
      else { stepIdx++; showStep(); }
    } else if (act === "back") {
      if (stepIdx > 0) { stepIdx--; showStep(); }
    } else if (act === "skip") {
      end(true);
    }
  });

  // ESC to exit
  document.addEventListener("keydown", ev => {
    if (active && ev.key === "Escape") { end(false); }
  });

  // FAB launches the tour
  fab.addEventListener("click", () => start());

  // Tour available via ? FAB or keyboard — never auto-launch on page load.
  let latestSeen = "";
  try { latestSeen = localStorage.getItem(STORAGE_KEY_LATEST) || ""; } catch(e){}

    fab.title = "Take the tour (One Cisco story arc)";
  } else {
    fab.title = "Take the tour";
  }

  // Expose for testing
  window.startTour = start;
})();

function lsGet(k, fb){ try{const v=localStorage.getItem(k); return v?JSON.parse(v):fb;}catch(e){return fb;} }
function lsSet(k, v){  try{localStorage.setItem(k, JSON.stringify(v));}catch(e){} }
function lsDel(k){     try{localStorage.removeItem(k);}catch(e){} }
function nameOf(id){ return (nodeById[id]||prodById[id])?.name || id; }
function catOf(id){
  const n = nodeById[id] || nodeById[prodById[id]?.family];
  return n?.category || prodById[id]?.category;
}
function downloadBlob(filename, mime, content){
  const blob = new Blob([content], {type: mime});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

  /* Match #pcl: invisible 8px halo so the arrows aren't pixel-precise targets. */

  /* Compare panel */
  #cmp-panel{position:fixed;left:0;right:490px;bottom:0;height:0;
    background:var(--surface);border-top:1px solid var(--border);overflow:hidden;
    transition:height .3s cubic-bezier(.4,0,.2,1);z-index:80;display:flex;flex-direction:column}
  #cmp-panel.open{height:48vh}
  body.planner-closed #cmp-panel{right:0}
  #cmp-head{padding:10px 18px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  #cmp-head .ph-t{font-size:13px}
  #cmp-x{background:var(--surface2);border:1px solid var(--border);border-radius:6px;
    color:var(--muted);width:26px;height:26px;font-size:14px;cursor:pointer;
    display:flex;align-items:center;justify-content:center}
  #cmp-clear{background:var(--surface2);border:1px solid var(--border);border-radius:6px;
    color:var(--muted);font-size:11px;font-weight:600;padding:4px 10px;cursor:pointer}
  #cmp-clear:hover{border-color:var(--accent);color:var(--accent)}
  #cmp-body{flex:1;overflow:auto;padding:14px 18px;display:flex;flex-direction:column;gap:12px;min-height:0}
  .cmp-layout{display:flex;flex-direction:column;gap:12px;min-height:min-content}
  .cmp-chips-wrap{flex-shrink:0}
  .cmp-chips-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--subtle);margin-bottom:6px}
  .cmp-chips{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .cmp-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px 5px 8px;border-radius:16px;
    background:var(--surface2);border:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text);
    cursor:pointer;transition:border-color .12s,background .12s}
  .cmp-chip:hover{border-color:var(--accent);background:rgba(2,200,255,.08)}
  .cmp-chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .cmp-chip-x{color:var(--subtle);font-size:13px;line-height:1;margin-left:2px}
  .cmp-chip-x:hover{color:var(--red)}
  .cmp-cols{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px}
  .cmp-col{flex:1;min-width:240px;background:var(--surface2);border:1px solid var(--border);

  .cmp-col .cmp-rk{color:var(--subtle);text-transform:uppercase;font-size:9px;letter-spacing:.06em;font-weight:700}
  .cmp-col .cmp-rv{color:var(--text);text-align:right;max-width:55%}
  .cmp-col .cmp-x{float:right;background:transparent;border:none;color:var(--subtle);cursor:pointer;font-size:14px;padding:0 4px}
  .cmp-col .cmp-x:hover{color:var(--red)}
  #cmp-empty{padding:30px;text-align:center;color:var(--subtle);font-size:12px;flex:1}

  /* Recent + pinned panel */
  #rp-panel{position:fixed;left:20px;bottom:88px;width:260px;
    background:var(--surface);border:1px solid var(--border);border-radius:10px;
    padding:8px 0;z-index:55;display:none;max-height:55vh;overflow-y:auto;
    box-shadow:0 8px 28px rgba(0,0,0,.45)}
  #rp-panel.show{display:block}
  .rp-sec{padding:6px 12px;font-size:9px;font-weight:700;text-transform:uppercase;
    letter-spacing:.1em;color:var(--subtle)}
  .rp-item{display:flex;align-items:center;gap:7px;padding:6px 12px;cursor:pointer;
    transition:background .12s;border:none;background:transparent;color:var(--text);
    width:100%;text-align:left;font:inherit;font-size:11.5px}
  .rp-item:hover{background:var(--surface2)}
  .rp-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .rp-pin{margin-left:auto;background:transparent;border:none;color:var(--subtle);cursor:pointer;

  .rp-pin.pinned{opacity:1;color:#FF9000}

  /* Context menu */
  #ctx-menu{position:fixed;background:var(--surface);border:1px solid var(--border);
    border-radius:7px;padding:4px 0;min-width:200px;z-index:9500;display:none;
    box-shadow:0 8px 24px rgba(0,0,0,.5);font-size:12.5px}

  .ctx-i{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;
    background:transparent;border:none;color:var(--text);width:100%;text-align:left;font:inherit;
    transition:background .12s}
  .ctx-i:hover{background:var(--surface2);color:var(--accent)}

  /* Search pulse */
  @keyframes searchPulse{
    0%,100%{r:var(--orig-r,18)}
    50%{r:calc(var(--orig-r,18) * 1.18)}}
  .nd.pulse circle.mc{animation:searchPulse 1.05s ease-in-out infinite}

  /* Timeline view — opaque panel so the graph never bleeds through */
  #tl-wrap{position:fixed;top:var(--topbar-h);left:0;right:0;bottom:0;background:var(--bg);
    display:none;overflow:hidden;z-index:40;flex-direction:column}
  #tl-ambient{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden;
    background:linear-gradient(165deg,#04101f 0%,#07182d 42%,#0b2a4a 100%);opacity:1}
  [data-theme="light"] #tl-ambient{background:linear-gradient(165deg,#e8f0fa 0%,#f4f7fb 100%)}
  #tl-head{position:relative;z-index:2;padding:12px 22px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0;flex-wrap:nowrap;
    background:var(--surface)}
  /* Lift the timeline so the horizontal scrollbar at the bottom of #tl-canvas
     isn't covered by other fixed chrome (#v2-footer, #tools, #hint), which
     all paint above #tl-wrap (z-index 45–50 vs. tl-wrap's 40). The
     :has(#tl-wrap.show) selectors run purely off DOM state and don't depend
     on the JS adding a body class. body.tl-open is kept as a fallback for
     any edge case (older browser w/o :has, or programmatic open that skips
     the JS path). !important defeats later same-id selectors like
     "#tools{bottom:42px}" further down in the cascade. */
  #tl-wrap.show{display:flex;bottom:60px}
  body.planner-open #tl-wrap{right:490px}
  body:has(#tl-wrap.show) #v2-footer,
  body.tl-open #v2-footer{display:none !important}
  body:has(#tl-wrap.show) #hint,
  body.tl-open #hint{display:none !important}
  body:has(#tl-wrap.show) #tools,
  body.tl-open #tools{bottom:18px !important}
  #tl-head > div:last-child{display:flex;gap:6px;align-items:center;flex-shrink:0;flex-wrap:nowrap}
  #tl-head .tl-title{font-size:14px;font-weight:700}
  #tl-head .tl-sub{font-size:11px;color:var(--muted);margin-top:2px}
  #tl-canvas{flex:1;position:relative;z-index:1;background:var(--bg);
    /* overflow-x:scroll (vs auto) permanently reserves a track at the bottom.
       We deliberately do NOT set scrollbar-color/scrollbar-width here: in
       Chrome 113+ those properties opt the element into the new "Fluent"
       scrollbar path which respects macOS auto-hide and ignores the
       ::-webkit-scrollbar rules below. By keeping only the webkit pseudos,
       Chrome and Safari render a classic always-visible scrollbar that we
       can style. Firefox is handled by the @supports block below. */
    overflow-x:scroll;overflow-y:auto;padding:0 0 30px;position:relative}
  /* High-contrast classic scrollbar for Chrome / Safari (macOS + everywhere) */
  #tl-canvas::-webkit-scrollbar{-webkit-appearance:none;height:16px;width:12px;
    background:#07182D}
  #tl-canvas::-webkit-scrollbar-track{background:#07182D;
    border-top:1px solid rgba(255,255,255,.10);
    box-shadow:inset 0 1px 0 rgba(0,0,0,.6)}
  #tl-canvas::-webkit-scrollbar-thumb{
    background:linear-gradient(180deg, rgba(2,200,255,.85) 0%, rgba(0,122,153,.85) 100%);
    border-radius:8px;border:2px solid #07182D;background-clip:padding-box;
    box-shadow:0 0 0 1px rgba(0,0,0,.6) inset, 0 0 6px rgba(2,200,255,.35)}
  #tl-canvas::-webkit-scrollbar-thumb:hover{
    background:linear-gradient(180deg, rgba(0,212,255,1) 0%, rgba(0,150,190,1) 100%);
    background-clip:padding-box}
  #tl-canvas::-webkit-scrollbar-thumb:active{
    background:#00d4ff;background-clip:padding-box}
  #tl-canvas::-webkit-scrollbar-corner{background:#07182D}
  /* Firefox-only: scoped via @supports so Chrome doesn't pick up these
     properties and switch off the webkit path above. */
  @supports (-moz-appearance:none){
    #tl-canvas{scrollbar-width:auto;
      scrollbar-color:rgba(2,200,255,.85) #07182D}
  }
  .tl-zoom{display:inline-flex;align-items:center;gap:0;background:var(--surface2);
    border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-right:4px}
  .tl-zoom button{background:transparent;border:none;color:var(--muted);
    font-size:13px;font-weight:700;padding:5px 9px;cursor:pointer;line-height:1;
    transition:background .12s,color .12s;min-width:28px}
  .tl-zoom button:hover:not(:disabled){background:var(--surface3);color:var(--accent)}
  .tl-zoom button:disabled{opacity:.35;cursor:not-allowed}
  .tl-zoom .tl-zoom-lvl{font-size:11px;color:var(--muted);padding:0 8px;border-left:1px solid var(--border);border-right:1px solid var(--border);min-width:46px;text-align:center}
  .tl-fam-wrap{position:relative;display:inline-flex;align-items:center}
  .tl-fam-btn{max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tl-fam-drop{position:absolute;top:calc(100% + 6px);right:0;width:min(280px,calc(100vw - 40px));
    background:var(--surface);border:1px solid var(--border);border-radius:9px;
    box-shadow:0 10px 28px rgba(0,0,0,.55);z-index:20;padding:10px;display:none;
    max-height:min(340px,50vh);flex-direction:column;gap:8px}
  .tl-fam-drop.show{display:flex}
  .tl-fam-search{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;
    color:var(--text);font-size:12px;padding:6px 8px;outline:none;font-family:inherit}
  .tl-fam-search:focus{border-color:var(--accent)}
  .tl-fam-list{overflow-y:auto;display:flex;flex-direction:column;gap:2px;min-height:0;flex:1}
  .tl-fam-list .fac-row{padding:3px 2px;border-radius:4px}
  .tl-fam-list .fac-row:hover{background:var(--surface2)}
  .tl-fam-drop .fac-clr{align-self:flex-start;margin-top:2px}
  /* Inner sized container that scales with zoom. Width is explicitly set by
     renderTimeline() in pixels (= LABEL_W + GAP + dataW + RIGHT_GUTTER) so
     the canvas's overflow:auto produces a horizontal scrollbar whenever the
     pixel-per-year math exceeds the viewport. */
  #tl-inner{position:relative;min-width:100%}
  /* Grid: column 1 is 222px wide (200 visible + 22 padding-left baked in so
     position:sticky; left:0 pins the label cell flush to the viewport edge
     instead of sliding 22px before sticking). Column 2 is 1fr → the data
     track. Right padding (22px) lives on the row itself as a gutter. */
  .tl-axis{display:grid;grid-template-columns:222px 1fr;gap:14px;
    border-bottom:1px solid var(--border);position:sticky;top:0;
    background:var(--bg);z-index:5;margin-bottom:14px;padding:0 22px 0 0}
  /* Empty first cell of the axis — sticky so its background covers row-label
     borders/shadows that bleed up when the user scrolls horizontally. */
  .tl-axis-lbl{position:sticky;left:0;background:var(--bg);z-index:7;
    border-right:1px solid var(--border);
    box-shadow:6px 0 8px -6px rgba(0,0,0,.55)}
  .tl-axis-track{position:relative;height:24px}
  .tl-axis-tick{position:absolute;font-size:10px;color:var(--subtle);
    font-weight:700;padding:5px 0;text-transform:uppercase;letter-spacing:.06em;
    transform:translateX(-50%);white-space:nowrap;top:0}
  .tl-axis-tick.major{color:var(--muted)}
  .tl-axis-tick::before{content:"";position:absolute;left:50%;top:100%;
    width:1px;height:8px;background:var(--border)}
  .tl-row{display:grid;grid-template-columns:222px 1fr;gap:14px;align-items:stretch;
    padding:4px 22px 4px 0;border-bottom:1px solid rgba(255,255,255,.03)}
  .tl-row:hover{background:rgba(255,255,255,.015)}
  /* Row label cell — sticky on horizontal scroll so the family name stays
     readable when the user scrolls out to year 2030. z-index sits above the
     bars (which can reach z-index:11 on narrow:hover) and the today line
     (z-index:2) so labels never get visually clipped by content scrolling
     underneath. Solid bg + right border + small drop shadow give a clear
     boundary between the sticky labels column and the scrolling data area. */
  .tl-row-lbl{font-size:12px;font-weight:500;color:var(--text);
    display:flex;align-items:center;gap:7px;overflow:hidden;
    padding:6px 0 0 22px;
    position:sticky;left:0;background:var(--bg);z-index:15;
    border-right:1px solid var(--border);
    box-shadow:6px 0 8px -6px rgba(0,0,0,.55)}
  .tl-row-lbl .ld{flex-shrink:0;width:8px;height:8px;border-radius:50%}
  .tl-row-lbl .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* Recessed channel: subtle inner gradient (darker at top, faint highlight at bottom)
     plus a 1px highlight on the bottom inner edge — gives the bars a "trough" to sit in. */
  .tl-row-track{position:relative;
    background:linear-gradient(180deg, rgba(0,0,0,.18), rgba(255,255,255,.015));
    box-shadow:0 1px 0 rgba(255,255,255,.04) inset, 0 -1px 0 rgba(0,0,0,.35) inset;
    border-radius:4px;min-height:24px}
  .tl-block{position:absolute;height:16px;line-height:16px;border-radius:4px;font-size:9.5px;
    color:#fff;display:block;padding:0 6px;cursor:pointer;
    overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-weight:600;
    /* Glassy pill: highlight on the top edge, fade to a soft shade near the bottom.
       background-image is layered on top of background-color from the status classes
       below (.cur/.eos/.eol), so the colored fill still drives the meaning.
       Vertical centering uses line-height (not flex) so that text-overflow:ellipsis
       can truncate the direct text node — flex children wouldn't ellipsis without
       an extra wrapper element. */
    background-image:linear-gradient(180deg, rgba(255,255,255,.18) 0%, rgba(255,255,255,0) 35%, rgba(0,0,0,.18) 100%);
    box-shadow:
      0 1px 0 rgba(255,255,255,.10) inset,
      0 -1px 0 rgba(0,0,0,.22) inset,
      0 1px 2px rgba(0,0,0,.4);
    transition:transform .12s,box-shadow .12s,filter .12s}
  .tl-block:hover{transform:translateY(-2px);
    box-shadow:
      0 1px 0 rgba(255,255,255,.14) inset,
      0 -1px 0 rgba(0,0,0,.25) inset,
      0 8px 18px rgba(0,0,0,.55);
    z-index:10;filter:brightness(1.18)}
  .tl-block.cur{background-color:rgba(45,206,92,.65);color:#fff}
  .tl-block.eos{background-color:rgba(245,158,11,.7);color:#1a1a1a}
  .tl-block.eol{background-color:rgba(239,68,68,.78)}
  .tl-block.narrow{padding:0;font-size:0;min-width:3px}
  .tl-block.narrow:hover{padding:0 6px;font-size:9.5px;min-width:auto;z-index:11}
  /* TBD / unscheduled milestone treatment.
     unknown-right: EOS known, EOL TBD — solid at the anchor, fades to nothing on the right.
     unknown-left:  EOS TBD, EOL known — fades in from the left to the anchor.
     unknown-both:  both TBD — diagonal stripes near "today" with a "?" badge,
                    so the bar reads as "scheduled, but no firm dates yet". */
  .tl-block.unknown-right{
    -webkit-mask-image:linear-gradient(90deg, #000 60%, transparent 100%);
            mask-image:linear-gradient(90deg, #000 60%, transparent 100%);
  }
  .tl-block.unknown-left{
    -webkit-mask-image:linear-gradient(90deg, transparent 0%, #000 40%);
            mask-image:linear-gradient(90deg, transparent 0%, #000 40%);
  }
  .tl-block.unknown-both{
    background-image:
      repeating-linear-gradient(45deg,
        rgba(255,255,255,.10) 0,
        rgba(255,255,255,.10) 4px,
        rgba(0,0,0,.22) 4px,
        rgba(0,0,0,.22) 8px),
      linear-gradient(180deg, rgba(255,255,255,.18) 0%, rgba(255,255,255,0) 35%, rgba(0,0,0,.18) 100%);
  }
  .tl-block.unknown-both::after{
    content:"?";position:absolute;right:5px;top:50%;transform:translateY(-50%);
    font-weight:800;font-size:11px;color:#fff;line-height:1;
    text-shadow:0 1px 2px rgba(0,0,0,.7);pointer-events:none;
  }
  /* Today line: glows like a marker pen so the eye finds "now" instantly. */
  .tl-today{position:absolute;top:0;bottom:0;width:2px;

  /* Stack diff */

   [B] PLANS — saved/named plans + auto-save + shareable URL
   ════════════════════════════════════════════════════════════════════════*/
function readState(){
  return {
    name:     $("#acct-name").value || "",
    stack:    [...stack].map(id => ({id, type: stackItems.get(id)})),
    legacy:   [...legacySel],
    profile:  lsGet(STORAGE_KEYS.profile, {vertical:"", size:"", mode:""}),
    cats:     [...activeCats],
    uc:       activeUC,
    ind:      activeInd
  };
}
function applyState(s){
  if (!s) return;
  $("#acct-name").value = s.name || "";
  stack.clear(); stackItems.clear();
  (s.stack || []).forEach(it => { if (it && it.id) { stack.add(it.id); stackItems.set(it.id, it.type || "node"); } });
  legacySel.clear();
  (s.legacy || []).forEach(id => legacySel.add(id));
  $$(".lc").forEach(c => c.classList.toggle("sel", legacySel.has(c.dataset.id)));
  if (s.cats && Array.isArray(s.cats)) { activeCats = new Set(s.cats); }
  if (typeof s.uc === "string")  { activeUC  = s.uc;  $("#ucs").value  = s.uc; }
  if (typeof s.ind === "string") { activeInd = s.ind; $("#inds").value = s.ind; }
  $$(".cp").forEach(b => b.classList.toggle("off", !activeCats.has(b.dataset.cat)));
  renderChips(); updateAB();
  applyFilters();
  highlightStack();
  analyzed = false;
  plannerSetupExpanded = false;
  $("#no-analysis").style.display = "none";
  $("#analysis-results").style.display = "none";
  if (typeof updatePlannerUI === "function") updatePlannerUI();
}

let currentPlanId = lsGet(STORAGE_KEYS.current, null);
function listPlans(){ return lsGet(STORAGE_KEYS.plans, []); }
function savePlans(plans){ lsSet(STORAGE_KEYS.plans, plans); }
function savePlan(name, asNew=false){
  let plans = listPlans();
  const id = (!asNew && currentPlanId) ? currentPlanId : ("p_" + Date.now().toString(36));
  const idx = plans.findIndex(p => p.id === id);
  const rec = { id, name: name || `Plan ${plans.length + 1}`, updated: Date.now(), state: readState() };
  if (idx >= 0) plans[idx] = rec; else plans.unshift(rec);
  savePlans(plans);
  currentPlanId = id; lsSet(STORAGE_KEYS.current, id);
  return id;
}
function loadPlan(id){
  const rec = listPlans().find(p => p.id === id);
  if (!rec) return false;
  applyState(rec.state);
  currentPlanId = id; lsSet(STORAGE_KEYS.current, id);
  return true;
}
function deletePlan(id){
  const plans = listPlans().filter(p => p.id !== id);
  savePlans(plans);
  if (currentPlanId === id){ currentPlanId = null; lsDel(STORAGE_KEYS.current); }
  renderPlansMenu();
}
function renamePlan(id, newName){
  const plans = listPlans();
  const p = plans.find(p => p.id === id);
  if (!p) return;
  p.name = newName; savePlans(plans); renderPlansMenu(); refreshPlansBtn();
}

/* Shareable URL — encode state into hash, decode on load. */
function encodeShareableUrl(){
  const s = readState();
  const slim = {
    n: s.name,
    s: s.stack.map(x => `${x.type==="product"?"p":"n"}:${x.id}`).join(","),
    l: s.legacy.join(","),
    c: s.cats.join(","),
    u: s.uc, i: s.ind,
    pr: s.profile
  };
  // JSON → base64 (URL-safe). Atomic to keep hashes copy-pastable.
  const json = JSON.stringify(slim);
  const b64  = btoa(unescape(encodeURIComponent(json))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
  return location.origin + location.pathname + "#s=" + b64;
}
function decodeShareableUrl(){
  const m = (location.hash || "").match(/s=([A-Za-z0-9_\-]+)/);
  if (!m) return null;
  try {
    const b64 = m[1].replace(/-/g,"+").replace(/_/g,"/");
    const json = decodeURIComponent(escape(atob(b64 + "===".slice((b64.length+3)%4))));
    const slim = JSON.parse(json);
    return {
      name: slim.n || "",
      stack: (slim.s||"").split(",").filter(Boolean).map(x => {
        const [pn, id] = x.split(":"); return { id, type: pn==="p"?"product":"node" };
      }),
      legacy: (slim.l||"").split(",").filter(Boolean),
      cats:   (slim.c||"").split(",").filter(Boolean),
      uc:     slim.u || "",
      ind:    slim.i || "",
      profile: slim.pr || {}
    };
  } catch(e){ return null; }
}

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function relTime(ts){
  if (!ts) return "—";
  const d = (Date.now() - ts) / 1000;
  if (d < 60) return "just now";
  if (d < 3600) return `${Math.floor(d/60)}m ago`;
  if (d < 86400) return `${Math.floor(d/3600)}h ago`;
  return `${Math.floor(d/86400)}d ago`;
}
