<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio Navigator Plus</title>
  <link rel="icon" type="image/svg+xml" href="assets/cpn-favicon.svg"/>
  <meta name="theme-color" content="#07182D"/>
  <script type="importmap">
  {"imports":{"three":"./vendor/three.module.min.js"}}
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script type="module">
  import * as THREE from "three";
  window.__cpnWalkTHREE = THREE;
  </script>
  <link rel="stylesheet" href="design-studio.css?v=2.77.0"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    @font-face{
      font-family:"CiscoSansTT";
      src:local("Cisco Sans TT"),local("CiscoSansTT"),local("Cisco Sans"),
           url("fonts/CiscoSansTT-Regular.woff2") format("woff2");
      font-weight:400;font-style:normal;font-display:swap}
    @font-face{
      font-family:"CiscoSansTT";
      src:local("Cisco Sans TT Bold"),local("CiscoSansTT Bold"),
           url("fonts/CiscoSansTT-Bold.woff2") format("woff2");
      font-weight:700;font-style:normal;font-display:swap}
    :root{
      --bg:#07182d;--surface:#0a2240;--surface2:#0d2847;--surface3:#102f54;
      --border:rgba(214,214,214,.14);--text:#ffffff;--muted:#b4b9c0;--subtle:#525e6c;
      --accent:#02c8ff;--green:#02c8ff;--orange:#ff9000;--red:#ff007f;
      --net:#02c8ff;--sec:#ff9000;--col:#02c8ff;--com:#0a60ff;--obs:#ff9000;
      --topbar-h:102px;
      --glass-bg:rgba(10,34,64,.72);--glass-bg2:rgba(13,40,71,.68);
      --glass-blur:14px;--glass-edge:rgba(2,200,255,.22);
      --chrome-shadow:0 8px 32px rgba(0,0,0,.38);
    }
    [data-theme="light"]{
      --bg:#eef2f7;--surface:#ffffff;--surface2:#f8fafc;--surface3:#e2e8f0;
      --border:rgba(7,24,45,.2);--text:#07182d;--muted:#334155;--subtle:#64748b;
      --accent:#006e8f;
      --glass-bg:rgba(255,255,255,.94);--glass-bg2:rgba(255,255,255,.88);
      --glass-edge:rgba(0,110,143,.32);--chrome-shadow:0 4px 24px rgba(7,24,45,.12);
      color-scheme:light}
    [data-theme="light"] #bg-ambient{background:linear-gradient(165deg,#dce8f4 0%,#eef2f7 42%,#e4edf8 100%)}
    [data-theme="light"] .bg-glow{opacity:.28}
    [data-theme="light"] .bg-grid{opacity:.55;stroke:rgba(7,24,45,.08)}
    [data-theme="light"] #gs,#spatial-wrap{filter:none}
    [data-theme="light"] .pillar-guides .zone-title{fill:#006e8f}
    [data-theme="light"] .pillar-guides .zone-spine-label{fill:#475569}
    [data-theme="light"] .pillar-guides .zone-stats{fill:#64748b}
    [data-theme="light"] #pillar-legend{background:rgba(255,255,255,.96);border-color:rgba(7,24,45,.15);
      box-shadow:0 10px 36px rgba(7,24,45,.12)}
    [data-theme="light"] #pillar-legend .pl-title{color:#006e8f}
    [data-theme="light"] #pillar-legend .pl-name{color:#07182d}
    [data-theme="light"] #pillar-legend .pl-desc,[data-theme="light"] #pillar-legend .pl-count{color:#64748b}
    [data-theme="light"] #pillar-legend .pl-item:hover{background:rgba(7,24,45,.05)}
    [data-theme="light"] #pillar-legend .pl-item.active{background:rgba(0,110,143,.1);outline-color:rgba(0,110,143,.35)}
    [data-theme="light"] #pillar-legend .pl-item.active .pl-name{color:#07182d}
    [data-theme="light"] #pillar-legend .pl-hint{border-top-color:rgba(7,24,45,.1);color:#64748b}
    /* topbar-h is synced from #app-chrome via ResizeObserver (main bar + action bar) */
    html,body{height:100%;width:100%;overflow:hidden;
      font-family:"CiscoSansTT","Segoe UI",system-ui,-apple-system,BlinkMacSystemFont,Roboto,Helvetica,Arial,sans-serif;
      background:var(--bg);color:var(--text)}

    /* AMBIENT BACKGROUND — graph canvas backdrop */
    #gw{position:fixed;top:var(--topbar-h);left:0;right:0;bottom:0;z-index:1}
    #bg-ambient{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden;
      background:linear-gradient(165deg,#04101f 0%,#07182d 42%,#0b2a4a 100%)}
    .bg-pillar-tint{position:absolute;inset:-20%;opacity:0;transition:opacity 2.2s ease;pointer-events:none}
    .bg-pillar-tint--ai{background:radial-gradient(ellipse 55% 50% at 22% 38%, rgba(10,96,255,.32), transparent 68%)}
    .bg-pillar-tint--wp{background:radial-gradient(ellipse 50% 45% at 78% 38%, rgba(45,206,92,.22), transparent 65%)}
    .bg-pillar-tint--res{background:radial-gradient(ellipse 48% 42% at 50% 82%, rgba(255,144,0,.18), transparent 62%)}
    #bg-ambient{--ambient-intensity:0}
    #bg-ambient[data-pillar="ai-dc"] .bg-pillar-tint--ai{opacity:var(--ambient-intensity,1)}
    #bg-ambient[data-pillar="workplaces"] .bg-pillar-tint--wp{opacity:var(--ambient-intensity,1)}
    #bg-ambient[data-pillar="resilience"] .bg-pillar-tint--res{opacity:var(--ambient-intensity,1)}
    #bg-ambient[data-tint-ai] .bg-pillar-tint--ai{opacity:calc(var(--ambient-intensity,.55)*.92)}
    #bg-ambient[data-tint-wp] .bg-pillar-tint--wp{opacity:calc(var(--ambient-intensity,.55)*.88)}
    #bg-ambient[data-tint-res] .bg-pillar-tint--res{opacity:calc(var(--ambient-intensity,.55)*.85)}
    #bg-ambient.ambient-filtered .bg-glow{opacity:calc(.94 + var(--ambient-intensity)*.14)}
    #bg-ambient.ambient-hot .bg-beams{opacity:.24}
    #bg-ambient.ambient-hot .bg-grid{opacity:1.08}
    .bg-vignette{position:absolute;inset:0;
      background:radial-gradient(ellipse 85% 75% at 50% 48%, transparent 35%, rgba(0,0,0,.45) 100%)}
    .bg-glow{position:absolute;inset:-25%;opacity:1;
      background:
        radial-gradient(ellipse 58% 48% at 22% 32%, rgba(10,96,255,.28) 0%, transparent 68%),
        radial-gradient(ellipse 52% 44% at 78% 68%, rgba(2,200,255,.22) 0%, transparent 65%),
        radial-gradient(ellipse 46% 38% at 50% 88%, rgba(255,144,0,.12) 0%, transparent 62%),
        radial-gradient(ellipse 40% 35% at 50% 42%, rgba(2,200,255,.10) 0%, transparent 70%);
      animation:bg-glow-drift 20s ease-in-out infinite alternate}
    .bg-beams{position:absolute;inset:-50%;opacity:.14;
      background:conic-gradient(from 210deg at 50% 50%,
        transparent 0deg, rgba(2,200,255,.55) 32deg, transparent 64deg,
        rgba(10,96,255,.45) 128deg, transparent 168deg,
        rgba(2,200,255,.35) 248deg, transparent 300deg);
      animation:bg-beams-spin 100s linear infinite}
    .bg-grid{position:absolute;inset:0;opacity:1;
      background-image:
        linear-gradient(rgba(2,200,255,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(2,200,255,.06) 1px, transparent 1px),
        radial-gradient(circle, rgba(2,200,255,.22) 1px, transparent 1px);
      background-size:72px 72px, 72px 72px, 36px 36px;
      background-position:0 0, 0 0, 18px 18px;
      animation:bg-grid-pan 58.33s linear infinite}
    #bg-mesh{position:absolute;inset:0;width:100%;height:100%;display:block}
    body.spatial-open #bg-mesh{opacity:0}
    @keyframes bg-glow-drift{
      0%{transform:translate(0,0) scale(1);opacity:.92}
      50%{transform:translate(2.5%,-2%) scale(1.04);opacity:1}
      100%{transform:translate(-2%,2.5%) scale(1.02);opacity:.95}
    }
    @keyframes bg-beams-spin{
      0%{transform:rotate(0deg)}
      100%{transform:rotate(360deg)}
    }
    @keyframes bg-grid-pan{
      0%{background-position:0 0, 0 0, 18px 18px}
      100%{background-position:72px 72px, 72px 72px, 54px 54px}
    }
    @media (prefers-reduced-motion: reduce){
      .bg-glow,.bg-grid,.bg-beams{animation:none}
    }

    /* TOP BAR + ACTION BAR */
    #app-chrome{position:fixed;top:0;left:0;right:0;z-index:100}
    #topbar{position:relative;min-height:52px;height:auto;
      background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));
      border-bottom:1px solid var(--border);box-shadow:var(--chrome-shadow);
      display:flex;align-items:center;flex-wrap:wrap;
      gap:12px;padding:10px 16px}
    #topbar::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg, transparent, var(--glass-edge), transparent);pointer-events:none}
    #actionbar{display:flex;align-items:center;justify-content:space-between;gap:10px;
      padding:7px 14px;background:var(--glass-bg2);backdrop-filter:blur(var(--glass-blur));
      -webkit-backdrop-filter:blur(var(--glass-blur));border-bottom:1px solid var(--border);
      flex-wrap:wrap}
    .actionbar-filters{display:flex;align-items:center;gap:8px;flex:1;flex-wrap:wrap;min-width:0}
    .actionbar-end{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
    .logo{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;
      color:var(--accent);white-space:nowrap;flex-shrink:0}
    .logo img,.logo svg{width:44px;height:44px;flex-shrink:0}
    .dv{width:1px;height:26px;background:var(--border);flex-shrink:0}
    .sw{position:relative;flex:1 1 480px;min-width:280px;max-width:none}
    @media (max-width: 720px){
      .sw{flex:1 1 100%;min-width:0;order:99}
    }
    #search{width:100%;background:rgba(13,40,71,.55);border:1px solid var(--border);
      border-radius:8px;color:var(--text);font-size:14px;
      padding:9px 14px 9px 36px;outline:none;transition:border-color .15s,box-shadow .15s,background .15s}
    #search:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(2,200,255,.12);background:rgba(13,40,71,.78)}
    [data-theme="light"] #search{background:rgba(255,255,255,.85)}
    [data-theme="light"] #search:focus{background:#fff}
    #search::placeholder{color:var(--subtle)}
    .si{position:absolute;left:9px;top:50%;transform:translateY(-50%);
      width:13px;height:13px;color:var(--muted);pointer-events:none}
    /* Dropdown is anchored to the search input's left edge, but its width is
       independent of the search input's width — at minimum it matches the
       input, but it's allowed to grow up to 380 px (or wider, capped at the
       viewport) so that result rows like "Collaboration · Cisco Desk Devices"
       stay on one line instead of stacking onto two or three. */
    #sr{position:absolute;top:calc(100% + 4px);left:0;
      min-width:100%;width:max(100%, 380px);max-width:min(560px, 90vw);
      background:var(--glass-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border:1px solid var(--glass-edge);border-radius:10px;
      max-height:340px;overflow-y:auto;display:none;z-index:300;
      box-shadow:0 16px 48px rgba(0,0,0,.45);padding:4px 0}
    .sr-group{padding:8px 14px 4px;font-size:10px;font-weight:700;
      text-transform:uppercase;letter-spacing:.08em;color:var(--subtle)}
    .sri{display:flex;align-items:center;gap:9px;padding:8px 12px 8px 10px;cursor:pointer;
      transition:background .1s,border-color .1s;border-left:3px solid transparent;margin:0 4px;border-radius:6px}
    .sri:hover,.sri.active{background:rgba(2,200,255,.08);border-left-color:var(--accent)}
    .sri-kbd{margin-left:auto;font-size:9px;color:var(--subtle);opacity:.7;flex-shrink:0}
    .sri-pillar{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0;
      background:rgba(2,200,255,.12);color:var(--accent);letter-spacing:.03em}
    .sri-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    /* The text column is the flex child that has to truncate. Without min-width:0
       a flex child refuses to shrink below its intrinsic content width, which
       defeats text-overflow:ellipsis. flex:1 lets it absorb the row's free space. */
    .sri-text{min-width:0;flex:1}
    .sri-text > div{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sri-eol{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;
      background:rgba(239,68,68,.15);color:#ef4444;flex-shrink:0}
    .sri-eos{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;
      background:rgba(245,158,11,.15);color:#FF9000;flex-shrink:0}
    .fr{display:flex;align-items:center;gap:5px;flex-shrink:0}
    .fl{font-size:11px;color:var(--subtle);white-space:nowrap}
    .cp{padding:3px 9px;border-radius:20px;border:1px solid transparent;
      font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
    .cp.off{background:transparent!important;border-color:var(--border);color:var(--subtle)!important}
    .pn{background:var(--net);color:#000}.ps{background:var(--sec);color:#000}
    .pc{background:var(--col);color:#000}.po{background:var(--com);color:#fff}
    .pb{background:var(--obs);color:#000}
    .tbs{background:var(--surface2);border:1px solid var(--border);border-radius:6px;
      color:var(--text);font-size:12px;padding:5px 7px;outline:none;cursor:pointer}
    .tbs option{background:var(--surface)}
    #theme-toggle{flex-shrink:0;background:transparent;border:1px solid var(--border);border-radius:6px;
      color:var(--muted);font-size:12px;padding:5px 9px;cursor:pointer;
      transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
    #theme-toggle:hover{border-color:var(--accent);color:var(--accent)}
    #rst{background:transparent;border:1px solid var(--border);border-radius:6px;
      color:var(--muted);font-size:12px;padding:5px 9px;cursor:pointer;
      transition:all .15s;white-space:nowrap;flex-shrink:0}
    #rst:hover{border-color:var(--accent);color:var(--accent)}
    #guided-btn{flex-shrink:0;display:flex;align-items:center;gap:6px;
      background:transparent;color:var(--accent);border:1px solid var(--accent);border-radius:7px;
      font-size:12px;font-weight:700;padding:6px 13px;cursor:pointer;transition:all .15s;white-space:nowrap}
    #guided-btn:hover{background:rgba(2,200,255,.12)}
    #ai-btn{flex-shrink:0;display:flex;align-items:center;gap:6px;
      background:linear-gradient(135deg,rgba(10,96,255,.14),rgba(2,200,255,.12));
      color:#fff;border:1px solid rgba(2,200,255,.5);border-radius:7px;
      font-size:12px;font-weight:700;padding:6px 13px;cursor:pointer;transition:all .15s;white-space:nowrap;
      box-shadow:0 0 14px rgba(10,96,255,.12)}
    #ai-btn:hover{background:linear-gradient(135deg,rgba(10,96,255,.24),rgba(2,200,255,.2));
      border-color:var(--accent);box-shadow:0 0 18px rgba(2,200,255,.22)}
    #ai-btn.active{background:var(--surface2);color:var(--accent);border-color:var(--accent);box-shadow:none}
    #planner-btn{flex-shrink:0;display:flex;align-items:center;gap:6px;
      background:var(--accent);color:#000;border:none;border-radius:7px;
      font-size:12px;font-weight:700;padding:6px 13px;cursor:pointer;transition:opacity .15s;white-space:nowrap}
    #planner-btn:hover{opacity:.85}
    #planner-btn.active{background:var(--surface2);color:var(--accent);border:1px solid var(--accent)}

    /* VIEW-MODE SEGMENTED CONTROL */
    .vm-seg{display:inline-flex;background:var(--surface2);border:1px solid var(--border);
      border-radius:7px;padding:2px;gap:2px;flex-shrink:0}
    .vm-seg button{background:transparent;border:none;color:var(--muted);
      font-size:11px;font-weight:600;padding:5px 10px;border-radius:5px;
      cursor:pointer;transition:all .12s;font-family:inherit}
    .vm-seg button:hover:not(:disabled):not(.active){background:rgba(255,255,255,.04);color:var(--text)}
    .vm-seg button.active{background:var(--accent);color:#000}
    .vm-seg button:disabled{opacity:.4;cursor:not-allowed}

    /* Top chip stack — filter badge + view breadcrumb (avoids overlap) */
    #top-chips{position:fixed;top:calc(var(--topbar-h) + 6px);left:50%;transform:translateX(-50%);z-index:90;
      display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none;
      max-width:min(92vw, 680px)}
    #top-chips > *{pointer-events:auto}

    /* BREADCRUMB CHIP under topbar */
    #vm-crumb{position:static;transform:none;
      display:none;align-items:center;gap:8px;
      background:var(--surface);border:1px solid var(--border);border-radius:18px;
      padding:5px 6px 5px 12px;font-size:11px;color:var(--muted);
      box-shadow:0 4px 14px rgba(0,0,0,.35)}
    #vm-crumb.show{display:flex}
    #vm-crumb .vm-cb-step{padding:0 6px;color:var(--text);font-weight:600;cursor:pointer}
    #vm-crumb .vm-cb-step:hover{color:var(--accent)}
    #vm-crumb .vm-cb-sep{color:var(--subtle)}
    #vm-crumb .vm-cb-current{padding:0 6px;color:var(--accent);font-weight:700}
    #vm-crumb .vm-cb-x{background:transparent;border:none;color:var(--subtle);font-size:14px;
      cursor:pointer;padding:0 6px;line-height:1;border-radius:50%}
    #vm-crumb .vm-cb-x:hover{color:var(--text)}

    /* GRAPH */
    #gs{position:relative;z-index:1;width:100%;height:100%;display:block;background:transparent;
      transition:opacity .28s ease,transform .28s ease}
    #gs.view-exit,#spatial-wrap.view-exit{opacity:0;transform:scale(.985);transition:opacity .28s ease,transform .28s ease,filter .28s ease}
    #gs.view-enter,#spatial-wrap.view-enter{opacity:1;transform:scale(1)}
    #gs.view-x-expand.view-exit,#spatial-wrap.view-x-expand.view-exit{opacity:0;transform:scale(.94);filter:blur(3px)}
    #gs.view-x-expand.view-enter{animation:view-enter-expand .34s cubic-bezier(.2,.9,.25,1) forwards}
    #gs.view-x-contract.view-exit{opacity:0;transform:scale(1.04);filter:blur(2px)}
    #gs.view-x-contract.view-enter{animation:view-enter-contract .32s ease-out forwards}
    #gs.view-x-dissolve.view-exit,#spatial-wrap.view-x-dissolve.view-exit{opacity:0;filter:blur(8px) brightness(1.12);transform:scale(.992)}
    #spatial-wrap.view-x-dissolve.view-enter,#gs.view-x-dissolve.view-enter{animation:view-enter-dissolve .38s ease-out forwards}
    #gs.view-x-scan.view-exit{opacity:0;transform:translateX(-1.2%) scale(.99)}
    #gs.view-x-scan.view-enter{animation:view-enter-scan .32s ease-out forwards}
    #gs.view-x-focus.view-exit{opacity:0;transform:scale(1.012);filter:blur(1.5px)}
    #gs.view-x-focus.view-enter{animation:view-enter-focus .3s ease-out forwards}
    body.view-x-dissolve #bg-ambient .bg-glow{opacity:1.28;transition:opacity .35s ease}
    body.view-x-expand #bg-ambient .bg-glow{transform:scale(1.05);transition:transform .35s ease}
    body.spatial-selection-active #spatial-graph canvas{filter:saturate(1.18) brightness(1.1) contrast(1.06)}
    body.view-transitioning #spatial-wrap,
    body.view-transitioning #spatial-graph{pointer-events:none}
    @keyframes view-enter-expand{from{opacity:0;transform:scale(.965)}to{opacity:1;transform:scale(1)}}
    @keyframes view-enter-contract{from{opacity:0;transform:scale(1.03)}to{opacity:1;transform:scale(1)}}
    @keyframes view-enter-dissolve{from{opacity:0;filter:blur(10px) brightness(1.18)}to{opacity:1;filter:none}}
    @keyframes view-enter-scan{from{opacity:0;transform:translateX(1.4%)}to{opacity:1;transform:none}}
    @keyframes view-enter-focus{from{opacity:0;transform:scale(.988)}to{opacity:1;transform:scale(1)}}
    body.canvas-focus #gw::after{content:"";position:absolute;inset:0;z-index:2;pointer-events:none;
      background:rgba(0,0,0,.42);transition:opacity .35s ease}
    body.canvas-focus.pillar-focus #gw::after{background:transparent}
    #spatial-wrap{position:absolute;inset:0;display:none;z-index:2;background:transparent}
    #spatial-graph{width:100%;height:100%;background:transparent}
    #spatial-graph canvas{display:block;background:transparent!important}
    #spatial-hud{position:absolute;left:50%;bottom:52px;transform:translateX(-50%);
      background:rgba(22,27,34,.92);border:1px solid var(--border);border-radius:20px;
      padding:6px 14px;font-size:11px;color:var(--muted);z-index:3;pointer-events:none;
      white-space:nowrap;box-shadow:0 4px 18px rgba(0,0,0,.35)}
    #spatial-hud kbd{background:var(--surface3);border:1px solid var(--border);border-radius:3px;
      padding:1px 5px;font-size:10px;color:var(--subtle)}
    body.planner-open #spatial-hud{bottom:52px}
    #spatial-style-bar{position:absolute;top:14px;left:14px;z-index:6;display:flex;align-items:center;gap:6px;
      flex-wrap:wrap;max-width:min(420px,calc(100% - 28px));padding:6px 8px;border-radius:10px;
      background:rgba(22,27,34,.92);border:1px solid var(--border);box-shadow:0 4px 18px rgba(0,0,0,.35)}
    #spatial-style-bar .ssb-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
      color:var(--muted);margin-right:2px}
    #spatial-style-bar button{background:transparent;border:1px solid var(--border);border-radius:6px;
      color:var(--muted);font-size:11px;font-weight:600;padding:4px 9px;cursor:pointer;transition:all .15s}
    #spatial-style-bar button:hover:not(.active){border-color:var(--accent);color:var(--text)}
    #spatial-style-bar button.active{background:var(--accent);border-color:var(--accent);color:#000}
    #spatial-style-bar button:disabled{opacity:.45;cursor:not-allowed}
    body.spatial-open #hint{display:none !important}
    body.spatial-open #pillar-legend{display:none !important}
    body.spatial-open .bg-grid{opacity:0}

    /* TOOLTIP */

    .chip.eos-chip{background:rgba(245,158,11,.12)!important;border-color:rgba(245,158,11,.4)!important;color:#FF9000!important}
    .chip-x{background:none;border:none;cursor:pointer;color:inherit;
      font-size:13px;line-height:1;opacity:.6;padding:0}
    .chip-x:hover{opacity:1}
    .pln-acc{border:1px solid var(--border);border-radius:8px;background:var(--surface2);
      margin-top:10px;overflow:hidden}
    .pln-acc>summary{padding:9px 12px;font-size:12px;font-weight:600;color:var(--text);
      cursor:pointer;list-style:none;display:flex;align-items:center;justify-content:space-between;gap:8px}
    .pln-acc>summary::-webkit-details-marker{display:none}
    .pln-acc>summary::after{content:"▸";color:var(--subtle);font-size:11px;flex-shrink:0;transition:transform .15s}
    .pln-acc[open]>summary::after{transform:rotate(90deg)}
    .pln-acc-meta{font-size:10.5px;font-weight:500;color:var(--subtle)}
    .pln-acc-body{padding:0 12px 12px}
    #ls{padding:0}
    .legacy-grid{display:flex;flex-wrap:wrap;gap:5px;max-height:168px;overflow-y:auto;padding-top:2px}
    .lc{padding:3px 9px;border-radius:20px;background:var(--surface3);
      border:1px solid var(--border);font-size:11px;cursor:pointer;transition:all .12s;color:var(--muted)}
    .lc:hover{border-color:#FF9000;color:#FF9000}
    .lc.sel{background:rgba(245,158,11,.12);border-color:#FF9000;color:#FF9000}
    #stack-hint{padding:14px 18px 6px;font-size:11.5px;color:var(--subtle);text-align:center;line-height:1.45}
    #pb{flex:1;overflow-x:hidden;min-height:0;padding-bottom:12px}
    .ptabs{display:flex;border-bottom:1px solid var(--border);padding:0 12px;flex-shrink:0;
      overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:thin}
    .ptabs::-webkit-scrollbar{height:4px}
    .ptabs::-webkit-scrollbar-thumb{background:rgba(0,212,255,.28);border-radius:4px}
    .ptab{background:none;border:none;border-bottom:2px solid transparent;
      color:var(--muted);font-size:12px;font-weight:600;padding:9px 10px 8px;
      cursor:pointer;transition:all .15s;margin-bottom:-1px;flex-shrink:0;white-space:nowrap}
    .ptab.active{color:var(--accent);border-bottom-color:var(--accent)}
    .ptab-b{display:inline-block;background:var(--accent);color:#000;
      border-radius:10px;font-size:9px;font-weight:700;padding:1px 5px;margin-left:4px}
    .ptab-r{display:inline-block;background:#ef4444;color:#fff;
      border-radius:10px;font-size:9px;font-weight:700;padding:1px 5px;margin-left:4px}
    .tc{display:none;padding:14px 18px}
    .tc.active{display:block}

    /* Rec cards */
    .rec-card{background:var(--surface2);border:1px solid var(--border);
      border-radius:9px;padding:12px;margin-bottom:10px;border-left:3px solid transparent;
      transition:border-color .15s}
    .rec-card:hover{border-left-color:var(--accent)}
    .rec-card.p1{border-left-color:var(--accent)}
    .rc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px}
    .rc-badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:10px;
      font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;flex-shrink:0}
    .rc-name{font-size:13px;font-weight:700;margin-bottom:3px}
    .rc-reason{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:7px}
    .rc-connects{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px}
    .rc-ctag{padding:2px 7px;border-radius:4px;font-size:10px;background:var(--surface3);color:var(--muted)}
    .rc-actions{display:flex;gap:6px}
    .rc-btn{flex:1;padding:5px 8px;border-radius:6px;font-size:11px;font-weight:600;
      cursor:pointer;border:1px solid var(--border);background:transparent;
      color:var(--muted);transition:all .15s}
    .rc-btn:hover{border-color:var(--accent);color:var(--accent)}
    .rc-btn.prim{background:var(--accent);color:#000;border-color:var(--accent)}
    .rc-btn.prim:hover{opacity:.85}
    .rc-score{display:flex;align-items:center;gap:2px;flex-shrink:0}
    .rc-score-lbl{font-size:9px;color:var(--subtle);font-weight:600;margin-right:4px;white-space:nowrap}
    .recs-legend{font-size:11px;color:var(--subtle);line-height:1.45;margin-bottom:12px;padding:8px 10px;
      background:var(--surface2);border-radius:7px;border:1px solid var(--border)}
    .rc-s{font-size:11px;color:var(--accent)}
    .rc-so{font-size:11px;color:var(--border)}

    /* Replace cards */
    .rep-card{background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.25);
      border-radius:9px;padding:12px;margin-bottom:10px}
    .rep-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
    .rep-from{font-size:12px;color:#ef4444;font-weight:600}
    .rep-arr{color:var(--muted);font-size:14px}
    .rep-to{font-size:12px;font-weight:700}
    .rep-sub{font-size:10px;color:var(--muted);margin-bottom:2px}
    .rep-reason{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:8px}

    /* Bundle cards */
    .bun-card{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:10px}
    .bun-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
    .bun-name{font-size:13px;font-weight:700}
    .bun-pct{font-size:12px;font-weight:700;color:var(--accent)}
    .bun-desc{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.5}
    .bun-bar-bg{height:4px;background:var(--border);border-radius:2px;margin-bottom:8px}
    .bun-bar{height:4px;border-radius:2px;background:var(--accent);transition:width .4s}
    .bun-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
    .bch{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500}
    .bch.own{background:rgba(2,200,255,.15);color:var(--accent)}
    .bch.mis{background:var(--surface3);color:var(--muted)}
    .bun-add{width:100%;padding:6px;border-radius:6px;font-size:11px;font-weight:600;
      cursor:pointer;border:1px solid var(--border);background:transparent;
      color:var(--muted);transition:all .15s}
    .bun-add:hover{border-color:var(--accent);color:var(--accent)}

    /* Coverage tab */
    .cov-t{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px}
    .cov-i{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:12px}
    .cov-d{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .cov-d.y{background:var(--green)}.cov-d.n{background:var(--border)}
    .cov-l{flex:1}
    .cov-badge{font-size:10px;padding:1px 6px;border-radius:4px}
    .cov-badge.y{background:rgba(45,206,92,.12);color:var(--green)}
    .cov-badge.n{background:var(--surface3);color:var(--subtle)}
    .cat-gap{background:var(--surface2);border:1px solid var(--border);
      border-radius:8px;padding:10px 12px;margin-bottom:8px}

    /* Empty state */
    .empty{padding:20px 16px;text-align:center}
    .empty h3{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:5px}
    .empty p{font-size:11px;color:var(--subtle);line-height:1.6}

    /* Footer */
    #pf{position:relative;z-index:3;padding:10px 18px 12px;border-top:1px solid var(--border);
      display:flex;flex-direction:column;gap:8px;flex-shrink:0;background:var(--surface);
      box-shadow:0 -6px 16px rgba(0,0,0,.22)}
    #ab{width:100%;background:var(--accent);color:#000;border:none;border-radius:8px;
      font-size:13px;font-weight:700;padding:10px;cursor:pointer;transition:opacity .15s}
    #ab:hover{opacity:.85}
    #ab:disabled{opacity:.35;cursor:not-allowed}
    .pf-row{display:flex;gap:6px;align-items:center}
    #exp-btn{flex:1;padding:8px;border-radius:7px;font-size:12px;font-weight:600;
      cursor:pointer;border:1px solid var(--border);background:transparent;
      color:var(--muted);transition:all .15s}
    #exp-btn:hover{border-color:var(--accent);color:var(--accent)}
    #pf-menu-wrap{position:relative;flex-shrink:0}
    #pf-menu-btn{width:34px;height:34px;padding:0;border-radius:7px;font-size:16px;line-height:1;
      cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s}
    #pf-menu-btn:hover{border-color:var(--accent);color:var(--accent)}
    .pf-menu{position:absolute;bottom:calc(100% + 4px);right:0;min-width:140px;
      background:var(--surface);border:1px solid var(--border);border-radius:8px;
      box-shadow:0 8px 24px rgba(0,0,0,.35);padding:4px;z-index:80}
    .pf-menu[hidden]{display:none}
    .pf-menu button{display:block;width:100%;text-align:left;padding:8px 10px;border:none;border-radius:5px;
      background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
    .pf-menu button:hover{background:var(--surface2);color:var(--red)}

    /* Toast */
    #toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);
      background:var(--surface);border:1px solid var(--accent);border-radius:8px;
      padding:9px 16px;font-size:12px;color:var(--accent);font-weight:600;
      opacity:0;transition:all .3s;z-index:500;pointer-events:none;white-space:nowrap}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* Compact bottom-left toolbar (replaced the old legend panel). */
    #tools{position:fixed;bottom:20px;left:20px;display:flex;gap:6px;z-index:50}
    body.planner-open #tools{} /* still visible — planner is on the right */
    .tools-btn{background:var(--glass-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      border:1px solid var(--border);border-radius:7px;
      color:var(--muted);font-size:11px;font-weight:600;padding:6px 11px;cursor:pointer;
      display:inline-flex;align-items:center;gap:6px;line-height:1;
      transition:border-color .15s,color .15s,background .15s,transform .12s}
    .tools-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--surface2)}
    .tools-btn:active{transform:translateY(1px)}
    .tools-btn .ti{font-size:13px;line-height:1;opacity:.85}
    .tools-btn.active{border-color:var(--accent);color:var(--accent);background:var(--surface2)}

    #hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
      background:var(--surface);border:1px solid var(--border);border-radius:20px;
      padding:5px 14px;font-size:11px;color:var(--subtle);z-index:50;
      white-space:nowrap;pointer-events:none}
    #fbadge{position:static;transform:none;
      background:var(--surface);border:1px solid var(--accent);border-radius:20px;
      padding:4px 14px;font-size:11px;color:var(--accent);display:none;pointer-events:none;
      text-align:center;white-space:nowrap;max-width:min(92vw, 680px);overflow:hidden;text-overflow:ellipsis}

    .nd{cursor:pointer}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

    /* ─── Guided Tour / Help ──────────────────────────────────────────── */
    #help-fab{
      position:fixed;right:20px;bottom:20px;width:42px;height:42px;border-radius:50%;
      background:var(--cisco-blue);color:#fff;border:none;font-size:18px;font-weight:700;
      cursor:pointer;z-index:60;box-shadow:0 4px 14px rgba(4,159,217,.4);
      display:flex;align-items:center;justify-content:center;
      transition:transform .15s,box-shadow .15s}
    #help-fab:hover{transform:scale(1.08);box-shadow:0 6px 20px rgba(4,159,217,.55)}
    #help-fab.pulse::before{
      content:"";position:absolute;inset:-4px;border-radius:50%;
      border:2px solid var(--cisco-blue);animation:fabPulse 1.8s infinite ease-out;pointer-events:none}
    /* Persistent "NEW" badge on the help FAB for returning users when the tour content has been updated. */
    #help-fab.new-badge::after{
      content:"NEW";position:absolute;top:-6px;right:-8px;
      background:#FF9000;color:#fff;font-size:8.5px;font-weight:800;
      padding:2px 5px;border-radius:9px;letter-spacing:.06em;line-height:1;
      box-shadow:0 2px 6px rgba(255,107,53,.5);pointer-events:none}
    @keyframes fabPulse{
      0%{transform:scale(1);opacity:.8}
      100%{transform:scale(1.6);opacity:0}}

    /* Guided Plan tour step: wizard visible but non-interactive; tour UI stays on top */
    body.tour-highlight-wizard #gw-overlay.show{
      z-index:9100;background:transparent;backdrop-filter:none;pointer-events:none}
    body.tour-highlight-wizard #gw-panel{
      pointer-events:none;
      border:2px solid rgba(4,159,217,.9);
      box-shadow:0 0 0 1px rgba(4,159,217,.35),0 0 48px rgba(4,159,217,.45),
                 0 28px 72px rgba(0,0,0,.72)}
    body.tour-highlight-wizard #gw-panel *{pointer-events:none}
    body.tour-highlight-wizard #tour-spotlight{z-index:9200}
    body.tour-highlight-wizard #tour-popover{z-index:9201}

    #tour-backdrop{
      position:fixed;inset:0;z-index:9000;background:transparent;
      display:none;pointer-events:auto}
    #tour-backdrop.show{display:block}

    #tour-spotlight{
      position:fixed;border-radius:8px;z-index:9001;
      box-shadow:0 0 0 9999px rgba(0,0,0,.78), 0 0 0 3px var(--cisco-blue), 0 0 28px rgba(4,159,217,.75);
      transition:top .35s cubic-bezier(.4,0,.2,1), left .35s cubic-bezier(.4,0,.2,1),
                 width .35s cubic-bezier(.4,0,.2,1), height .35s cubic-bezier(.4,0,.2,1);
      pointer-events:none;display:none}
    #tour-spotlight.show{display:block}
    #tour-spotlight.centered{
      box-shadow:0 0 0 9999px rgba(0,0,0,.82);
      border:none}

    #tour-popover{
      position:fixed;z-index:9002;background:#182030;
      border:1px solid rgba(4,159,217,.55);border-left:4px solid var(--cisco-blue);
      border-radius:12px;padding:18px 20px 14px;width:max-content;
      max-width:min(420px, calc(100vw - 28px));
      box-shadow:0 0 0 1px rgba(4,159,217,.2),0 20px 52px rgba(0,0,0,.72),
                 0 0 36px rgba(4,159,217,.22);
      font-size:13px;color:var(--text);display:none;overflow:hidden;
      transition:opacity .25s, transform .25s, top .35s cubic-bezier(.4,0,.2,1),
                 left .35s cubic-bezier(.4,0,.2,1);opacity:0;transform:translateY(6px)}
    #tour-popover.show{display:block;opacity:1;transform:translateY(0)}
    #tour-popover.center{left:50%;top:50%;transform:translate(-50%,-50%);max-width:460px}
    #tour-popover.center.show{transform:translate(-50%,-50%)}

    #tour-popover::before{
      content:"";position:absolute;width:12px;height:12px;
      background:#182030;border:1px solid rgba(4,159,217,.55);
      transform:rotate(45deg);display:none}
    #tour-popover.arrow-top::before{display:block;top:-7px;left:24px;
      border-right:none;border-bottom:none}
    #tour-popover.arrow-bottom::before{display:block;bottom:-7px;left:24px;
      border-left:none;border-top:none}
    #tour-popover.arrow-left::before{display:block;left:-7px;top:24px;
      border-right:none;border-top:none}
    #tour-popover.arrow-right::before{display:block;right:-7px;top:24px;
      border-left:none;border-bottom:none}

    .tp-step{font-size:10px;color:var(--cisco-blue);font-weight:700;
      letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
    .tp-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px;line-height:1.3}
    .tp-body{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:14px}
    .tp-body strong{color:var(--text);font-weight:600}
    .tp-body code{background:var(--bg);padding:1px 6px;border-radius:4px;
      font-size:11px;color:var(--accent);border:1px solid var(--border)}
    .tp-tip{background:rgba(4,159,217,.08);border-left:2px solid var(--cisco-blue);
      padding:8px 12px;border-radius:4px;font-size:12px;color:var(--muted);
      margin-bottom:14px;line-height:1.45}
    .tp-tip b{color:var(--cisco-blue)}
    .tp-bar{display:flex;align-items:center;justify-content:space-between;
      gap:10px;flex-wrap:wrap;row-gap:10px}
    .tp-dots{display:flex;gap:5px;flex:1 1 auto;flex-wrap:wrap;
      min-width:0;align-items:center;align-content:center}
    .tp-dot{width:6px;height:6px;border-radius:50%;background:var(--border);
      flex:0 0 auto;transition:background .2s}
    .tp-dot.done{background:var(--cisco-blue-light)}
    .tp-dot.active{background:var(--cisco-blue);width:18px;border-radius:3px}
    .tp-btns{display:flex;gap:6px;flex:0 0 auto;margin-left:auto;flex-wrap:nowrap}
    .tp-btn{padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;
      cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);
      transition:all .15s}
    .tp-btn:hover{background:var(--bg);color:var(--text)}
    .tp-btn.prim{background:var(--cisco-blue);color:#fff;border-color:var(--cisco-blue)}
    .tp-btn.prim:hover{background:var(--cisco-blue-light);color:#fff}
    .tp-btn.skip{padding:7px 10px;color:var(--subtle);border:none}
    .tp-btn.skip:hover{color:var(--text);background:transparent}
  </style>
</head>
<body>

<div id="app-chrome">
<div id="topbar">
  <div class="logo">
    <img src="assets/cpn-logo.svg" alt="" width="44" height="44"/>
    Portfolio Navigator Plus
  </div>
  <div class="dv"></div>
  <div class="sw">
    <svg class="si" viewBox="0 0 16 16" fill="none">
      <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/>
      <path d="M10.5 10.5L13.5 13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <input id="search" type="text" placeholder="Search products, models, use cases…" autocomplete="off" spellcheck="false"/>
    <div id="sr"></div>
  </div>
</div>
<div id="actionbar">
  <div class="actionbar-filters">
  <div class="vm-seg" id="vm-seg" role="group" aria-label="Visualization level">
    <button type="button" data-vm="overview"     class="active" title="Overview — One Cisco strategy (default)">Overview</button>
    <button type="button" data-vm="families"     title="Families — full product-family graph">Families</button>
    <button type="button" data-vm="composition"  disabled title="Composition — pick a family first">Composition</button>
    <button type="button" data-vm="all-products" title="All Products — every family + product (dense; power-user view)">All</button>
    <button type="button" data-vm="spatial" title="Spatial — immersive 3D map of product families">Spatial</button>
  </div>
  <div class="dv"></div>
  <div class="fr" id="cpills"></div>
  <select class="tbs" id="ucs"><option value="">All Use Cases</option></select>
  <select class="tbs" id="inds"><option value="">All Industries</option></select>
  </div>
  <button id="rst">Reset</button>
  <button id="theme-toggle" type="button" title="Toggle light / dark presentation theme" aria-label="Toggle theme">☀ Light</button>
  <div class="actionbar-end">
  <button id="design-studio-btn" type="button" title="Design Studio — topology, rooms, BOM, CCW prep">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" aria-hidden="true">
      <rect x="1" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.3"/>
      <rect x="9" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.3"/>
      <rect x="5" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.3"/>
      <path d="M4 4h8M8 4v8" stroke="currentColor" stroke-width="1.2" opacity=".5"/>
    </svg>
    <span>Design Studio</span>
  </button>
  <button id="dcloud-btn" type="button" title="Browse and launch Cisco dCloud hands-on labs">
    <svg width="13" height="13" viewBox="0 0 32 32" fill="none" aria-hidden="true">
      <path d="M24.5 17.5c1.2 0 2.2-1 2.2-2.3 0-1.1-.7-2-1.7-2.3.3-2.4-2-4.4-4.7-4.4-1.8 0-3.4.8-4.5 2.1-1-1.2-2.5-1.9-4.1-1.9-3.1 0-5.7 2.2-5.7 5.1 0 .3 0 .6.1.9C2.8 16.6 1.5 18.2 1.5 20.2c0 2.4 2 4.3 4.4 4.3h16.6c2.7 0 4.8-2.1 4.8-4.7 0-2.6-2.1-4.8-4.8-4.8-.3 0-.6 0-.9.1-.4-1.2-1.5-2.1-2.8-2.1z" fill="currentColor"/>
    </svg>
    <span>dCloud Labs</span>
  </button>
  <button id="guided-btn" type="button" title="Step-by-step guided account plan">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" aria-hidden="true">
      <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/>
      <path d="M8 4.5V8l2.5 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg><span id="guided-btn-label">Guided Plan</span>

function pillarLabelFontPx(k){
  const focused = singlePillarFocused();
  const base = focused ? 12.5 : PILLAR_LABEL_BASE_PX;
  const band = focused ? 30 : PILLAR_LABEL_BAND;
  const counter = base / (k || 1);
  const maxFit = Math.max(6.5, (band - 6) / 1.35);
  return Math.min(counter, maxFit);
}
function pillarLabelMaxChars(cellW, k){
  const fontPx = pillarLabelFontPx(k);
  const usable = (cellW || PILLAR_MIN_CELL_W) * PILLAR_LABEL_CELL_FILL;
  return Math.max(6, Math.floor(usable / (fontPx * PILLAR_LABEL_CHAR_W)));
}
function pillarLabelTextLen(cellW){
  return (cellW || PILLAR_MIN_CELL_W) * PILLAR_LABEL_CELL_FILL;
}
function pillarLabelTextWidth(text, fontPx){
  return (text || "").length * fontPx * PILLAR_LABEL_CHAR_W;
}

    ? Math.min(9, Math.max(8, Math.ceil(n / 3)))

    const maxByWidth = Math.max(1, Math.floor(innerW / PILLAR_MIN_CELL_W));

    if (spec.minCols != null) cols = Math.max(spec.minCols, cols);
    if (spec.maxCols != null) cols = Math.min(spec.maxCols, cols);
    cols = Math.max(1, Math.min(cols, n));
    let rows = Math.ceil(n / cols);
    for (let attempt = 0; attempt < 14; attempt++){
      const contentW = w * fracW - 12;
      const contentH = h * fracH - 10;
      const maxCols = Math.max(1, Math.floor(contentW / PILLAR_MIN_CELL_W));
      const maxRows = Math.max(1, Math.floor(contentH / minCellH));
      rows = Math.ceil(n / cols);
      if (cols <= maxCols && rows <= maxRows) break;
      if (cols < maxCols && cols < n){ cols++; continue; }
      if (rows > maxRows && h < spec.h * 1.14){ h += 22; continue; }
      if (cols > maxCols && w < spec.w * 1.1){ w += 32; continue; }

      if (!fitsH && cols < Math.min(maxCols, n)) cols++;
      else if (!fitsW && cols > 1) cols--;

      continue;

    if (!fitsH && cols < Math.min(maxCols, n)) cols++;
    else if (!fitsW && cols > 1) cols--;
    else if (!fitsH && rows > maxRows && cols <= 1) break;

  const y0 = zoneRect.cy - zoneRect.h / 2 - slack;
  const y1 = zoneRect.cy + zoneRect.h / 2 + slack;

  const ay0 = a.cy - a.h / 2 - gap, ay1 = a.cy + a.h / 2 + gap;
  const bx0 = b.cx - b.w / 2 - gap, bx1 = b.cx + b.w / 2 + gap;
  const by0 = b.cy - b.h / 2 - gap, by1 = b.cy + b.h / 2 + gap;

  const wp = pillarZoneLayout.workplaces;
  const res = pillarZoneLayout.resilience;
  if (ai && wp && zonesOverlap(ai, wp, GAP)){
    const push = ((ai.cx + ai.w / 2 + GAP) - (wp.cx - wp.w / 2)) / 2;
    if (push > 0){ ai.cx -= push; wp.cx += push; }

function __cpnPillarLayoutSelfTest(){
  const prev = new Set(activePillars);

  for (let i = 0; i < boxes.length; i++){
    const z = pillarZoneLayout?.[boxes[i].pillar];
    if (z && !bboxInsideZone(boxes[i], z)) outside.push(placed[i].id);
    for (let j = i + 1; j < boxes.length; j++){
      if (!bboxesOverlap(boxes[i], boxes[j], 4)) continue;
      const na = placed[i], nb = placed[j];
      const pair = { a: na.id, b: nb.id, pa: boxes[i].pillar, pb: boxes[j].pillar };
      if (boxes[i].pillar !== boxes[j].pillar) cross.push(pair);

      if (zonesOverlap(zs[i], zs[j])) overlapPairs.push([PILLAR_LAYOUT.zones[i].id, PILLAR_LAYOUT.zones[j].id]);

    pinPillarNodes(viewNodes, vis);
    const inPillar = NODES.filter(n => familyPillar(n.id) === pid);
    const allLabeled = inPillar.length > 0 && inPillar.every(n => n._pillarShowLabel);
    const labelBoxes = inPillar.map(n => pillarLabelTextBBox(n, 1)).filter(Boolean);
    for (let i = 0; i < labelBoxes.length; i++)
      for (let j = i + 1; j < labelBoxes.length; j++)

  let iconLabelOverlap = 0;

  for (const n of placed){
    for (const zk of [1.4, 2.2, 3]){
      if (pillarZoomLabelFade(zk) <= 0) continue;
      const iconFoot = n.y + PILLAR_NODE_R + PILLAR_GLOW_PAD + 3;
      const fontPx = pillarLabelFontPx(zk);
      const labelTop = n.y + pillarLabelY(n);
      const labelBottom = labelTop + pillarLabelBlockH(zk);
      if (labelTop < iconFoot + 2) { iconLabelOverlap++; iconLabelFails.push({ id: n.id, why: "icon", zk, labelTop, iconFoot, cellH: n._pillarCellH }); }

  pinPillarNodes(viewNodes, filtVis);
  const filtBoxes = NODES.filter(n => filtVis.has(n.id)).map(n => pillarIconBBox(n));

  for (let i = 0; i < filtBoxes.length; i++){

    for (let j = i + 1; j < filtBoxes.length; j++){
      if (!bboxesOverlap(filtBoxes[i], filtBoxes[j], 4)) continue;

  const cellW = content.w / cols;
  const cellH = content.h / rows;

  items.forEach((node, idx) => {

  const frame = document.getElementById("matrix-overlay-frame");
  const ringUrl = matrixDeviceUrl(pid, "showroom", { camera: "ring" });
  let acked = false;
  const onAck = (e) => {
    if (e?.data?.type === "cpn-matrix-camera-ack" && e.data.mode === "ring") {
      acked = true;
      window.removeEventListener("message", onAck);
    }
  };
  window.addEventListener("message", onAck);
  try {
    frame?.contentWindow?.postMessage({ type: "cpn-matrix-camera", mode: "ring" }, "*");
  } catch (_) {}
  window.setTimeout(() => {
    window.removeEventListener("message", onAck);

  }, 450);
}

  const frame = document.getElementById("matrix-overlay-frame");

  const modeEl = document.getElementById("matrix-overlay-showroom-btn");
  const loadingText = document.querySelector(".matrix-overlay-loading-text");
  const product = prodById[productId];
  if (titleEl) titleEl.textContent = product?.name || spatialResolveName(productId);
  if (modeEl) modeEl.textContent = view === "aisle" ? "Aisle" : "Full showroom";
  if (loadingText) loadingText.textContent = view === "aisle" ? "Loading Device Aisle…" : "Loading 3D Showroom…";
  setMatrixOverlayLoading(true);
  if (frame){
    const onDone = () => {
      setMatrixOverlayLoading(false);
      frame.removeEventListener("load", onDone);
      frame.removeEventListener("error", onDone);
    };
    frame.addEventListener("load", onDone);
    frame.addEventListener("error", onDone);

function productIconKey(p){
  const id = (p?.id || "").toLowerCase();
  const name = (p?.name || "").toLowerCase();
  const s = id + " " + name;
  if (/quad-camera|ptz|desk-cam|desk camera/.test(s)) return "camera";
  if (/board-pro|board pro/.test(s)) return "board";
  if (/room-bar|video-bar|room-kit|codec|room kit|telepresence|\bsx\d|\bmx\d|mx700|mx800/.test(s)) return "telepresence";
  if (/room-navigator|navigator/.test(s)) return "touch";
  if (/desk-pro|desk mini|\bdesk\b|desk-pro-g2|\bex\d|\bdx\d/.test(s) && !/desk phone/.test(s)) return "telepresence";
  if (/wireless phone|wireless-\d|wireless ip phone/.test(s)) return "phone";
  if (/desk phone|deskphone|9811|8821|9841|9861|\bip-\d|video phone 8875/.test(s)) return "deskphone";
  if (/headset/.test(s)) return "headset";
  if (p?.family === "catalyst-wireless" || p?.family === "meraki-wireless") return "wifi";
  if (/access point|\bwireless ap\b|917|913|912|910|916|c911|c916|cw917|meraki mr/.test(s)) return "wifi";
  if (/catalyst|switch|9200|9300|9400|9600|meraki.*switch|nexus/.test(s)) return "switch";
  if (/router|isr|asr|8000|c8000|secure-router/.test(s)) return "router";
  if (/firewall|ftd|asa|firepower|hypershield/.test(s)) return "shield";
  if (/hyperflex/.test(s)) return "hyperflex";
  if (/ucs|server|blade|c220|c240/.test(s)) return "server";
  if (p?.family === "intersight") return "intersight";
  if (/thousandeyes|\bte-/.test(s)) return "thousandeyes";
  if (/\bxdr\b|securex/.test(s)) return "insights";
  if (/splunk|appdynamics|fso/.test(s)) return "chart-line";
  const cat = p?.category;
  if (cat === "collaboration") return "telepresence";
  if (cat === "networking") return "switch";
  if (cat === "security") return "shield";
  if (cat === "computing") return "server";
  if (cat === "observability") return "chart-line";
  return "product";
}

function iconKey(n) {
  // Synthetic node overrides used in Overview / Composition view modes.
  if (n._iconKey) return n._iconKey;
  if (n._kind === "product"){
    if (n._productRef) return productIconKey(n._productRef);
    const p = prodById[n.id];
    if (p) return productIconKey(p);
    return "product";
  }
  const id = n.id;
  // Networking
  if (/^(catalyst-access|catalyst-core|meraki-switches|nexus|nexus-one)$/.test(id)) return "switch";
  if (/wireless/.test(id))                                       return "wifi";
  if (/^(isr-routers|wan-routers|secure-routers)$/.test(id))     return "router";
  if (/^(sdwan|meraki-mx)$/.test(id))                            return "globe";
  if (id === "silicon-one")                                      return "chip";
  if (id === "catalyst-center")                                  return "gear";
  if (id === "intersight")                                       return "intersight";
  if (id === "aci")                                              return "fabric";
  if (id === "industrial-eth")                                   return "factory";
  // Security
  if (/^sf-/.test(id))                                           return "shield";
  if (id === "hypershield")                                      return "shield-bolt";

// ── Stable link key so D3 join() can match identical edges across rebinds.
//    (Inlined source/target id extraction so this works before `sid`/`tid` are defined.)
function linkKey(l){
  const s = typeof l.source==="object" ? l.source.id : l.source;
  const t = typeof l.target==="object" ? l.target.id : l.target;
  return s+"→"+t+"·"+(l.type||"");
}

// ── Build the inner elements of a node group (called for enter selection).
function buildNodeGroup(sel){
  const inner = sel.append("g").attr("class", "node-scaler");
  inner.append("circle").attr("class","gr")
    .attr("r", d => d._r + 9).attr("fill", d => d._pillarColor || catColor(d.category))
    .attr("fill-opacity", 0).attr("filter","url(#glow)");
  inner.append("circle").attr("class","mc")
    .attr("r", d => d._r)
    .attr("fill", d => d._hasImage ? MATRIX_NODE_FILL : (d._pillarColor || catColor(d.category)))
    .attr("fill-opacity", d => d._hasImage ? 1 : 0.88)
    .attr("stroke", d => d._hasImage ? MATRIX_NODE_RING : "transparent")
    .attr("stroke-width", d => d._hasImage ? 1.4 : 2.5);
  inner.append("circle").attr("class","mring")
    .attr("r", d => d._r + 1.4).attr("fill", "none")
    .attr("stroke", d => {
      if (d._status === "eol") return "#ef4444";
      if (d._status === "eos") return "#FF9000";
      if (d._hasImage) return "rgba(148,163,184,0.55)";
      return "transparent";
    })
    .attr("stroke-width", d => d._hasImage ? 1.2 : 0)
    .style("pointer-events", "none");
  inner.filter(d => d._hasImage && matrixImageUrl(d.id)).each(function(d){
    const g = d3.select(this);
    const cid = ensureProductClip(d.id, d._r);
    const pad = d._r * MATRIX_IMG_INSET;
    g.append("image").attr("class", "pimg")

      .attr("clip-path", `url(#${cid})`)
      .style("pointer-events", "none");
  });
  inner.append("use").attr("class","icn")
    .attr("href",   d => "#icon-" + iconKey(d))
    .attr("width",  d => d._r * 1.28)
    .attr("height", d => d._r * 1.28)
    .attr("x",      d => -d._r * 0.64)
    .attr("y",      d => -d._r * 0.64)
    .attr("fill",   "#ffffff")
    .style("color", "#ffffff")
    .style("pointer-events", "none")
    .style("display", d => d._hasImage ? "none" : null);
  const lwrap = sel.append("g").attr("class", "nl-wrap").style("pointer-events", "none");
  lwrap.append("text").attr("class","nl")
    .attr("y", d => d._r + 14).text(d => d._shortName || d.name)

    .style("text-anchor","middle").style("pointer-events","none");
}

function panelOffsetW(){
  if (typeof plannerOpen !== "undefined" && plannerOpen) return 490;
  const panel = document.getElementById("panel");
  return panel?.classList.contains("open") ? 390 : 0;
}

/** Left/top chrome that should stay clear of the graph (pillar legend in Families). */
function graphChromeInsets(){
  const right = panelOffsetW();
  let left = 0, top = 0;
  const leg = document.getElementById("pillar-legend");
  if (viewMode === "families" && usePillarLayout() && leg?.classList.contains("show")){
    const lw = leg.offsetWidth || 280;
    const lh = leg.offsetHeight || 168;
    left = Math.min(340, lw + 28);
    top = lh + 20;
  }
  return { left, top, right };
}

function nodeVisibleForFit(n){
  if (viewMode === "composition") return true;
  if (viewMode === "families") return familyNodeVisible(n);
  if (viewMode === "all-products"){
    if (n._kind === "product") return productMatchesFilters(n._productRef || prodById[n.id]);
    return familyNodeVisible(n);
  }
  return true;
}

function applyGraphTransform(cx, cy, k, immediate, opts){
  const {w, h} = getDims();
  const { left, top, right } = graphChromeInsets();
  const tx = (w - right + left) / 2;
  const topBias = opts?.topBias ?? 1;
  const ty = (h + top * topBias) / 2;
  const t = d3.zoomIdentity.translate(tx, ty).scale(k).translate(-cx, -cy);
  if (immediate){
    svg.interrupt();
    svg.call(zoom.transform, t);
  } else {
    svg.transition().duration(480).call(zoom.transform, t);
  }
}

function syncCompositionPositions(){
  if (viewMode !== "composition") return;
  viewNodes.forEach(n => {
    if (n.fx != null) n.x = n.fx;
    if (n.fy != null) n.y = n.fy;
    n.vx = 0;
    n.vy = 0;
  });
}

function applyCompositionLayout(){
  syncCompositionPositions();
  const pos = new Map(viewNodes.map(n => [n.id, n]));
  const px = id => pos.get(id)?.x ?? 0;
  const py = id => pos.get(id)?.y ?? 0;
  if (ndEl) ndEl.attr("transform", d => `translate(${d.x},${d.y})`);
  if (lviz) lviz.attr("x1", d => px(sid(d))).attr("y1", d => py(sid(d)))
    .attr("x2", d => px(tid(d))).attr("y2", d => py(tid(d)));
  if (lhit) lhit.attr("x1", d => px(sid(d))).attr("y1", d => py(sid(d)))
    .attr("x2", d => px(tid(d))).attr("y2", d => py(tid(d)));
}

function fitCompositionView(){
  const {w, h} = getDims();
  if (w < 40 || h < 40) return;
  const pw = panelOffsetW();
  const r = (compositionOrbitR || 160) + 40;
  const diameter = (r + 32) * 2;
  const k = Math.min(1.05, Math.max(0.55, Math.min(w - pw - 48, h - 90) / diameter));
  applyGraphTransform(0, 0, k, true);
}

function fitVisibleGraphView(fallbackScale){
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity, count = 0;
  viewNodes.forEach(n => {
    if (!nodeVisibleForFit(n)) return;
    const x = n.fx != null ? n.fx : n.x;
    const y = n.fy != null ? n.fy : n.y;
    if (x == null || y == null) return;
    const pad = (n._r || 16) + 22;
    minX = Math.min(minX, x - pad);
    maxX = Math.max(maxX, x + pad);
    minY = Math.min(minY, y - pad);
    maxY = Math.max(maxY, y + pad + 16);
    count++;
  });
  if (!count){ applyGraphTransform(0, 0, fallbackScale || 0.78); return; }
  applyGraphTransform((minX + maxX) / 2, (minY + maxY) / 2,
    Math.min(1.15, Math.max(0.35, (() => {
      const {w, h} = getDims();
      const pw = panelOffsetW();
      const bw = Math.max(maxX - minX, 60);
      const bh = Math.max(maxY - minY, 60);
      return Math.min((w - pw - 72) / bw, (h - 96) / bh);
    })())));
}

function fitAllProductsView(){
  const F = ALL_FIT;
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity, count = 0;
  viewNodes.forEach(n => {
    if (!nodeVisibleForFit(n)) return;
    const x = n.fx != null ? n.fx : n.x;
    const y = n.fy != null ? n.fy : n.y;
    if (x == null || y == null) return;
    const pad = (n._r || 16) + F.padExtra;
    minX = Math.min(minX, x - pad);
    maxX = Math.max(maxX, x + pad);
    minY = Math.min(minY, y - pad);
    maxY = Math.max(maxY, y + pad + 16);
    count++;
  });
  if (!count){ applyGraphTransform(0, 0, 0.50); return; }
  const { w, h } = getDims();
  const { left, top, right } = graphChromeInsets();
  const bw = Math.max(maxX - minX, 60);
  const bh = Math.max(maxY - minY, 60);
  const availW = Math.max(320, w - right - left - F.marginX);
  const availH = Math.max(240, h - top - F.marginY);
  const k = Math.min(F.maxK, Math.max(F.minK,
    Math.min(availW / bw * F.widthFill, availH / bh * F.heightFill)));
  applyGraphTransform((minX + maxX) / 2, (minY + maxY) / 2, k);
}

function fitOverviewDeckView(){
  const D = OVERVIEW_DECK;
  const F = OVERVIEW_FIT;
  const pad = F.pad;
  const minX = -D.resW / 2 - pad;
  const maxX = D.resW / 2 + pad;
  const minY = D.topY - D.topH / 2 - pad;
  const maxY = D.aiY + pad;
  const { w, h } = getDims();
  const pw = panelOffsetW();
  const bw = maxX - minX;
  const bh = maxY - minY;
  const availW = Math.max(320, w - pw - F.marginX);
  const availH = Math.max(240, h - F.marginY);
  const k = Math.min(F.maxK, Math.max(F.minK,
    Math.min(availW / bw * F.widthFill, availH / bh * F.heightFill)));
  applyGraphTransform(0, (minY + maxY) / 2, k);
}

function fitPillarLayoutView(){
  const focused = singlePillarFocused();
  const F = focused ? PILLAR_FIT.focus : PILLAR_FIT.all;
  const pad = F.pad;
  const vis = new Set();
  NODES.forEach(n => { if (familyNodeVisible(n)) vis.add(n.id); });
  const buckets = pillarLayoutBuckets(vis);
  let zones;
  if (focused){
    const id = focusedPillarId();
    zones = [pillarZoneLayout?.[id] || layoutZoneForItems(PILLAR_ZONE_BY_ID[id], buckets[id] || [])];
  } else {
    zones = PILLAR_LAYOUT.zones
      .filter(z => pillarIsVisible(z.id) && (buckets[z.id]?.length || 0) > 0)
      .map(z => pillarZoneLayout?.[z.id] || layoutZoneForItems(z, buckets[z.id]));
  }
  if (!zones.length) return;
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  zones.forEach(z => {
    minX = Math.min(minX, z.cx - z.w / 2 - pad);
    maxX = Math.max(maxX, z.cx + z.w / 2 + pad);
    minY = Math.min(minY, z.cy - z.h / 2 - pad);
    maxY = Math.max(maxY, z.cy + z.h / 2 + pad);
  });
  const { w, h } = getDims();
  const { left, top, right } = graphChromeInsets();
  const bw = maxX - minX, bh = maxY - minY;
  const availW = Math.max(320, w - right - left - F.marginX);
  const availH = Math.max(240, (focused ? h - top : h) - F.marginY);
  const k = Math.min(F.maxK, Math.max(F.minK,
    Math.min(availW / bw * F.widthFill, availH / bh * F.heightFill)));
  applyGraphTransform(0, (minY + maxY) / 2, k, false, { topBias: 0.18 });
}

let graphFitTimer = null;
function scheduleGraphFit(mode){
  clearTimeout(graphFitTimer);
  const delay = mode === "composition" ? 0 : 280;
  const run = () => {
    if (viewMode === "composition") fitCompositionView();
    else if (viewMode === "overview") fitOverviewDeckView();
    else if (viewMode === "families" && usePillarLayout()) fitPillarLayoutView();
    else if (viewMode === "all-products") fitAllProductsView();
    else if (viewMode === "families") fitVisibleGraphView(0.78);
  };
  if (delay === 0) requestAnimationFrame(() => requestAnimationFrame(run));
  else graphFitTimer = setTimeout(run, delay);
}

function compositionInteractionSet(selectedNode){
  const related = new Set();
  if (!selectedNode) return related;
  related.add(selectedNode.id);
  if (selectedNode._kind === "family" && viewFocus){
    viewNodes.forEach(n => { if (n._kind === "product") related.add(n.id); });
  } else if (viewFocus){
    related.add(viewFocus);
    viewLinks.forEach(l => {
      const s = sid(l), t = tid(l);
      if (s === selectedNode.id || t === selectedNode.id){ related.add(s); related.add(t); }
    });
  }
  return related;
}

function updateCompositionLabelVisibility(_k){

function pillarZoneStats(items){
  const families = items.length;
  const cur = items.reduce((n, id) =>
    n + PRODUCTS.filter(p => p.family === id && productMatchesFilters(p) && p.status === "current").length, 0);
  return `${families} families · ${cur} current`;
}

function ambientFilterIntensity(){
  const totalCats = Object.keys(CATS).length;
  let n = 0;
  if (activePillars.size === 1) n = Math.max(n, 0.88);
  else if (activePillars.size > 0) n = Math.max(n, 0.58);
  if (activeCats.size < totalCats) n = Math.max(n, 0.46);
  if (activeUC || activeInd) n = Math.max(n, 0.4);
  if (facetState.status.size !== 1 || !facetState.status.has("current") || facetState.tier.size > 0) n = Math.max(n, 0.36);
  if (viewMode === "spatial" && spatialState.filterActive) n = Math.max(n, 0.5);
  return n;
}

function syncAmbientReactivity(pillarId){
  const el = document.getElementById("bg-ambient");
  if (!el) return;
  const filterBoost = ambientFilterIntensity();
  const focusBoost = pillarId ? 1 : (viewMode === "families" && singlePillarFocused() ? 1 : 0);
  const intensity = Math.min(1, Math.max(filterBoost, focusBoost));
  el.style.setProperty("--ambient-intensity", String(intensity));
  el.classList.toggle("ambient-hot", intensity > 0.72);
  el.classList.toggle("ambient-filtered", filterBoost > 0.05 && !pillarId);
  if (!pillarId && activePillars.size){
    if (activePillars.has("ai-dc")) el.dataset.tintAi = "1"; else delete el.dataset.tintAi;
    if (activePillars.has("workplaces")) el.dataset.tintWp = "1"; else delete el.dataset.tintWp;
    if (activePillars.has("resilience")) el.dataset.tintRes = "1"; else delete el.dataset.tintRes;
  } else {
    delete el.dataset.tintAi;
    delete el.dataset.tintWp;
    delete el.dataset.tintRes;
  }
  document.body.classList.toggle("spatial-selection-active", viewMode === "spatial" && !!selected);
}

function setAmbientPillarTint(pillarId){
  const el = document.getElementById("bg-ambient");
  if (!el) return;
  if (pillarId) el.dataset.pillar = pillarId;
  else delete el.dataset.pillar;
  syncAmbientReactivity(pillarId);
}

function updateCanvasFocusState(){
  document.body.classList.remove("canvas-focus");
  document.body.classList.toggle("pillar-focus", usePillarLayout() && singlePillarFocused());
  if (viewMode === "families" && singlePillarFocused()) setAmbientPillarTint(focusedPillarId());
  else if (viewMode === "families" && selected && usePillarLayout()) setAmbientPillarTint(familyPillar(selected.id));
  else setAmbientPillarTint(null);

function applyPillarNodeVisualState(selectedNode){
  if (!ndEl || !usePillarLayout()) return;
  const conn = selectedNode ? connectionNodeSet(selectedNode.id, connectionHighlightDepth) : null;
  const boosted = singlePillarFocused();
  ndEl.each(function(nd){
    const g = d3.select(this);
    const isSel = selectedNode && nd.id === selectedNode.id;
    const isHov = nd.id === pillarHoverId;
    const isConn = selectedNode && conn?.has(nd.id);
    const hot = isSel || isHov || isConn;
    const accent = pillarNodeAccent(nd.id);
    g.classed("nd-selected", isSel)
      .classed("nd-hover", isHov && !isSel)
      .classed("nd-stack", false);
    g.select(".gr")
      .attr("fill", accent)
      .attr("fill-opacity", hot ? 0.46 : (boosted ? 0.38 : 0.3))
      .attr("filter", boosted || hot ? "url(#glow)" : null);
    g.select(".mc")
      .attr("fill-opacity", hot ? 1 : (boosted ? 1 : 0.9))
      .attr("stroke", hot ? "#ffffff" : accent)
      .attr("stroke-width", hot ? 2.75 : (boosted ? 2.5 : 2.25))
      .attr("stroke-opacity", hot ? 1 : (boosted ? 1 : 0.94));
    g.select(".node-scaler").attr("transform", (isSel || isHov) ? "scale(1.06)" : null);
  });
  updateCanvasFocusState();
}

function viewTransitionClass(from, to){
  if (to === "spatial" || from === "spatial") return "view-x-dissolve";
  if (from === "overview" && to === "families") return "view-x-expand";
  if (from === "families" && to === "overview") return "view-x-contract";
  if ((from === "families" && to === "all-products") || (from === "all-products" && to === "families")) return "view-x-scan";
  if (to === "composition" || from === "composition") return "view-x-focus";
  return "view-x-default";
}

function clearViewTransitionClasses(){
  document.body.classList.remove("view-transitioning", "view-x-dissolve", "view-x-expand", "view-x-contract", "view-x-scan", "view-x-focus", "view-x-default");
  ["gs", "spatial-wrap"].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.remove("view-exit", "view-enter", "view-x-dissolve", "view-x-expand", "view-x-contract", "view-x-scan", "view-x-focus", "view-x-default");
  });
}

function runViewTransition(callback, from, to){
  const gs = document.getElementById("gs");
  const sw = document.getElementById("spatial-wrap");
  const xcls = viewTransitionClass(from, to);
  const els = [gs, sw].filter(el => el && (el.offsetParent !== null || el === gs));
  const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (reduced || els.length === 0){ callback(); return; }
  document.body.classList.add("view-transitioning", xcls);
  els.forEach(el => { el.classList.add("view-exit", xcls); });
  setTimeout(() => {
    callback();
    requestAnimationFrame(() => {
      els.forEach(el => {
        el.classList.remove("view-exit");
        el.classList.add("view-enter", xcls);
      });
      setTimeout(() => {
        clearViewTransitionClasses();
      }, 360);
    });
  }, from === "spatial" || to === "spatial" ? 200 : 160);
}

function updateCompositionOrbitGuide(){
  let g = lyr.select("g.comp-orbit");
  if (viewMode !== "composition" || !compositionOrbitR){

  if (g.empty()) g = lyr.insert("g", ":first-child").attr("class", "comp-orbit").style("pointer-events", "none");
  const radii = [compositionOrbitR * 0.55, compositionOrbitR, compositionOrbitR * 1.35].filter(r => r > 20);
  g.selectAll("circle").data(radii).join("circle")
    .attr("cx", 0).attr("cy", 0).attr("r", d => d)
    .attr("fill", "none")
    .attr("stroke", (d, i) => i === 1 ? "rgba(148,163,184,0.28)" : "rgba(148,163,184,0.14)")
    .attr("stroke-width", (d, i) => i === 1 ? 1.2 : 0.8)

function applyCompositionInteractionStyles(selectedNode){
  if (viewMode !== "composition" || !ndEl) return;
  const related = compositionInteractionSet(selectedNode);
  const selId = selectedNode?.id;
  ndEl.each(function(nd){
    const g = d3.select(this);
    const isSel = nd.id === selId;
    const isHov = nd.id === compositionHoverId;
    const hot = isSel || isHov || related.has(nd.id);
    const dim = selectedNode && !hot;
    g.classed("nd-dim", dim);
    g.select(".node-scaler").attr("transform", (isSel || isHov) ? "scale(1.08)" : null);
    g.select(".gr").attr("fill-opacity", () => {
      if (nd._kind === "family") return isSel || isHov ? 0.34 : 0.22;
      if (nd._hasImage) return isSel || isHov ? 0.18 : 0;
      return isSel || isHov ? 0.14 : 0.06;
    });
    g.select(".mc").attr("fill-opacity", dim ? 0.35 : (nd._hasImage ? 1 : (isSel ? 1 : 0.92)));
    g.select("image.pimg").attr("opacity", dim ? 0.28 : (nd._status === "eol" ? 0.42 : 1));
    g.select(".mring").attr("stroke", () => {
      if (nd._status === "eol") return "#ef4444";
      if (nd._status === "eos") return "#FF9000";
      if (nd._kind === "family") return "rgba(255,255,255,0.9)";
      if (nd._hasImage && nd._hasSuccessor && (isSel || isHov)) return "rgba(168,85,247,0.95)";
      if (nd._hasImage && (isSel || isHov)) return "rgba(45,206,92,0.85)";
      if (nd._hasImage) return "rgba(148,163,184,0.55)";
      return "transparent";
    }).attr("stroke-width", () => {
      if (nd._kind === "family") return 2.2;
      if (nd._hasImage && (isSel || isHov)) return 2;
      if (nd._hasImage) return 1.2;
      return 0;
    });
    const labelStyle = compositionLabelStyle(nd);
    g.select("text.nl").style("opacity", dim ? 0.4 : 1)
      .style("fill", isSel ? "#ffffff" : (isHov ? "#ffffff" : labelStyle.fill));
  });
  if (lviz){
    lviz.attr("stroke-opacity", l => {
      if (!selectedNode) return l.type === "succession" ? 0.62 : 0.28;
      const s = sid(l), t = tid(l);
      const lit = related.has(s) && related.has(t);
      if (l.type === "succession") return lit ? 0.78 : 0.1;
      return lit ? 0.42 : 0.08;
    });
  }
}

function applyCompositionNodeStyles(){
  if (viewMode !== "composition" || !ndEl) return;
  ndEl.select(".mc")
    .attr("fill", d => d._hasImage ? MATRIX_NODE_FILL : catColor(d.category))
    .attr("stroke", d => {
      if (d._hasImage) return MATRIX_NODE_RING;
      if (d._status === "eol") return "#ef4444";
      if (d._status === "eos") return "#FF9000";
      if (d._kind === "family") return "rgba(255,255,255,0.35)";
      return "transparent";
    })
    .attr("stroke-width", d => {
      if (d._hasImage) return 1.4;
      if ((d._status && d._status !== "current") || d._kind === "family") return d._kind === "family" ? 2 : 2;
      return 0;
    });
  ndEl.select(".mring")
    .attr("stroke", d => {
      if (d._status === "eol") return "#ef4444";
      if (d._status === "eos") return "#FF9000";
      if (d._kind === "family") return "rgba(255,255,255,0.88)";
      if (d._hasImage) return "rgba(148,163,184,0.55)";

    })

}

function updatePillarGuides(){
  const show = usePillarLayout();
  lyr.select("g.pillar-guides").remove();

  ensurePillarZoneDefs();
  const T = pillarGuidesTheme();

  }

  NODES.forEach(n => { if (familyNodeVisible(n)) visIds.add(n.id); });
  const buckets = pillarLayoutBuckets(visIds);
  const laidOut = {};
  PILLAR_LAYOUT.zones.forEach(z => {
    if (!pillarIsVisible(z.id)) return;
    const items = buckets[z.id] || [];
    if (!items.length) return;
    laidOut[z.id] = pillarZoneLayout?.[z.id] || layoutZoneForItems(z, items);
  });
  if (singlePillarFocused()){
    const fp = focusedPillarId();
    const lz = laidOut[fp];
    if (lz){
      const pad = 32;

        .attr("x", bx).attr("y", by)

        .attr("stroke-width", 1.25)
        .attr("stroke-opacity", isLightTheme() ? 0.45 : 0.55)
        .style("pointer-events", "none");
    }
  }
  const hasAi = (buckets["ai-dc"]?.length || 0) > 0;
  const hasWp = (buckets.workplaces?.length || 0) > 0;
  const hasRes = (buckets.resilience?.length || 0) > 0;
  if (allPillarsSelected() && hasAi && hasWp && hasRes && laidOut["ai-dc"] && laidOut.workplaces && laidOut.resilience){
    const hubX = 0;
    const connG = g.append("g").attr("class", "pillar-connectors").style("pointer-events", "none");
    const ai = laidOut["ai-dc"], wp = laidOut.workplaces, res = laidOut.resilience;
    const aiBot = { x: ai.cx, y: ai.cy + ai.h / 2 };
    const wpBot = { x: wp.cx, y: wp.cy + wp.h / 2 };
    const resTop = { x: res.cx, y: res.cy - res.h / 2 };
    [ [aiBot.x, aiBot.y, hubX, hubY], [wpBot.x, wpBot.y, hubX, hubY], [hubX, hubY, resTop.x, resTop.y] ]
      .forEach(([x1, y1, x2, y2]) => {
        connG.append("line").attr("class", "zone-spine").attr("x1", x1).attr("y1", y1).attr("x2", x2).attr("y2", y2)
          .attr("stroke", T.connStroke).attr("stroke-opacity", 0.58).attr("stroke-width", 1.75);
      });
    connG.append("circle").attr("cx", hubX).attr("cy", hubY).attr("r", 3.5)
      .attr("fill", T.cardBorder).attr("fill-opacity", 0.75);
    const spineY = hubY - 18;
    const leftX = ai.cx + ai.w / 2;
    const rightX = wp.cx - wp.w / 2;
    const connLabel = ONE_CISCO.connectivityLabel;
    const labelW = connLabel.length * 6.8 + 14;
    const gapHalf = labelW / 2 + 8;
    const midX = (leftX + rightX) / 2;
    connG.append("line").attr("class", "zone-spine")
      .attr("x1", leftX).attr("y1", spineY).attr("x2", midX - gapHalf).attr("y2", spineY)
      .attr("stroke", T.spineStroke).attr("stroke-opacity", 0.62).attr("stroke-width", 1.5);
    connG.append("line").attr("class", "zone-spine")
      .attr("x1", midX + gapHalf).attr("y1", spineY).attr("x2", rightX).attr("y2", spineY)
      .attr("stroke", T.spineStroke).attr("stroke-opacity", 0.62).attr("stroke-width", 1.5);
    connG.append("text").attr("class", "zone-spine-label")
      .attr("x", midX).attr("y", spineY + 4).attr("fill", T.connLabel).text(connLabel);
  }
  PILLAR_LAYOUT.zones.forEach(z => {
    if (!pillarIsVisible(z.id)) return;
    const items = buckets[z.id] || [];
    if (!items.length) return;
    const dim = activePillars.size > 0 && !activePillars.has(z.id);
    const hot = activePillars.has(z.id);
    const lz = laidOut[z.id] || layoutZoneForItems(z, items);
    const zg = g.append("g").attr("class", "zone zone-" + z.id + (dim ? " zone-dim" : "") + (hot ? " zone-hot" : ""));
    const x = lz.cx - lz.w / 2, y = lz.cy - lz.h / 2;
    const headerOp = dim ? 0.4 : hot ? 1 : 0.96;
    zg.append("rect").attr("class", "zone-rect zone-fill")
      .attr("x", x).attr("y", y).attr("width", lz.w).attr("height", lz.h)
      .attr("rx", z.gradient ? 8 : 6)
      .attr("fill", T.cardFill)
      .attr("fill-opacity", hot ? (singlePillarFocused() ? 0.94 : 0.92) : 0.86)
      .attr("stroke", "none")
      .style("pointer-events", "none");
    zg.append("rect").attr("class", "zone-rect zone-tint")
      .attr("x", x).attr("y", y).attr("width", lz.w).attr("height", lz.h)
      .attr("rx", z.gradient ? 8 : 6)
      .attr("fill", z.color)
      .attr("fill-opacity", hot ? (singlePillarFocused() ? 0.18 : 0.14) : 0.1)
      .attr("stroke", "none")
      .style("pointer-events", "none");
    zg.append("rect").attr("class", "zone-rect zone-border")
      .attr("x", x).attr("y", y).attr("width", lz.w).attr("height", lz.h)
      .attr("rx", z.gradient ? 8 : 6)
      .attr("fill", "none")
      .attr("stroke", z.gradient ? "url(#pillar-resilience-grad)" : (hot && singlePillarFocused() ? z.color : T.zoneBorder))
      .attr("stroke-width", hot && singlePillarFocused() ? (z.gradient ? 3 : 2.75) : (z.gradient ? 2.75 : 2.25))
      .attr("stroke-opacity", 1)
      .style("pointer-events", "none");
    appendPillarZoneHeader(zg, z, x, y, lz.w, headerOp);
    const statsPad = 16;
    zg.append("text").attr("class", "zone-stats")
      .attr("x", x + lz.w - statsPad).attr("y", y + lz.h - statsPad)
      .attr("text-anchor", "end").attr("fill-opacity", dim ? 0.35 : 0.75)
      .text(pillarZoneStats(items));
    zg.append("rect").attr("class", "zone-hit")
      .attr("x", x).attr("y", y).attr("width", lz.w).attr("height", lz.h)
      .attr("rx", z.gradient ? 8 : 6)
      .attr("fill", "transparent")
      .on("click", ev => { ev.stopPropagation(); togglePillarFilter(z.id); });
  });
}

function updatePillarLegend(show){
  const el = document.getElementById("pillar-legend");
  if (!el) return;
  if (!show){ el.classList.remove("show"); el.setAttribute("aria-hidden", "true"); return; }
  const total = NODES.length;
  const allActive = allPillarsSelected() ? " active" : "";
  const rows = [...PILLAR_LAYOUT.zones].map(z => {
    const cnt = familiesInPillar(z.id);
    const active = activePillars.has(z.id) ? " active" : "";
    return `<div class="pl-item${active}" data-pillar="${z.id}" role="button" tabindex="0">
      <span class="pl-dot" style="background:${z.color}"></span>
      <div class="pl-name">${z.label}</div>
      <span class="pl-count">${cnt}</span>
    </div>`;
  }).join("");
  el.innerHTML = `<div class="pl-row">
    <div class="pl-item pl-all${allActive}" data-pillar="__all__" role="button" tabindex="0" title="Show all three pillars">
      <span class="pl-dot" style="background:linear-gradient(135deg,#0A60FF 33%,#2dce5c 66%,#FF9000)"></span>
      <div class="pl-name">All pillars</div>
      <span class="pl-count">${total}</span>
    </div>${rows}</div>`;
  el.querySelectorAll(".pl-item").forEach(row => {
    const pid = row.dataset.pillar;
    const activate = () => {
      if (pid === "__all__"){ clearPillarFilter(); applyFilters(); scheduleGraphFit("families"); return; }
      togglePillarFilter(pid);
    };
    row.addEventListener("click", ev => { ev.stopPropagation(); activate(); });
    row.addEventListener("keydown", ev => {
      if (ev.key === "Enter" || ev.key === " "){ ev.preventDefault(); activate(); }
    });
  });
  el.classList.add("show");
  el.setAttribute("aria-hidden", "false");
  if (viewMode === "families") requestAnimationFrame(() => scheduleGraphFit("families"));
}

  function drawCard(spec){

      .attr("preserveAspectRatio", "xMidYMid meet");
