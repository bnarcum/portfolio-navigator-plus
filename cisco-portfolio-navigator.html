      .attr("x", contentX + iconSize + gap).attr("y", h / 2 + 6)
      .attr("fill", T.accent)
      .style("font-size", `${textSize}px`)
      .style("font-weight", "700")
      .text(label);
    if (centered){
      const tb = textEl.node().getBBox();
      const totalW = iconSize + gap + tb.width;
      contentX = (w - totalW) / 2;
      iconImg.attr("x", contentX);
      textEl.attr("x", contentX + iconSize + gap);
    }
    const p = PILLAR_BY_ID[pillarId];
    card.on("click", ev => {
      ev.stopPropagation();
      applyViewLevel("families");
    });
    card.on("dblclick", ev => {
      ev.stopPropagation();
      applyViewLevel("families", { focusPillar: pillarId });
    });
    card.on("mouseover", ev => {
      card.attr("transform", `translate(${tx},${ty - 3})`).attr("filter", "url(#ov-card-glow)");
      border.attr("stroke-opacity", 1);
      document.getElementById("tn").textContent = label;
      document.getElementById("tc").textContent = `${p.promise} · ${familiesInPillar(pillarId)} families · Click for all pillars · Double-click to focus`;
      tipEl.style.display = "block";
      moveTip(ev);
    });
    card.on("mousemove", moveTip);
    card.on("mouseout", () => {
      card.attr("transform", baseTransform).attr("filter", null);
      border.attr("stroke-opacity", 1);
      hideTip();
    });
  }

  drawCard({ cx: D.leftCx, cy: D.topY, w: D.topW, h: D.topH, pillarId: "ai-dc", label: PILLAR_ZONE_BY_ID["ai-dc"].label, centered: true });
  drawCard({ cx: D.rightCx, cy: D.topY, w: D.topW, h: D.topH, pillarId: "workplaces", label: PILLAR_ZONE_BY_ID.workplaces.label, centered: true });
  drawCard({ cx: 0, cy: D.resY, w: D.resW, h: D.resH, pillarId: "resilience", label: PILLAR_ZONE_BY_ID.resilience.label, gradient: true, centered: true });

  const aiG = g.append("g").attr("class", "ov-ai").style("pointer-events", "none");
  [-1, 1].forEach(dir => {
    [0, 1, 2].forEach(i => {
      aiG.append("text")
        .attr("x", dir * (108 + i * 16))
        .attr("y", D.aiY + 5)
        .attr("text-anchor", dir < 0 ? "end" : "start")
        .attr("fill", T.chevron)
        .attr("opacity", T.chevronOpacity[i])
        .style("font-size", "16px")
        .style("font-weight", "600")
        .text(dir < 0 ? "‹" : "›");
    });
  });
  aiG.append("text")
    .attr("x", 0).attr("y", D.aiY + 5)
    .attr("text-anchor", "middle")
    .attr("fill", T.aiText)
    .style("font-size", "15px")
    .style("font-weight", "600")
    .text(ONE_CISCO.aiLabel);
}

// ── Rebind selections to current viewNodes / viewLinks and restart simulation.
//    Called by applyViewLevel() and any other code that mutates the view set.
function rebindGraph(opts){
  const restart = !opts || opts.restart !== false;

  lhit = lyr.selectAll("line.lh").data(viewLinks, linkKey)
    .join(
      enter => enter.append("line").attr("class","lh")
        .attr("stroke","transparent").attr("stroke-width", 12)
        .on("mouseover", (ev,l) => onLinkPointer(ev, l))
        .on("mousemove", ev => {
          if (!hoverCardsEnabled()) return;
          if (hoveredLinkKey || selectedLinkKey) positionLinkWhyCard(ev);
          else moveTip(ev);
        })
        .on("mouseout", () => {
          if (!hoverCardsEnabled() || selectedLinkKey) return;
          hoveredLinkKey = null;
          hideLinkWhyCard();
          hideTip();
        })
        .on("click", (ev, l) => {
          if (!hoverCardsEnabled()) return;
          ev.stopPropagation();
          selectLink(ev, l);
        }),
      update => update,
      exit => exit.transition().duration(220).attr("stroke-opacity", 0).remove()
    );

  lviz = lyr.selectAll("line.lv").data(viewLinks, linkKey)
    .join(
      enter => {
        const sel = enter.append("line")
          .attr("class", d => `lv ${d.type||""}`)
          .attr("stroke", d => d.type==="direct" ? "#4a5568"
                            : d.type==="composition" ? "#3c4858"
                            : d.type==="succession"  ? "#7c3aed"
                            : "#2d3748")
          .attr("stroke-width",   d => d.type==="direct" ? 1.8 : 1)
          .attr("stroke-opacity", 0)
          .attr("stroke-dasharray", d => d.type==="adjacent" || d.type==="succession" ? "5 4" : null)
          .style("pointer-events","none");
        sel.transition().duration(280)
          .attr("stroke-opacity", d => {
            const pm = viewMode === "families" && usePillarLayout();
            return pm ? pillarLinkOpacity(d) : (d.type === "direct" ? 0.75 : 0.45);
          });
        return sel;
      },
      update => update.attr("class", d => `lv ${d.type||""}`),
      exit => exit.transition().duration(220).attr("stroke-opacity", 0).remove()
    );

  ndEl = ndG.selectAll("g.nd").data(viewNodes, d => d.id)
    .join(
      enter => {
        const g = enter.append("g").attr("class","nd")
          .call(d3.drag()
            .on("start",(ev,d)=>{ if(!ev.active) sim.alphaTarget(0.25).restart(); d.fx=d.x; d.fy=d.y; })
            .on("drag",(ev,d)=>{ d.fx=ev.x; d.fy=ev.y; })
            .on("end",(ev,d)=>{
              if(!ev.active) sim.alphaTarget(0);
              if (d._pinned) { d.fx = 0; d.fy = 0; }
              else if (d._orbitFixed && viewMode === "composition") { d.fx = d._ox; d.fy = d._oy; d.x = d._ox; d.y = d._oy; }
              else if (usePillarLayout() && nodeById[d.id]){
                const vis = new Set();
                NODES.forEach(n => { if (familyNodeVisible(n)) vis.add(n.id); });
                applyPillarLayout(vis);
              }
              else { d.fx = d.fy = null; }
            }))
          .on("click",(ev,d)=>{
            ev.stopPropagation();
            if (d._kind === "pillar"){
              applyViewLevel("families");
            } else if (d._kind === "category"){
              applyViewLevel("families", { focusCategory: d.category });
            } else if (d._kind === "product"){
              window.showProductDetail(d.id);
            } else if (d._kind === "family" && viewMode === "composition" && viewFocus === d.id){
              clearTimeout(nodeClickTimer);
              nodeClickTimer = null;
              openFamilyProductDrawer(d.id);
            } else {
              clearTimeout(nodeClickTimer);
              nodeClickTimer = setTimeout(() => {
                nodeClickTimer = null;
                if (d._kind === "family") openFamilyProductDrawer(d.id);
                else selectNode(d);
              }, 220);
            }
          })
          .on("dblclick",(ev,d)=>{
            ev.stopPropagation();
            clearTimeout(nodeClickTimer);
            nodeClickTimer = null;
            if (d._kind === "category" || d._kind === "pillar") return;
            if (d._kind === "product")  return;
            // Family node — drill into composition graph (product list drawer opens automatically).
            if (PRODUCTS.some(p => p.family === d.id)){
              if (viewMode === "composition" && viewFocus === d.id){
                openFamilyProductDrawer(d.id);
                return;
              }
              svg.interrupt();
              applyViewLevel("composition", { focusFamily: d.id });
            }
          })
          .on("mouseover",(ev,d)=>{
            if (viewMode === "composition"){
              compositionHoverId = d.id;
              applyCompositionInteractionStyles(selected);
            } else {
              if (usePillarLayout()){
                pillarHoverId = d.id;
                applyPillarLabelStyles(selected);
                applyPillarNodeVisualState(selected);
                const zk = d3.zoomTransform(svgEl).k;
                const zf = singlePillarFocused() ? 0 : pillarZoomLabelFade(zk);
                if (zf === 0 && d !== selected) showNodeTip(ev, d);
              }
              else if (viewMode === "all-products"){ pillarHoverId = d.id; applyAllProductsNodeStyles(selected); }
              if (d !== selected) showNodeTip(ev, d);
            }
          })
          .on("mousemove", ev => { if (hoverCardsEnabled()) moveTip(ev); })
          .on("mouseout", ()=>{
            if (viewMode === "composition"){
              compositionHoverId = null;
              applyCompositionInteractionStyles(selected);
            } else if (usePillarLayout()){
              pillarHoverId = null;
              applyPillarLabelStyles(selected);
              applyPillarNodeVisualState(selected);
            } else if (viewMode === "all-products"){
              pillarHoverId = null;
              applyAllProductsNodeStyles(selected);
            }
            hideTip();
          });
        buildNodeGroup(g);
        // Fade-in for new nodes.
        g.style("opacity", 0).transition().duration(320).style("opacity", 1);
        return g;
      },
      update => update,
      exit => exit.transition().duration(240).style("opacity", 0).remove()
    );

  // Refresh dynamic attributes on update — needed when a node's role
  // changes between modes (e.g. family in Families vs Composition).
  syncNodeProductImages();
  ndEl.select("use.icn").attr("href", d => "#icon-" + iconKey(d))
    .style("display", d => d._hasImage ? "none" : null);
  ndEl.select("text.nl").text(d => d._shortName || d.name);
  const pillarMode = viewMode === "families" && usePillarLayout();
  ndEl.select("circle.gr")
    .attr("r", d => d._r + (pillarMode ? 2 : 9))
    .attr("filter", pillarMode && singlePillarFocused() ? "url(#glow)" : (pillarMode ? null : "url(#glow)"))
    .attr("fill", d => pillarMode ? pillarNodeAccent(d.id) : (d._pillarColor || catColor(d.category)))
    .attr("fill-opacity", d => pillarMode ? (singlePillarFocused() ? 0.38 : 0.32) : 0);
  ndEl.select("circle.mc").attr("r", d => d._r);
  if (viewMode === "families" && !pillarMode){
    viewNodes.forEach(n => { if (nodeById[n.id]) n._r = rscale(degree[n.id] || 0); });
  }
  if (viewMode === "all-products"){
    applyAllProductsNodeStyles(selected);
  } else {
    ndEl.select("circle.mc").each(function(d){
      if (!nodeById[d.id]) return;
      const el = d3.select(this);
      if (pillarMode){
        const accent = pillarNodeAccent(d.id);
        const boosted = singlePillarFocused();
        el.attr("fill", accent).attr("fill-opacity", boosted ? 1 : 0.94)
          .attr("stroke", accent)
          .attr("stroke-width", boosted ? 2.5 : 2.25).attr("stroke-opacity", 1);
      } else {
        el.attr("fill", d._hasImage ? MATRIX_NODE_FILL : catColor(d.category))
          .attr("stroke", d._hasImage ? MATRIX_NODE_RING : "transparent")
          .attr("stroke-width", d._hasImage ? 1.4 : 2.5).attr("stroke-opacity", 1);
      }
    });
  }
  if (lviz){
    lviz.attr("stroke", l => {
      if (!pillarMode) return l.type === "direct" ? "#4a5568" : "#2d3748";
      const sp = familyPillar(sid(l)), tp = familyPillar(tid(l));
      return sp !== tp ? "#cbd5e1" : (l.type === "direct" ? "#4a5568" : "#2d3748");
    }).attr("stroke-width", l => {
      if (!pillarMode) return l.type === "direct" ? 1.8 : 1;
      const sp = familyPillar(sid(l)), tp = familyPillar(tid(l));
      return sp !== tp ? 1.2 : (l.type === "direct" ? 1.2 : 0.8);
    }).attr("stroke-opacity", l => {
      if (!pillarMode) return l.type === "direct" ? 0.75 : 0.45;
      return pillarLinkOpacity(l);
    });
  }
  if (viewMode === "composition") applyCompositionNodeStyles();
  else if (usePillarLayout()){ applyPillarLabelStyles(selected); applyPillarNodeVisualState(selected); }
  else if (viewMode === "all-products") applyAllProductsNodeStyles(selected);
  else resetStandardLabelStyles();
  updateCompositionHint();
  updatePillarGuides();
  if (viewMode === "overview"){
    ndG.style("display", "none");
    updateOverviewDeck();
  } else {
    ndG.style("display", null);
    lyr.select("g.overview-deck").remove();
  }

  sim.nodes(viewMode === "overview" ? [] : viewNodes);
  sim.force("link").links(viewLinks);
  if (restart){
    if (viewMode === "overview"){
      sim.alpha(0);
    } else if (viewMode === "composition"){
      sim.alpha(0);
      for (let i = 0; i < 3; i++) sim.tick();
      applyCompositionLayout();
    } else if (usePillarLayout()){
      sim.alpha(0).stop();
    } else sim.alpha(0.85).restart();
  }
  if (typeof watchDirectNodeClicks === "function") watchDirectNodeClicks();
}

// ── Helpers
const sid = l => (typeof l.source==="object" ? l.source.id : l.source);
const tid = l => (typeof l.target==="object" ? l.target.id : l.target);

let hoveredLinkKey = null;
let selectedLinkKey = null;
let lastPointer = { x: 0, y: 0 };
document.addEventListener("mousemove", e => { lastPointer.x = e.clientX; lastPointer.y = e.clientY; });

function connectionTypeLabel(type){
  return ({ direct: "Direct", adjacent: "Adjacent", succession: "Succession", composition: "Contains" })[type] || (type || "Connected");
}
function connectionTypeDesc(type){
  return ({
    direct: "Native integration — policy, telemetry, or control-plane coupling",
    adjacent: "Complementary pairing — often deployed together",
    succession: "Migration path — newer capability replaces or succeeds this SKU",
    composition: "Product belongs to this portfolio family"
  })[type] || "Mapped relationship in the Cisco portfolio graph";
}
function nodeUseCases(id){
  const fam = nodeById[id];
  if (fam?.useCases?.length) return fam.useCases;
  const prod = prodById[id];
  if (prod) return nodeById[prod.family]?.useCases || [];
  return [];
}
function linkUseCaseOverlap(link){
  const a = new Set(nodeUseCases(sid(link)));
  return nodeUseCases(tid(link)).filter(u => a.has(u));
}
function linkNodeName(id){
  return nodeById[id]?.name || prodById[id]?.name || id;
}
function linkAccentColor(link){
  const t = link?.type;
  if (t === "direct") return "#02C8FF";
  if (t === "adjacent") return "#FF9000";
  if (t === "succession") return "#c084fc";
  if (t === "composition") return "#64748b";
  return "#94a3b8";
}
function activeLinkKey(){ return selectedLinkKey || hoveredLinkKey; }
function applyLinkHighlight(){
  if (!lviz) return;
  const key = activeLinkKey();
  lviz.each(function(l){
    const el = d3.select(this);
    const hot = !!(key && linkKey(l) === key);
    el.classed("link-hot", hot);
    if (hot) el.style("--link-hot-color", linkAccentColor(l)).attr("stroke", linkAccentColor(l));
    else el.style("--link-hot-color", null);
  });
}
function positionLinkWhyCard(ev){
  const card = document.getElementById("link-why-card");
  if (!card || card.style.display === "none") return;
  const { w } = getDims();
  const cw = card.offsetWidth || 280;
  const ch = card.offsetHeight || 120;
  let x = ev.clientX + 16, y = ev.clientY - 12;
  if (x + cw > w - 12) x = Math.max(8, ev.clientX - cw - 16);
  if (y + ch > window.innerHeight - 12) y = window.innerHeight - ch - 12;
  if (y < 72) y = 72;
  card.style.left = x + "px";
  card.style.top = y + "px";
}
function hoverCardsEnabled(){ return viewMode !== "composition"; }

function showLinkWhyCard(ev, link){
  const card = document.getElementById("link-why-card");
  if (!card || !link || !hoverCardsEnabled()) return;
  hideTip();
  const sn = linkNodeName(sid(link)), tn = linkNodeName(tid(link));
  const overlap = linkUseCaseOverlap(link);
  const typeEl = card.querySelector(".lwc-type");
  typeEl.textContent = connectionTypeLabel(link.type);
  typeEl.style.setProperty("--ltc", linkAccentColor(link));
  card.querySelector(".lwc-label").textContent = link.label || "";
  card.querySelector(".lwc-nodes").textContent = `${sn} ↔ ${tn}`;
  const why = connectionTypeDesc(link.type);
  card.querySelector(".lwc-why").textContent = link.label ? `${why} — ${link.label}` : why;
  const ov = card.querySelector(".lwc-overlap");
  if (overlap.length){
    ov.style.display = "block";
    ov.innerHTML = `<span class="lwc-ov-t">Shared use cases</span><span class="lwc-ov-tags">${overlap.map(u => `<span class="lwc-tag">${escapeHtml(u)}</span>`).join("")}</span>`;
  } else {
    ov.style.display = "none";
    ov.innerHTML = "";
  }
  card.style.display = "block";
  card.setAttribute("aria-hidden", "false");
  positionLinkWhyCard(ev);
}
function hideLinkWhyCard(){
  if (selectedLinkKey) return;
  hoveredLinkKey = null;
  const card = document.getElementById("link-why-card");
  if (card){ card.style.display = "none"; card.setAttribute("aria-hidden", "true"); }
  applyLinkHighlight();
}
function clearLinkSelection(){
  selectedLinkKey = null;
  hoveredLinkKey = null;
  const card = document.getElementById("link-why-card");
  if (card){ card.style.display = "none"; card.setAttribute("aria-hidden", "true"); }
  applyLinkHighlight();
}
function onLinkPointer(ev, link){
  if (!hoverCardsEnabled()) return;
  if (!link){
    hoveredLinkKey = null;
    if (!selectedLinkKey) hideLinkWhyCard();
    else applyLinkHighlight();
    return;
  }
  hoveredLinkKey = linkKey(link);
  applyLinkHighlight();
  showLinkWhyCard(ev, link);
}
function selectLink(ev, link){
  if (!link || !hoverCardsEnabled()) return;
  selectedLinkKey = linkKey(link);
  showLinkWhyCard(ev, link);
  applyLinkHighlight();
}
function buildStackConnections(){
  const effSet = new Set([...stack].map(id => getEffectiveNodeId(id)));
  const conns = [];
  const seen = new Set();
  LINKS.forEach(l => {
    const s = sid(l), t = tid(l);
    if (!effSet.has(s) || !effSet.has(t)) return;
    const key = linkKey(l);
    if (seen.has(key)) return;
    seen.add(key);
    conns.push({
      source: s, target: t,
      sourceName: linkNodeName(s), targetName: linkNodeName(t),
      type: l.type, label: l.label || "",
      typeLabel: connectionTypeLabel(l.type),
      useCaseOverlap: linkUseCaseOverlap(l)
    });
  });
  [...stack].forEach(id => {
    if (stackItems.get(id) !== "product") return;
    const p = prodById[id];
    if (!p?.successor || !stack.has(p.successor)) return;
    const l = { source: id, target: p.successor, type: "succession", label: "replaced by" };
    const key = linkKey(l);
    if (seen.has(key)) return;
    seen.add(key);
    conns.push({
      source: id, target: p.successor,
      sourceName: p.name, targetName: linkNodeName(p.successor),
      type: l.type, label: l.label,
      typeLabel: connectionTypeLabel(l.type),
      useCaseOverlap: linkUseCaseOverlap(l)
    });
  });
  return conns;
}

function connectionNeighborhood(startId, maxDepth = 2, links = LINKS){
  const seen = new Map([[startId, { depth: 0 }]]);
  let frontier = [startId];
  for (let d = 1; d <= maxDepth; d++){
    const next = [];
    for (const id of frontier){
      links.forEach(l => {
        const s = sid(l), t = tid(l);
        const other = id === s ? t : id === t ? s : null;
        if (!other || seen.has(other)) return;
        seen.set(other, { depth: d, viaId: id, type: l.type, label: l.label });
        next.push(other);
      });
    }
    frontier = next;
  }
  seen.delete(startId);
  return seen;
}

function connectionNodeSet(startId, depth = connectionHighlightDepth){
  const conn = new Set([startId]);
  if (depth <= 1){
    LINKS.forEach(l => {
      const s = sid(l), t = tid(l);
      if (s === startId || t === startId){ conn.add(s); conn.add(t); }
    });
  } else {
    connectionNeighborhood(startId, depth).forEach((_, id) => conn.add(id));
  }
  return conn;
}

function buildConnectionRels(startId, maxDepth = connectionHighlightDepth){
  const direct = LINKS.map(l => {
    const s = sid(l), t = tid(l);
    if (s !== startId && t !== startId) return null;
    const oid = s === startId ? t : s;
    return { node: nodeById[oid], depth: 1, type: l.type, label: l.label, via: null };
  }).filter(Boolean).sort((a, b) => a.type === b.type ? 0 : a.type === "direct" ? -1 : 1);

  if (maxDepth <= 1){
    const hood = connectionNeighborhood(startId, 2);
    const directIds = new Set(direct.map(r => r.node.id));
    const extTotal = [...hood.entries()].filter(([id, info]) => info.depth === 2 && !directIds.has(id)).length;
    return { direct, extended: [], extTotal };
  }

  const hood = connectionNeighborhood(startId, 2);
  const directIds = new Set(direct.map(r => r.node.id));
  const extended = [...hood.entries()]
    .filter(([id, info]) => info.depth === 2 && !directIds.has(id))
    .map(([id, info]) => ({
      node: nodeById[id],
      depth: 2,
      type: info.type,
      label: info.label,
      via: nodeById[info.viaId]
    }))
    .sort((a, b) => a.node.name.localeCompare(b.node.name));
  return { direct, extended, extTotal: extended.length };
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function renderConnectionRow(r){
  const sub = r.depth === 1
    ? `${r.type === "direct" ? "Direct integration" : "Adjacent / complementary"} · ${escapeHtml(r.label)}`
    : `Via ${escapeHtml(r.via?.name || "?")} · ${escapeHtml(r.label)}`;
  const hop = r.depth > 1 ? `<span class="conn-hop">${r.depth} hops</span>` : "";
  return `<div class="ri${r.depth > 1 ? " ri-ext" : ""}" onclick="jumpTo('${r.node.id}')">
    <div class="rd" style="background:${catColor(r.node.category)}"></div>
    <div class="rif"><div class="rn">${escapeHtml(r.node.name)}${hop}</div>
    <div class="rt">${sub}</div></div>
    <div class="ra">›</div></div>`;
}

function renderConnectionsSection(d){
  const depth = connectionHighlightDepth;
  const { direct, extended, extTotal } = buildConnectionRels(d.id, depth);
  const total = direct.length + extended.length;
  const toggleLabel = depth >= 2
    ? "Show direct connections only"
    : `Show extended ecosystem${extTotal ? ` (+${extTotal} at 2 hops)` : ""}`;
  let body = `<button type="button" class="conn-depth-btn" onclick="toggleConnectionDepth('${d.id}')">${toggleLabel}</button>`;
  body += `<div class="conn-sub-t">Direct (${direct.length})</div><div class="rl">${direct.map(renderConnectionRow).join("") || `<div class="rt" style="padding:4px 2px">None mapped.</div>`}</div>`;
  if (depth >= 2 && extended.length){
    body += `<div class="conn-sub-t">Extended — 2 hops (${extended.length})</div><div class="rl">${extended.map(renderConnectionRow).join("")}</div>`;
  }
  return `<div class="p-sec"><div class="p-sec-t">Connected Technologies (${total})</div>${body}</div>`;
}

window.toggleConnectionDepth = function(nodeId){

// ── Synthesize Overview-mode: deck-style layout (rendered via updateOverviewDeck).
function buildOverviewView(){
  return { nodes: [], links: [] };
}

// ── Synthesize All-Products mode: every family + every product in one graph.
//    Heavy — ~350 nodes — so we use lower-strength forces in
//    configureForcesForMode("all-products") and a compact product radius.
function buildAllProductsView(){
  const familyNodes = NODES.map(n => {
    const cnt = PRODUCTS.filter(p => p.family === n.id).length;
    return Object.assign({}, n, {
      _kind: "family",
      _r: 24,
      _badge: cnt > 0 ? String(cnt) : null,
      // Reset any prior pin from Composition.
      fx: null, fy: null, _pinned: false
    });
  });
  const productNodes = PRODUCTS.map(p => ({
    id: p.id, name: p.name, category: p.category,
    _kind: "product", _r: 9,
    _productRef: p, _family: p.family,
    _iconKey: productIconKey(p),
    _hasImage: false,
    _status: p.status
  }));
  // Family-to-family edges (preserve the original adjacency map).
  // IMPORTANT: D3's link force mutates LINKS in place, replacing string IDs
  // with direct node-object references. When we switch view modes the family
  // clones we render here are NEW objects, so those stale refs would point
  // at unmounted nodes and D3 would draw lines into empty space ("phantom
  // edges"). Re-normalize to string IDs so forceLink resolves against the
  // current viewNodes set.
  const norm = v => (typeof v === "object" && v !== null ? v.id : v);
  const links = LINKS.map(l => ({
    source: norm(l.source),
    target: norm(l.target),
    type:   l.type,
    label:  l.label
  }));
  // Family-to-product "contains" edges.
  PRODUCTS.forEach(p => {
    links.push({ source: p.family, target: p.id, type: "composition", label: "contains" });
  });
  // Product-to-product succession edges (within and across families).
  PRODUCTS.forEach(p => {
    if (p.successor && (prodById[p.successor] || nodeById[p.successor])){
      links.push({ source: p.id, target: p.successor, type: "succession", label: "replaced by" });
    }
  });
  return { nodes: [...familyNodes, ...productNodes], links };
}

// ── Synthesize Composition-mode nodes/links for one family.
function buildCompositionView(familyId){
  const fam = nodeById[familyId];
  if (!fam) return { nodes:[], links:[] };
  const products = PRODUCTS.filter(p => p.family === familyId && productMatchesFilters(p));
  const current = products.filter(p => p.status === "current");
  const legacy = products.filter(p => p.status === "eol");
  const matrixKeyCounts = {};
  products.forEach(p => {
    const k = compositionMatrixKey(p);
    matrixKeyCounts[k] = (matrixKeyCounts[k] || 0) + 1;
  });
  const successorIds = new Set(products.filter(p => p.successor).map(p => p.id));

  const center = {
    id: fam.id,
    name: fam.name,
    category: fam.category,
    _kind: "family",
    _r: 46,
    _pinned: true,
    fx: 0, fy: 0, x: 0, y: 0,
    vx: 0, vy: 0,
    _badge: String(products.length),
    _shortName: fam.name.replace(/^Cisco\s+/i, "")
  };

  const nodes = [center];
  const placeOnRing = (items, radius) => {
    if (!items.length) return;
    compositionOrbitR = Math.max(compositionOrbitR, radius);
    const offset = -Math.PI / 2;
    items.forEach((p, i) => {
      const angle = offset + (2 * Math.PI * i) / items.length;
      const fx = Math.cos(angle) * radius;
      const fy = Math.sin(angle) * radius;
      const isLegacy = p.status !== "current";
      const hasImg = nodeHasMatrixImage({ _kind: "product", id: p.id });
      const mKey = compositionMatrixKey(p);
      const dupes = matrixKeyCounts[mKey] || 1;
      let baseR = hasImg ? (isLegacy ? 15 : 20) : (isLegacy ? 11 : 15);
      if (hasImg && dupes > 1) baseR *= 0.9;
      nodes.push({
        id: p.id,
        name: p.name,
        category: p.category,
        _kind: "product",
        _r: baseR,
        _productRef: p,
        _family: p.family,
        _iconKey: productIconKey(p),
        _shortName: compositionShortName(p),
        _status: p.status,
        _hasImage: hasImg,
        _hasSuccessor: successorIds.has(p.id) || !!p.successor,
        _orbitFixed: true,
        _ox: fx, _oy: fy,
        fx, fy, x: fx, y: fy
      });
    });
  };

  compositionOrbitR = 0;
  if (legacy.length && current.length){
    placeOnRing(current, Math.max(175, 98 + current.length * 10));
    placeOnRing(legacy, Math.max(95, 58 + legacy.length * 6));
  } else {
    const all = [...current, ...legacy];
    const radius = Math.max(140, Math.min(250, 95 + all.length * 10));
    placeOnRing(all, radius);
  }

  const links = products.map(p => ({
    source: familyId, target: p.id, type: "composition", label: "contains"
  }));
  products.forEach(p => {
    if (p.successor && products.some(q => q.id === p.successor)){
      links.push({ source: p.id, target: p.successor, type: "succession", label: "replaced by" });
    }
  });
  return { nodes, links };
}

const SPATIAL_LIB = "vendor/3d-force-graph.min.js";
const SPATIAL_LINK_PRESET_KEY = "cpn-spatial-link-preset-v2";
const spatialState = { graph: null, active: false, libPromise: null, spritePromise: null, resizeObs: null, labelCache: new Map(), tileCache: new Map(), tileLoadGen: 0, focusFamily: null, lastNodeClick: null, hoveredId: null, lightsAdded: false, threeCaptured: false, nodeRendererReady: false, meshTemplate: null, filterBoost: 1, filterActive: false, lastStats: null, linkPreset: "curved", styleBarReady: false, decorAdded: false, decorGroup: null, boundaryRings: [] };

function spatialResolveName(id){

function clearSpatialLabelCache(){
  spatialState.labelCache.clear();
  spatialState.tileLoadGen += 1;
  spatialState.tileCache.forEach(t => t.material?.map?.dispose?.());
  spatialState.tileCache.clear();
}

function captureBundledTHREE(){
  if (window.__cpnTHREE?.__bundled) return window.__cpnTHREE;
  const scene = spatialState.graph?.scene();
  if (!scene) return null;
  let refMesh = null;
  scene.traverse(o => { if (o.isMesh && o.geometry && !refMesh) refMesh = o; });
  if (!refMesh) return null;
  spatialState.meshTemplate = refMesh;
  const matCtor = refMesh.material.constructor;
  const nodesHolder = scene.children.find(c => c.type === "Group" && c !== scene);
  const THREE = {
    __bundled: true,
    Mesh: refMesh.constructor,
    MeshBasicMaterial: matCtor,
    MeshLambertMaterial: matCtor,
    Group: nodesHolder?.constructor || null,
    AmbientLight: scene.children.find(c => c.type === "AmbientLight")?.constructor,
    DirectionalLight: scene.children.find(c => c.type === "DirectionalLight")?.constructor
  };
  scene.traverse(o => {
    if (o.isMesh && o.material?.type === "MeshBasicMaterial") THREE.MeshBasicMaterial = o.material.constructor;
    if (o.isMesh && o.material?.type === "MeshLambertMaterial") THREE.MeshLambertMaterial = o.material.constructor;
    if (o.isSprite && !THREE.Sprite) THREE.Sprite = o.constructor;
    if (o.material?.type === "SpriteMaterial" && !THREE.SpriteMaterial){
      THREE.SpriteMaterial = o.material.constructor;
    }
    if (o.type === "Group" && o !== scene && !THREE.Group) THREE.Group = o.constructor;
  });
  if (!THREE.Group || THREE.Group === scene.constructor) THREE.Group = nodesHolder?.constructor || null;
  mergeSpatialThreeExtras(THREE);
  window.__cpnTHREE = THREE;
  spatialState.threeCaptured = true;
  return THREE;
}

function resolveSpatialGroupCtor(){
  const THREE = ensureSpatialTHREE();
  if (!THREE) return null;
  const scene = spatialState.graph?.scene();
  const holder = scene?.children?.find(c => c.type === "Group" && c !== scene);
  if (holder && holder.constructor !== scene?.constructor) THREE.Group = holder.constructor;
  return THREE.Group;
}

function ensureSpatialMeshTemplate(){
  if (spatialState.meshTemplate) return true;
  const THREE = ensureSpatialTHREE();
  if (!THREE?.Mesh || !THREE.SphereGeometry || !THREE.MeshBasicMaterial) return !!captureBundledTHREE()?.meshTemplate;
  spatialState.meshTemplate = new THREE.Mesh(
    new THREE.SphereGeometry(1, 16, 12),
    new THREE.MeshBasicMaterial({ color: 0xffffff })
  );
  return true;
}

function ensureSpatialNodeRenderer(attempt){
  if (!spatialState.graph) return false;
  ensureSpatialTHREE();
  if (window.__cpnTHREE) mergeSpatialThreeExtras(window.__cpnTHREE);
  if (!ensureSpatialMeshTemplate() && !captureBundledTHREE()) return false;
  if (!resolveSpatialGroupCtor()) return false;
  if (!spatialState.nodeRendererReady){
    const g = spatialState.graph;
    g.nodeColor(() => "rgba(0,0,0,0)");
    g.nodeOpacity(0);
    g.nodeThreeObject(node => buildSpatialNodeObject(node));
    g.nodeThreeObjectExtend(false);
    if (typeof g.nodeThreeObjectUpdate === "function"){
      g.nodeThreeObjectUpdate((obj, node) => updateSpatialNodeGroup(obj, node));
    }
    spatialState.nodeRendererReady = true;
  }
  return true;
}

function mergeSpatialThreeExtras(THREE){
  const extras = window.__cpnThreeExtras;
  if (!extras || !THREE) return THREE;
  if (extras.Sprite) THREE.Sprite = extras.Sprite;
  if (extras.SpriteMaterial) THREE.SpriteMaterial = extras.SpriteMaterial;
  if (extras.CanvasTexture) THREE.CanvasTexture = extras.CanvasTexture;
  if (extras.Group) THREE.Group = extras.Group;
  if (extras.Mesh) THREE.Mesh = extras.Mesh;
  if (extras.MeshBasicMaterial) THREE.MeshBasicMaterial = extras.MeshBasicMaterial;
  if (extras.MeshLambertMaterial) THREE.MeshLambertMaterial = extras.MeshLambertMaterial;
  if (extras.SphereGeometry) THREE.SphereGeometry = extras.SphereGeometry;
  if (extras.RingGeometry) THREE.RingGeometry = extras.RingGeometry;
  if (extras.PlaneGeometry) THREE.PlaneGeometry = extras.PlaneGeometry;
  if (extras.AmbientLight) THREE.AmbientLight = extras.AmbientLight;
  if (extras.DirectionalLight) THREE.DirectionalLight = extras.DirectionalLight;
  return THREE;
}

function primedSpatialTHREE(){
  const extras = window.__cpnThreeExtras;
  if (!extras) return null;
  return mergeSpatialThreeExtras(Object.assign({ __primed: true }, extras));
}

function ensureSpatialTHREE(){
  if (window.__cpnTHREE?.__bundled || window.__cpnTHREE?.__primed){
    mergeSpatialThreeExtras(window.__cpnTHREE);
    return window.__cpnTHREE;
  }
  const captured = captureBundledTHREE();
  if (captured) return captured;
  const primed = primedSpatialTHREE();
  if (primed){
    window.__cpnTHREE = primed;
    return primed;
  }
  return null;
}

function spatialMakeTexture(source){
  const THREE = ensureSpatialTHREE();
  if (!THREE?.CanvasTexture || !source) return null;
  const tex = new THREE.CanvasTexture(source);
  tex.needsUpdate = true;
  return tex;
}

const SPATIAL_NODE_REL = 5.2;

function spatialNodeRadius(node){

function spatialHexToNum(hex){

function spatialCategoryPalette(node){

function spatialNodeAccent(node){

  if (stack.has(node.id)) return { core: 0xffffff, emissive: 0x1a3344, glow: 0x02c8ff, emissiveInt: 0.48, glowOp: 0.42 };

function spatialFiltersActive(){

    || facetState.status.size !== 1 || !facetState.status.has("current") || facetState.tier.size > 0;

function spatialFilterBoost(){
  if (spatialState.focusFamily) return 1;
  const vis = getFilteredFamilyIds();
  const ratio = vis.size / Math.max(NODES.length, 1);
  if (ratio >= 0.92) return 1;
  if (vis.size <= 12) return 1.5;
  if (vis.size <= 24) return 1.32;
  if (ratio <= 0.5) return 1.2;
  return 1.1;
}

function spatialDecoFade(){
  return spatialState.filterActive ? 0.42 : 1;
}

let spatialFitTimer = null;
let spatialFitGen = 0;

function spatialGraphNodes(){
  return (spatialState.graph?.graphData()?.nodes || []).filter(n => n.id !== "__three_probe__");
}

function spatialNodeBounds(nodes, opts = {}){
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  let minZ = Infinity, maxZ = -Infinity, n = 0;
  nodes.forEach(node => {
    if (node.x == null) return;
    minX = Math.min(minX, node.x); maxX = Math.max(maxX, node.x);
    minY = Math.min(minY, node.y); maxY = Math.max(maxY, node.y);
    minZ = Math.min(minZ, node.z); maxZ = Math.max(maxZ, node.z);
    n++;
  });
  const minNeeded = opts.minNeeded ?? Math.max(1, Math.min(3, Math.floor(nodes.length * 0.35)));
  if (n < minNeeded) return null;
  const minSpan = opts.minSpan ?? (nodes.length <= 3 ? 35 : nodes.length <= 10 ? 50 : 70);
  const span = Math.max(maxX - minX, maxY - minY, maxZ - minZ, minSpan);
  return {
    cx: (minX + maxX) / 2,
    cy: (minY + maxY) / 2,
    cz: (minZ + maxZ) / 2,
    span
  };
}

function spatialChromeInsets(){
  return { top: 54, bottom: 76, left: 44, right: 36 };
}

function spatialFitCameraDistance(span, nodeCount, filtered, fitKey){
  const F = SPATIAL_FIT[fitKey || "mesh"];
  const padded = span + (F.pad || 0) * 2;
  let dist = padded * F.spanMul + F.spanAdd;
  const { w, h } = getSpatialDims();
  const ins = spatialChromeInsets();
  const availW = Math.max(320, w - ins.left - ins.right - F.marginX);
  const availH = Math.max(240, h - ins.top - ins.bottom - F.marginY);
  const aspect = availW / Math.max(1, availH);
  const fillDist = padded / Math.min(F.widthFill, F.heightFill * aspect) * 0.94;
  dist = Math.max(dist, fillDist);
  if (fitKey === "mesh"){
    dist = Math.max(dist, spatialCameraDistance(span, nodeCount, filtered) * (F.legacyScale || 1));
    if (filtered) dist *= 1.08;
  }
  return Math.min(F.maxDist, Math.max(F.minDist, dist));
}

function spatialCameraDistance(span, nodeCount, filtered){
  const n = Math.max(1, nodeCount);
  if (n <= 2) return Math.min(200, Math.max(125, span * 1.05 + 90));
  if (n <= 5) return Math.min(240, Math.max(145, span * 1.15 + 95));
  if (n <= 12) return Math.min(320, Math.max(175, span * 1.28 + 100));
  if (filtered || n < NODES.length * 0.85){
    return Math.min(400, Math.max(240, span * 1.42 + 115));
  }
  return Math.min(500, Math.max(340, span * 1.58 + 140));
}

function spatialFrameCamera(ms = 500){
  if (!spatialState.graph || spatialState.focusFamily) return false;
  const nodes = spatialGraphNodes();
  if (!nodes.length) return false;
  const bounds = spatialNodeBounds(nodes);
  if (!bounds) return false;
  const { cx, cy, cz, span } = bounds;
  const dist = spatialFitCameraDistance(span, nodes.length, spatialState.filterActive, "mesh");
  spatialState.graph.cameraPosition(
    { x: cx, y: cy + span * 0.24, z: cz + dist * 0.92 },
    { x: cx, y: cy - span * 0.04, z: cz },
    ms
  );
  return true;
}

function spatialOrbitCamera(ms = 500){
  if (!spatialState.graph || !spatialState.focusFamily) return false;
  const nodes = spatialGraphNodes();
  if (!nodes.length) return false;
  const bounds = spatialNodeBounds(nodes, { minNeeded: 1, minSpan: 28 });
  if (!bounds){
    focusSpatialNode(spatialState.focusFamily, ms);
    return true;
  }
  const { cx, cy, cz, span } = bounds;
  const dist = spatialFitCameraDistance(span, nodes.length, false, "orbit");
  spatialState.graph.cameraPosition(
    { x: cx, y: cy + span * 0.22, z: cz + dist * 0.94 },
    { x: cx, y: cy - span * 0.03, z: cz },
    ms
  );
  return true;
}

function scheduleSpatialFrameCamera(delay = 0, attempt = 0){
  const gen = spatialFitGen;
  clearTimeout(spatialFitTimer);
  spatialFitTimer = setTimeout(() => {
    if (gen !== spatialFitGen || !spatialState.active || !spatialState.graph) return;
    const frame = spatialState.focusFamily ? spatialOrbitCamera : spatialFrameCamera;
    if (frame(500)) return;
    if (attempt < 12) scheduleSpatialFrameCamera(180, attempt + 1);
  }, delay);
}

function scheduleSpatialFit(delay = 450){
  clearTimeout(spatialFitTimer);
  spatialFitTimer = setTimeout(() => {
    if (!spatialState.active || !spatialState.graph) return;
    const nodes = spatialGraphNodes();
    if (nodes.length < 1) return;
    spatialFitGen += 1;
    scheduleSpatialFrameCamera(0);
  }, delay);
}

function spatialFocusProductCount(){
  if (!spatialState.focusFamily) return 0;
  return PRODUCTS.filter(p => p.family === spatialState.focusFamily).length;
}

function spatialDisplayName(node){
  let name = node.name || spatialResolveName(node.id);
  if (node.kind !== "product" || !spatialState.focusFamily) return name;
  const count = spatialFocusProductCount();
  if (count > 8 && name.startsWith("Cisco ")) name = name.slice(6);
  const maxLen = count <= 12 ? 34 : count <= 18 ? 24 : 18;
  if (name.length > maxLen) return name.slice(0, maxLen - 1) + "…";
  return name;
}

function spatialLabelVisible(){
  return true;
}

function spatialIconKeyForNode(node){
  if (node.kind === "product" || prodById[node.id]){
    const p = prodById[node.id] || node._productRef;
    return p ? productIconKey(p) : "product";
  }
  const fam = nodeById[node.id] || node;
  return iconKey(fam);
}

function spatialNodeCategory(node){
  return node.category || catOf(node.id) || "networking";
}

function spatialNodeVisualProfile(node){
  const inOrbit = !!spatialState.focusFamily;
  const isHub = inOrbit && node.id === spatialState.focusFamily;
  if (!inOrbit) return { mode: "constellation", tileScale: 3.45, tileMin: 19.5, labelGap: 1.48, ringScale: 1.22 };
  if (isHub || node.kind === "family") return { mode: "hub", tileScale: 2.28, tileMin: 15.5, labelGap: 1.38, ringScale: 1.38 };
  return { mode: "product", tileScale: 1.82, tileMin: 13.5, labelGap: 1.22, ringScale: 1.32 };
}

function spatialTileWorldSize(radius, profile){
  const scaled = radius * profile.tileScale * 1.32;
  return Math.max(scaled, profile.tileMin || scaled);
}

function spatialLabelTextHeight(node){
  const isProduct = node.kind === "product" && spatialState.focusFamily;
  let base;
  if (selected && selected.id === node.id) base = isProduct ? 3.2 : 3.5;
  else if (stack.has(node.id)) base = isProduct ? 3 : 3.3;
  else base = isProduct ? 2.9 : 3.15;
  return base * (spatialState.filterBoost || 1);
}

function spatialLabelOffsetY(node, radius, profile){
  const tileSize = spatialTileWorldSize(radius, profile);
  const textH = spatialLabelTextHeight(node);
  const gap = profile.labelGap ?? 1.35;
  return tileSize * 0.54 + gap + textH * 0.22;
}

function spatialSymbolInner(iconKey){
  const sym = document.getElementById("icon-" + iconKey);
  return sym ? sym.innerHTML : document.getElementById("icon-product")?.innerHTML || "";
}

/** Force Cisco symbol paths to white (currentColor is black in isolated SVG tiles). */
function spatialWhitenSymbolMarkup(fragment){
  return String(fragment || "")
    .replace(/\bfill="currentColor"/gi, 'fill="#ffffff"')
    .replace(/\bstroke="currentColor"/gi, 'stroke="#ffffff"')
    .replace(/\bfill="#000000"/gi, 'fill="#ffffff"')
    .replace(/\bfill="#000"/gi, 'fill="#ffffff"');
}

/** Cisco symbols are 80×80; scale and center them inside the spatial tile disc. */
function spatialSymbolMarkup(iconKeyVal, profile){
  const inner = spatialWhitenSymbolMarkup(spatialSymbolInner(iconKeyVal));
  if (!inner) return "";
  const scale = profile?.mode === "constellation" ? 1.78 : profile?.mode === "hub" ? 1.68 : 1.58;
  return `<g transform="translate(128 128) scale(${scale}) translate(-40 -40)">${inner}</g>`;
}

function spatialAccentHex(accent, channel){
  const n = accent[channel];
  return "#" + n.toString(16).padStart(6, "0");
}

function spatialProductPhotoUrl(node){
  if (!spatialState.focusFamily) return null;
  if (node.kind !== "product" && !prodById[node.id]) return null;
  if (!productAllowsMatrixPhoto(node.id)) return null;
  return matrixImageUrl(node.id);
}

function spatialTileCacheKey(node){
  const accent = spatialNodeAccent(node);
  const profile = spatialNodeVisualProfile(node);
  const photoUrl = spatialProductPhotoUrl(node);
  return [
    node.id,
    photoUrl ? "matrix:" + photoUrl : "icon:" + spatialIconKeyForNode(node),
    "tile-v10",
    profile.mode,
    accent.core,
    selected?.id === node.id ? "sel" : "",
    stack.has(node.id) ? "stk" : ""
  ].join("|");
}

function buildSpatialTileSvg(node){
  const profile = spatialNodeVisualProfile(node);
  const iconKey = spatialIconKeyForNode(node);
  const palette = spatialCategoryPalette(node);
  const fill = palette.base;
  const glow = palette.glow;
  const deep = palette.deep || palette.emissive;
  const inner = spatialSymbolMarkup(iconKey, profile);
  const isSel = selected?.id === node.id;
  const isStk = stack.has(node.id);
  const rim = isSel ? "#66e0ff" : (isStk ? "#ffd700" : glow);
  const rimW = isSel ? 5.5 : (isStk ? 4.5 : 3.75);
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
    <defs>
      <radialGradient id="aura" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="${glow}" stop-opacity="0.48"/>
        <stop offset="70%" stop-color="${glow}" stop-opacity="0.1"/>
        <stop offset="100%" stop-color="${glow}" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="orb" cx="36%" cy="30%" r="72%">
        <stop offset="0%" stop-color="${glow}" stop-opacity="1"/>
        <stop offset="42%" stop-color="${fill}" stop-opacity="1"/>
        <stop offset="100%" stop-color="${deep}" stop-opacity="1"/>
      </radialGradient>
      <filter id="halo" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="8" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="iconPop" x="-60%" y="-60%" width="220%" height="220%">
        <feDropShadow dx="0" dy="2" stdDeviation="2.4" flood-color="#000000" flood-opacity="0.78"/>
      </filter>
    </defs>
    <circle cx="128" cy="128" r="120" fill="url(#aura)" filter="url(#halo)"/>
    <circle cx="128" cy="128" r="98" fill="url(#orb)" stroke="${rim}" stroke-width="${rimW}" stroke-opacity="${isSel || isStk ? 1 : 0.9}"/>
    <circle cx="128" cy="128" r="64" fill="${deep}" stroke="rgba(255,255,255,0.28)" stroke-width="1.5"/>
    <g fill="#ffffff" stroke="#020608" stroke-width="2.35" stroke-opacity="0.92" stroke-linejoin="round" stroke-linecap="round" paint-order="stroke fill" filter="url(#iconPop)">${inner}</g>
  </svg>`;
}

function finishSpatialTileLoad(key, gen, img){
  const entry = spatialState.tileCache.get(key);
  if (!entry || entry.gen !== gen) return;
  entry.image = img;
  entry.ready = true;
  if (spatialState.active) refreshSpatialNodeVisuals();
}

function preloadSpatialIconTile(node, key, gen){
  spatialState.tileCache.set(key, { ready: false, gen });
  const svg = buildSpatialTileSvg(node);
  const img = new Image();
  img.onload = () => finishSpatialTileLoad(key, gen, img);
  img.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
}

function preloadSpatialTiles(nodes){
  const gen = spatialState.tileLoadGen;
  nodes.forEach(n => {
    const key = spatialTileCacheKey(n);
    const existing = spatialState.tileCache.get(key);
    if (existing?.ready) return;
    if (existing && !existing.ready) return;
    const photoUrl = spatialProductPhotoUrl(n);
    if (photoUrl){
      spatialState.tileCache.set(key, { ready: false, gen });
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => finishSpatialTileLoad(key, gen, img);
      img.onerror = () => preloadSpatialIconTile(n, key, gen);
      img.src = photoUrl;
    } else {
      preloadSpatialIconTile(n, key, gen);
    }
  });
}

function getSpatialTileSprite(node, radius, profile){
  const THREE = ensureSpatialTHREE();
  if (!THREE?.Sprite || !THREE?.SpriteMaterial || !THREE?.CanvasTexture) return null;
  const key = spatialTileCacheKey(node);
  const entry = spatialState.tileCache.get(key);
  if (!entry?.ready || !entry.image) return null;
  const map = spatialMakeTexture(entry.image);
  if (!map) return null;
  const mat = new THREE.SpriteMaterial({
    map,
    transparent: true,
    depthWrite: false,
    opacity: 1
  });
  const sprite = new THREE.Sprite(mat);
  const s = spatialTileWorldSize(radius, profile);
  sprite.scale.set(s, s, 1);
  sprite.renderOrder = 4;
  return sprite;
}

function spatialNodeBaseScale(node, profile){
  return spatialNodeRadius(node) * (profile.ringScale / 4.2);
}

function ensureSpatialTileOnGroup(group, node, radius, profile){
  const rs = spatialNodeBaseScale(node, profile);
  const fresh = getSpatialTileSprite(node, radius, profile);
  if (!fresh) return;
  fresh.userData.role = "tile";
  let tile = null;
  group.traverse(obj => { if (obj.userData?.role === "tile") tile = obj; });
  if (tile){
    fresh.position.copy(tile.position);
    tile.parent.add(fresh);
    tile.parent.remove(tile);
    tile.material?.map?.dispose?.();
  } else {
    fresh.position.y = 0;
    group.add(fresh);
  }
}

function updateSpatialNodeGroup(group, node){
  if (!group || !window.__cpnTHREE) return;
  const radius = spatialNodeRadius(node);
  const profile = spatialNodeVisualProfile(node);
  const accent = spatialNodeAccent(node);
  const deco = spatialDecoFade();
  const rs = spatialNodeBaseScale(node, profile);
  const isHot = selected?.id === node.id || spatialState.hoveredId === node.id;
  const isSel = selected?.id === node.id;
  group.traverse(obj => {
    if (obj.userData?.role === "halo" && obj.material){
      obj.material.color.setHex(accent.glow);
      obj.material.opacity = (isHot ? accent.glowOp * 1.28 : accent.glowOp * 1.02) * deco;
    }
    if (obj.userData?.role === "bloom" && obj.material){
      obj.material.color.setHex(accent.glow);
      const bloomOp = isHot ? accent.glowOp * 0.62 : (isSel ? accent.glowOp * 0.14 : 0);
      obj.material.opacity = bloomOp * deco;
      const bloomScale = isHot ? rs * 2.55 : rs * 2.05;
      obj.scale.set(bloomScale, rs * 0.035, bloomScale);
    }
    if (obj.userData?.role === "label"){
      styleSpatialLabelSprite(obj, node);
      if (obj.text !== spatialDisplayName(node)) obj.text = spatialDisplayName(node);
      obj.visible = spatialLabelVisible(node);
      obj.position.y = spatialLabelOffsetY(node, radius, profile);
      obj.renderOrder = 12;
    }
  });
  ensureSpatialTileOnGroup(group, node, radius, profile);
}

function buildSpatialNodeObject(node){
  const THREE = ensureSpatialTHREE();
  const GroupCtor = resolveSpatialGroupCtor() || THREE?.Group || THREE?.Object3D;
  const template = spatialState.meshTemplate;
  if (!GroupCtor || !template) return getSpatialLabelSprite(node);
  const group = new GroupCtor();
  group.userData.nodeId = node.id;
  const radius = spatialNodeRadius(node);
  const profile = spatialNodeVisualProfile(node);
  const accent = spatialNodeAccent(node);
  const rs = spatialNodeBaseScale(node, profile);

  const halo = template.clone();
  halo.material = new THREE.MeshBasicMaterial({
    color: accent.glow,
    transparent: true,
    opacity: accent.glowOp * 0.85,
    depthWrite: false,
    blending: 2,
  });
  halo.userData.role = "halo";
  halo.scale.set(rs * 1.42, rs * 0.08, rs * 1.42);
  halo.rotation.x = Math.PI / 2;
  group.add(halo);

  const bloom = template.clone();
  bloom.material = new THREE.MeshBasicMaterial({
    color: accent.glow,
    transparent: true,
    opacity: 0,
    depthWrite: false,
    blending: 2,
  });
  bloom.userData.role = "bloom";
  bloom.scale.set(rs * 2.05, rs * 0.035, rs * 2.05);
  bloom.rotation.x = Math.PI / 2;
  group.add(bloom);

  ensureSpatialTileOnGroup(group, node, radius, profile);

  const label = getSpatialLabelSprite(node);
  label.userData.role = "label";
  label.position.y = spatialLabelOffsetY(node, radius, profile);
  label.renderOrder = 12;
  label.visible = spatialLabelVisible(node);
  group.add(label);

  group.userData.spatialRadius = radius;
  return group;
}

function ensureSpatialLights(){
  if (spatialState.lightsAdded || !spatialState.graph) return;
  const THREE = ensureSpatialTHREE();
  if (!THREE?.AmbientLight || !THREE.DirectionalLight) return;
  const scene = spatialState.graph.scene();
  scene.add(new THREE.AmbientLight(0x1a2840, 0.95));
  const key = new THREE.DirectionalLight(0xf0f6ff, 1.05);
  key.position.set(90, 130, 70);
  scene.add(key);
  const fill = new THREE.DirectionalLight(0x02c8ff, 0.28);
  fill.position.set(-70, 50, -90);
  scene.add(fill);
  spatialState.lightsAdded = true;
}

function ensureSpatialDecor(){
  /* boundary rings removed — kept as no-op for callers */
}

function updateSpatialDecor(){}

function refreshSpatialNodeVisuals(){
  if (!spatialState.graph) return;
  const nodes = spatialState.graph.graphData()?.nodes || [];
  preloadSpatialTiles(nodes);
  const byId = Object.fromEntries(nodes.map(n => [n.id, n]));
  spatialState.labelCache.forEach((sprite, id) => {
    const node = byId[id] || { id, name: spatialResolveName(id), kind: prodById[id] ? "product" : "family" };
    if (sprite.text !== spatialDisplayName(node)) sprite.text = spatialDisplayName(node);
    styleSpatialLabelSprite(sprite, node);
    sprite.visible = spatialLabelVisible(node);
  });
  spatialState.graph.scene()?.traverse(obj => {
    if (!obj.userData?.nodeId) return;
    const node = byId[obj.userData.nodeId];
    if (node) updateSpatialNodeGroup(obj, node);
  });
}

function spatialLinkHighlightTier(l){
  if (spatialState.focusFamily) return "orbit";
  if (selected){
    const conn = connectionNodeSet(selected.id, connectionHighlightDepth);
    const s = sid(l), t = tid(l);
    if (!conn.has(s) || !conn.has(t)) return "dim";
    if (s === selected.id || t === selected.id) return "hot";
    return "mid";
  }
  return "all";
}

function spatialLinkCurvature(){
  if (spatialState.focusFamily) return 0.12;
  if (spatialState.linkPreset === "straight") return 0;
  if (spatialState.filterActive) return 0.28;
  return 0.42;
}

function readSpatialLinkPreset(){
  try{
    const saved = localStorage.getItem(SPATIAL_LINK_PRESET_KEY);
    if (saved === "curved" || saved === "straight" || saved === "focus") return saved;

}

function setSpatialLinkPreset(preset){

function spatialLinkOpacity(l){
  const tier = spatialLinkHighlightTier(l);
  if (tier === "orbit") return 0.55;
  if (tier === "dim") return 0.05;
  if (tier === "hot") return 1;
  if (tier === "mid") return 0.68;
  if (tier === "all"){
    if (l.type === "direct") return 0.82;
    if (l.type === "adjacent") return 0.72;
    if (l.type === "succession") return 0.66;
    return 0.48;
  }
  if (l.type === "direct") return 0.62;
  if (l.type === "adjacent") return 0.52;
  if (l.type === "succession") return 0.56;
  return 0.38;
}

/** Bake per-link opacity into rgba — 3d-force-graph v1.73 uses linkOpacity as a numeric multiplier only. */
function spatialLinkColorResolved(l){
  const op = spatialLinkOpacity(l);
  const raw = spatialLinkColor(l);
  const rgba = raw.match(/^rgba\(([\d.]+),\s*([\d.]+),\s*([\d.]+),\s*([\d.]+)\)$/);
  if (rgba){
    const a = Math.min(1, parseFloat(rgba[4]) * op);
    return `rgba(${rgba[1]},${rgba[2]},${rgba[3]},${a.toFixed(3)})`;
  }
  const hex = raw.match(/^#([0-9a-f]{6})$/i);
  if (hex){
    const r = parseInt(hex[1].slice(0, 2), 16);
    const g = parseInt(hex[1].slice(2, 4), 16);
    const b = parseInt(hex[1].slice(4, 6), 16);
    return `rgba(${r},${g},${b},${Math.min(1, op).toFixed(3)})`;
  }
  return raw;
}

function spatialLinkColor(l){
  const tier = spatialLinkHighlightTier(l);
  if (tier === "dim") return "rgba(8,18,32,0.35)";
  if (tier === "hot"){
    if (l.type === "direct") return "rgba(2,200,255,1)";
    if (l.type === "adjacent") return "rgba(251,191,36,0.98)";
    if (l.type === "succession") return "rgba(192,132,252,0.95)";
    return "rgba(148,163,184,0.9)";
  }
  if (tier === "mid"){
    const glow = spatialCategoryPalette(selected).glow;
    if (l.type === "direct") return glow;
    if (l.type === "adjacent") return "rgba(251,191,36,0.72)";
    return "rgba(148,163,184,0.55)";
  }
  if (l.type === "succession") return tier === "all" ? "rgba(192,132,252,0.88)" : "rgba(168,85,247,0.62)";
  if (l.type === "composition") return "rgba(148,163,184,0.55)";
  if (l.type === "direct") return tier === "all" ? "rgba(2,200,255,0.88)" : "rgba(2,200,255,0.68)";
  if (l.type === "adjacent") return tier === "all" ? "rgba(255,180,60,0.82)" : "rgba(255,180,60,0.58)";
  return tier === "all" ? "rgba(148,163,184,0.55)" : "rgba(110,118,129,0.38)";
}

function spatialLinkWidth(l){
  const tier = spatialLinkHighlightTier(l);
  if (tier === "orbit"){
    if (l.type === "succession") return 0.85;
    if (l.type === "composition") return 0.55;
    return l.type === "direct" ? 1.05 : 0.45;
  }
  if (tier === "dim") return 0.28;
  if (tier === "hot"){
    if (l.type === "direct") return 2.4;
    if (l.type === "adjacent") return 1.65;
    if (l.type === "succession") return 1.35;
    return 1.05;
  }
  if (tier === "mid") return l.type === "direct" ? 1.35 : 0.95;
  if (tier === "all"){
    if (l.type === "direct") return 1.55;
    if (l.type === "adjacent") return 1.15;
    if (l.type === "succession") return 0.95;
    return 0.75;
  }
  if (l.type === "direct") return 1.15;
  if (l.type === "adjacent") return 0.85;
  if (l.type === "succession") return 0.75;
  return 0.55;
}

function spatialLinkParticles(l){
  const tier = spatialLinkHighlightTier(l);
  if (tier === "dim") return 0;
  if (tier === "hot"){
    if (l.type === "direct") return 1;
    if (l.type === "adjacent") return 1;
    return 0;
  }
  if (tier === "all" || tier === "mid" || tier === "orbit"){
    if (l.type === "direct") return 1;
    if (l.type === "adjacent") return 1;
    return 0;
  }
  if (l.type === "direct") return 1;
  return 0;
}

function spatialLinkParticleWidth(l){
  const tier = spatialLinkHighlightTier(l);
  if (tier === "hot") return l.type === "direct" ? 5.0 : 3.8;
  if (tier === "all" || tier === "mid" || tier === "orbit") return l.type === "direct" ? 3.6 : 2.8;
  return l.type === "direct" ? 3.0 : 2.2;
}

/** Tron-style energy pulses — bright cyan cores with amber on adjacent links. */
function spatialLinkParticleColor(l){
  const tier = spatialLinkHighlightTier(l);
  if (tier === "dim") return "rgba(0,255,240,0)";
  if (l.type === "adjacent") return tier === "hot" ? "#ffe066" : "#ffb020";
  if (l.type === "succession") return tier === "hot" ? "#e9d5ff" : "#c084fc";
  if (tier === "hot") return "#ffffff";
  return "#00fff0";
}

function spatialLinkParticleResolution(){
  return 8;
}

function spatialLinkParticleSpeed(){
  return window.matchMedia("(prefers-reduced-motion: reduce)").matches ? 0 : 0.00475;
}

function refreshSpatialLinkStyles(){
  if (!spatialState.graph) return;
  const g = spatialState.graph;
  g.linkColor(spatialLinkColorResolved);
  g.linkWidth(spatialLinkWidth);
  g.linkOpacity(1);
  g.linkDirectionalParticles(spatialLinkParticles);
  g.linkDirectionalParticleWidth(spatialLinkParticleWidth);
  g.linkDirectionalParticleColor(spatialLinkParticleColor);
  g.linkDirectionalParticleResolution(spatialLinkParticleResolution());
  g.linkDirectionalParticleSpeed(spatialLinkParticleSpeed());
}

function configureSpatialForces(){
  if (!spatialState.graph) return;
  const g = spatialState.graph;
  if (typeof g.linkCurvature === "function") g.linkCurvature(spatialLinkCurvature());
  if (spatialState.focusFamily){
    g.d3Force("charge").strength(-145);
    g.d3Force("link").distance(l => {
      if (l.type === "composition") return 58;
      if (l.type === "succession") return 62;
      return 68;
    });
  } else if (spatialState.filterActive){
    g.d3Force("charge").strength(-112);
    g.d3Force("link").distance(l => l.type === "direct" ? 58 : 84);
  } else {
    g.d3Force("charge").strength(-148);
    g.d3Force("link").distance(l => l.type === "direct" ? 68 : 96);
  }
}

function updateSpatialHud(){
  const hud = document.getElementById("spatial-hud");
  if (!hud) return;
  updateSpatialStyleBar();
  if (spatialState.focusFamily){
    const fam = nodeById[spatialState.focusFamily];
    hud.innerHTML = `${fam?.name || "Family"} — click a product for details · <kbd>Esc</kbd> back to Spatial map`;
  } else if (spatialState.filterActive && spatialState.lastStats){
    const s = spatialState.lastStats;
    const styleHint = spatialState.linkPreset === "focus"
      ? "Focus mode — click a family to isolate its integrations"
      : "All connections lit · cyan = direct · gold = adjacent";
    hud.innerHTML = `<strong>${s.families}</strong> families · <strong>${s.links}</strong> connections (${s.direct} direct · ${s.adjacent} adjacent) · ${styleHint}`;
  } else {
    const styleHint = spatialState.linkPreset === "straight"
      ? "Straight spokes · all connections lit"
      : spatialState.linkPreset === "focus"
        ? "Curved mesh · click a family to focus its links"
        : "Curved mesh · all connections lit · cyan = direct · gold = adjacent";
    hud.innerHTML = `${styleHint} · Double-click a family to explore products · <kbd>Esc</kbd> back to Families`;
  }
}

function buildSpatialCompositionData(familyId){
  const v = buildCompositionView(familyId);
  const nodes = v.nodes.map(n => ({
    id: n.id,
    name: n.name,
    category: n.category,
    kind: n._kind,
    color: CATS[n.category].color,
    val: n._kind === "family"
      ? (stack.has(n.id) ? 6 : 5.5)
      : (stack.has(n.id) ? 2.4 : (n._productRef?.status === "current" ? 2 : 1.6)),
    ...(n._kind === "family" ? { fx: 0, fy: 0, fz: 0 } : {})
  }));
  const links = v.links.map(l => ({
    source: sid(l), target: tid(l), type: l.type, label: l.label
  }));
  return { nodes, links };
}
