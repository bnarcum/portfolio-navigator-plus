// Hook into existing addToStack/removeFromStack/legacy via observer (catches
// both inline-HTML calls AND internal closure calls, because we observe the
// chips container that all paths ultimately mutate via renderChips()).
function watchStackForAutoSave(){
  const chips = $("#chips"); if (!chips) return;
  let lastIds = "";
  const obs = new MutationObserver(() => {
    const ids = [...chips.querySelectorAll(".chip")].map(c => c.textContent).join("|");
    if (ids !== lastIds){ lastIds = ids; scheduleAutoSave(); refreshPlansBtn(); }
  });
  obs.observe(chips, { childList: true, subtree: true, characterData: true });
}

/* On page load: hash > autosave > nothing */

  const fromHash = decodeShareableUrl();

    applyState(fromHash);

    showToast("Plan loaded from shared link");

function planSummary(){
  const acct = ($("#acct-name")?.value || "").trim() || "Unnamed Account";
  const date = new Date().toLocaleDateString("en-US", {year:"numeric", month:"long", day:"numeric"});
  const profile = lsGet(STORAGE_KEYS.profile, {});
  const items = [...stack].map(id => {
    const isProd = stackItems.get(id) === "product";
    const it = isProd ? prodById[id] : nodeById[id];
    const famId = isProd ? it?.family : id;
    const tier = TIERS[famId];
    const pm = pillarMeta(familyPillar(famId));
    return {
      id, name: it?.name || id, kind: isProd ? "product" : "family",
      category: CATS[it?.category]?.label, status: it?.status || "current",
      tier: tier?.tier, eosDate: it?.eosDate, eolDate: it?.eolDate,
      successor: it?.successor ? nameOf(it.successor) : null,
      pillar: pm ? { label: pm.label, shortLabel: pm.shortLabel, color: pm.color } : null
    };
  });
  const legacy = [...legacySel].map(id => ALL_LEGACY.find(l => l.id === id)).filter(Boolean);

  const effNodes = new Set([...stack].map(id => getEffectiveNodeId(id)));
  const sc = {};
  NODES.forEach(n => { if (!effNodes.has(n.id)) sc[n.id] = {d:0, a:0}; });
  LINKS.forEach(l => {
    const s = sid(l), t = tid(l);
    if (effNodes.has(s) && !effNodes.has(t) && sc[t]) l.type==="direct" ? sc[t].d++ : sc[t].a++;
    if (effNodes.has(t) && !effNodes.has(s) && sc[s]) l.type==="direct" ? sc[s].d++ : sc[s].a++;
  });
  const recs = Object.entries(sc).filter(([,s]) => s.d > 0)
    .map(([id, s]) => ({id, name: nodeById[id]?.name, category: CATS[nodeById[id]?.category]?.label, score: s.d*3 + s.a, direct: s.d, adjacent: s.a}))
    .sort((a,b) => b.score - a.score).slice(0, 8);

  const stackUCs = new Set([...effNodes].flatMap(id => nodeById[id]?.useCases || []));
  const allUC = [...new Set(NODES.flatMap(n => n.useCases))].sort();

  const bundles = BUNDLES.map(b => {
    const own = b.products.filter(p => effNodes.has(p));
    return {name: b.name, pct: Math.round(own.length/b.products.length*100), owned: own.length, total: b.products.length, missing: b.products.filter(p => !effNodes.has(p)).map(p => nameOf(p))};
  }).sort((a,b) => b.pct - a.pct);

  const dcloudDemos = typeof dcloudPlanRecommendations === "function" ? dcloudPlanRecommendations(8) : [];

  const pillarHit = stackPillarCoverage();
  const pillars = ONE_CISCO.pillars.map(p => ({ ...p, covered: !!pillarHit[p.id] }));
  let stackConnections = [];
  try {
    stackConnections = typeof buildStackConnections === "function" ? buildStackConnections() : [];
  } catch (e) {
    console.warn("planSummary: stack connections unavailable", e);
  }

  return {
    acct, date, profile, items, legacy, recs, stackUCs, allUC, bundles, dcloudDemos,
    connectivityLabel: ONE_CISCO.connectivityLabel, pillars, stackConnections
  };
}

    md += `**Customer profile:** ${[s.profile.vertical, s.profile.size, s.profile.mode].filter(Boolean).join(" · ")}\n\n`;
  }
  md += `## Current Stack (${s.items.length})\n\n| Product | Type | Pillar | Category | Status | Tier | Notes |\n|---|---|---|---|---|---|---|\n`;
  s.items.forEach(it => {
    md += `| ${it.name} | ${it.kind} | ${it.pillar?.shortLabel||"-"} | ${it.category||"-"} | ${it.status.toUpperCase()} | ${it.tier||"-"} | ${it.successor?"Migrate to "+it.successor:""} |\n`;

    md += `\n## Legacy / Outgoing\n\n`;

  }
  if (s.pillars?.length){
    md += `\n## One Cisco Framing\n\n**${s.connectivityLabel}**\n\n`;
    s.pillars.forEach(p => { md += `- **${p.shortLabel}** — ${p.covered ? "Represented in stack" : "Gap — not in current stack"}\n`; });
  }

    md += `\n## Stack Integrations\n\n`;
    s.stackConnections.forEach(c => {

  if (s.dcloudDemos?.length){
    md += `\n## Customer Learning Agenda (dCloud)\n\n`;
    s.dcloudDemos.forEach((d, i) => {
      md += `${i + 1}. **${d.label}** (${d.duration || "lab"}${d.level ? ", " + d.level : ""})\n`;

function exportPptxDcloudSlide(pp, demos){

  sl.background = { color: "0D1117" };
  sl.addText("Customer Learning Agenda — dCloud", { x:0.5, y:0.4, w:12, h:0.5, fontSize:24, bold:true, color:"00BCEB" });
  const hint = typeof DCLOUD_DEFAULTS !== "undefined" ? DCLOUD_DEFAULTS.sectionHint : "Hands-on labs matched to this account plan.";
  sl.addText(hint, { x:0.6, y:0.95, w:12, h:0.35, fontSize:11, color:"8B949E" });
  demos.slice(0, 5).forEach((d, i) => {
    const y = 1.35 + i * 1.05;
    const meta = [d.duration, d.level, d.demoType === "instant" ? "Instant" : ""].filter(Boolean).join(" · ");
    const url = (d.instantUrl || d.catalogUrl || "").trim();
    const titleOpts = { x:0.6, y, w:12, h:0.32, fontSize:14, bold:true, color:"FFFFFF" };
    if (url) titleOpts.hyperlink = { url, tooltip: d.name || d.label };

      sl.addText(short, { x:0.7, y: y + 0.48, w:11.5, h:0.35, fontSize:10, color:"8B949E" });

function renderMigratePlan(){
  const el = $("#tab-migrate"); if (!el) return;
  const items = [];
  // EOL/EOS products in stack
  [...stack].forEach(id => {
    if (stackItems.get(id) !== "product") return;
    const p = prodById[id]; if (!p || p.status === "current") return;
    items.push({
      fromId: id, fromName: p.name, status: p.status,
      eosDate: p.eosDate, eolDate: p.eolDate,
      toId: p.successor, toName: p.successor ? nameOf(p.successor) : null,
      note: p.migNote, source: "EOL/EOS in stack"
    });
  });
  // Legacy / competitor selections
  [...legacySel].forEach(legId => {
    const leg = ALL_LEGACY.find(l => l.id === legId); if (!leg) return;
    leg.replaces.forEach(rid => {
      items.push({
        fromId: legId, fromName: leg.name,
        toId: rid, toName: nameOf(rid),
        note: leg.reason,
        source: leg.competitor ? "Competitive displacement" : "Legacy refresh"
      });
    });
  });
  $("#mig-cnt").textContent = items.length;
  if (!items.length){
    el.innerHTML = `<div class="empty"><h3>Nothing to migrate</h3><p>Add end-of-life products to their list, or select legacy or competitor tech above, to build a step-by-step migration plan.</p></div>`;
    return;
  }
  const phase = (it) => {
    const now = new Date();
    const eos = it.eosDate ? new Date(it.eosDate) : null;
    const eol = it.eolDate ? new Date(it.eolDate) : null;
    if (eol && eol < now) return {label:"⚠ Immediate", color:"#ef4444"};
    if (eol && (eol - now) < 365*86400e3) return {label:"Within 12 months", color:"#FF9000"};
    if (eos && eos < now) return {label:"Within 18-24 months", color:"#FF9000"};
    return {label:"Plan within fiscal year", color:"var(--accent)"};
  };
  el.innerHTML = `<div style="font-size:12px;color:var(--muted);margin-bottom:12px;font-weight:600">${items.length} migration step${items.length!==1?"s":""}</div>` +
    items.map((it,i) => {
      const ph = phase(it);
      return `<div class="mig-card">
        <div class="mig-head">
          <span class="mig-from">${escapeHtml(it.fromName)}</span>
          <span class="mig-arrow">→</span>
          <span class="mig-to">${escapeHtml(it.toName || "TBD")}</span>
          <span style="margin-left:auto;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;background:${ph.color}22;color:${ph.color}">${ph.label}</span>
        </div>
        <div class="mig-meta">${it.source}${it.eosDate?" · EOS "+it.eosDate:""}${it.eolDate?" · Last support "+it.eolDate:""}</div>
        ${it.note?`<div style="font-size:11.5px;color:var(--muted);line-height:1.5;margin-bottom:8px">${escapeHtml(it.note)}</div>`:""}
        <ol class="mig-steps">
          <li class="mig-step">Confirm replacement scope, port/feature parity, and any licensing tier required.</li>
          <li class="mig-step">License successor (${escapeHtml(it.toName||"successor")}) and stage configurations.</li>
          <li class="mig-step">Pilot in a non-production segment; validate management plane (Catalyst Center / Intersight / Control Hub) integration.</li>
          <li class="mig-step">Schedule cutover window; pre-stage cabling and console access.</li>
          <li class="mig-step">Cut over, verify monitoring/alerting, then decommission and reclaim/transfer support contracts.</li>
        </ol>
        ${it.toId ? `<button class="rc-btn" style="margin-top:8px;width:100%" onclick="${prodById[it.toId]?`window.showProductDetail('${it.toId}')`:`window.jumpTo('${it.toId}')`}">View ${escapeHtml(it.toName)} →</button>` : ""}
      </div>`;
    }).join("");
}

function renderCompatWarnings(){
  const el = $("#tab-warn"); if (!el) return;
  const effNodes = new Set([...stack].map(id => getEffectiveNodeId(id)));
  const matches = COMPAT_RULES.filter(r => r.has.every(h => effNodes.has(h)) && r.anyMissing.every(m => !effNodes.has(m)));
  $("#warn-cnt").textContent = matches.length;
  if (!matches.length){
    el.innerHTML = `<div class="empty"><h3>No issues found</h3><p>Based on what they have listed, there are no known compatibility or dependency gaps in our rule set.</p></div>`;
    return;
  }
  el.innerHTML = `<div style="font-size:12px;color:var(--muted);margin-bottom:12px;font-weight:600">${matches.length} issue${matches.length!==1?"s":""} to review</div>` +
    matches.map(r => {
      const adds = r.anyMissing.filter(m => nodeById[m]).map(m => `<button class="rc-btn" onclick="window.addToStack('${m}','node');runAnalysis()" style="margin-right:5px;margin-top:5px">+ Add ${escapeHtml(nodeById[m].name)}</button>`).join("");
      return `<div class="warn-card ${r.level}">
        <div class="warn-t">${r.level==="warn"?"⚠":"ⓘ"} ${escapeHtml(r.title)}</div>
        <div class="warn-b">${escapeHtml(r.detail)}</div>
        <div>${adds}</div>
      </div>`;
    }).join("");
}

// Observe analysis-results panel for content updates → render migration/warnings.
function watchAnalysisResults(){
  const rec = $("#tab-recs"); if (!rec) return;
  let lastSig = "";
  const obs = new MutationObserver(() => {
    const sig = ($("#tab-recs").innerHTML || "").length + ":" + stack.size + ":" + legacySel.size;
    if (sig !== lastSig){ lastSig = sig; renderMigratePlan(); renderCompatWarnings(); }
  });
  obs.observe(rec, { childList: true, subtree: true, characterData: true });
}
// Wrap runAnalysis on window for inline handlers / migrate tabs (keep local function reference).
const _origRunAnalysis = typeof runAnalysis === "function" ? runAnalysis : window.runAnalysis;
window.runAnalysis = function(){
  if (_origRunAnalysis) _origRunAnalysis();
  renderMigratePlan();
  renderCompatWarnings();
  renderPlannerLabs();
};

  wizardState.size = w.size || null;

function wizardFingerprint() {
  return JSON.stringify({
    i: wizardState.industry, s: wizardState.size,
    d: [...wizardState.domains].sort(), l: [...wizardState.legacy].sort()
  });
}

function wizardIsComplete() {
  return wizardState.completed && wizardState.industry && wizardState.size;
}

function markWizardDirty() {
  if (wizardState.completed) wizardState.needsReapply = true;
  wizardInvalidateAiResponses();
  wizardSaveSession();
}

function wizardInvalidateAiResponses() {
  const fp = wizardFingerprint();
  Object.keys(wizardState.aiResponses).forEach(id => {
    if (wizardState.aiResponses[id]?.fp !== fp) delete wizardState.aiResponses[id];
  });
}

function refreshGuidedBtnLabel() {
  const btn = $("#guided-btn");
  const lbl = $("#guided-btn-label");
  if (lbl) lbl.textContent = "Guided Plan";
  if (!btn) return;
  btn.classList.toggle("has-plan", wizardIsComplete());
  btn.title = wizardIsComplete()
    ? "Review your guided plan — edit answers or Ask AI"
    : "Step-by-step guided account plan";
}

function wizardResetAll() {
  wizardState.step = 1;
  wizardState.industry = null;
  wizardState.size = null;
  wizardState.domains.clear();
  wizardState.legacy.clear();
  wizardState.completed = false;
  wizardState.needsReapply = false;
  wizardState.appliedFp = null;
  wizardState.aiSelected.clear();
  wizardState.aiResponses = {};
  wizardState.aiLoading.clear();
  refreshGuidedBtnLabel();
  wizardSaveSession();
}

function aiIsConfigured() {
  const key = lsGet(STORAGE_KEYS.aiKey, "");
  const cfg = lsGet(STORAGE_KEYS.aiCfg, {});
  return !!(key && cfg.url);
}

function wizardUpdateFooterForStep() {
  const onReveal = wizardState.step === 5;
  const editBtn = $("#gw-edit");
  const resetBtn = $("#gw-reset");
  const gBtn = $("#gw-graph");
  const aiBtn = $("#gw-ai");
  const btnBack = $("#gw-back");
  if (editBtn) editBtn.style.display = onReveal ? "inline-block" : "none";
  if (resetBtn) resetBtn.style.display = onReveal ? "inline-block" : "none";
  if (gBtn) gBtn.style.display = onReveal ? "inline-block" : "none";
  if (aiBtn) aiBtn.style.display = onReveal ? "inline-block" : "none";
  if (btnBack) btnBack.style.visibility = wizardState.step > 1 ? "visible" : "hidden";
}

const WIZARD_AI_PROMPTS = [
  { id: "exec", label: "Exec summary", slideTitle: "Executive Summary", q: "Write a concise executive summary of this account plan for my sales leader — current situation, stack strengths, gaps, and recommended next steps." },
  { id: "roadmap", label: "90-day roadmap", slideTitle: "90-Day Roadmap", q: "Based on this guided plan, propose a prioritized 90-day roadmap with quick wins, migration items, and longer-term augmentations." },
  { id: "email", label: "Customer email", slideTitle: "Customer Follow-Up Email", q: "Draft a professional follow-up email to the customer summarizing what we learned, what's in place today, and 3 recommended next steps." },
  { id: "gap", label: "Explain biggest gap", slideTitle: "Biggest Capability Gap", q: "Explain the biggest bundle or capability gap in this plan — why it matters for this industry and what Cisco products would close it." }
];

function wizardPromptById(id) {
  return WIZARD_AI_PROMPTS.find(p => p.id === id);
}

function wizardAskAi(prompt) {
  if (typeof openAiWithPrompt === "function") openAiWithPrompt(prompt, { closeWizard: true, send: true });
}

function wizardAiSlideHtml(id) {
  const p = wizardPromptById(id);
  if (!p) return "";
  const resp = wizardState.aiResponses[id];
  const loading = wizardState.aiLoading.has(id);
  const fp = wizardFingerprint();
  const stale = resp && resp.fp !== fp;
  const body = loading
    ? `<div class="gw-ai-slide-body loading">Generating…</div>`
    : resp?.err
      ? `<div class="gw-ai-slide-body err">${escapeHtml(resp.err)}</div>`
    : resp && !stale
      ? `<div class="gw-ai-slide-body">${escapeHtml(resp.text)}</div>`
      : resp && stale
        ? `<div class="gw-ai-stale">Plan changed — regenerate for an updated answer.</div><div class="gw-ai-slide-body" style="opacity:.55">${escapeHtml(resp.text)}</div>`
        : `<div class="gw-ai-slide-body loading" style="opacity:.65">Selected — click Generate selected above.</div>`;
  const copyBtn = resp?.text && !stale && !loading
    ? `<button type="button" class="gw-ai-copy" data-id="${id}">Copy</button>` : "";
  const regenBtn = !loading
    ? `<button type="button" class="gw-ai-regen" data-id="${id}">${resp && !stale ? "Regenerate" : "Generate"}</button>` : "";
  return `<div class="gw-ai-slide${stale ? " stale" : ""}" data-id="${id}">
    <div class="gw-ai-slide-head">
      <h4>${escapeHtml(p.label)}</h4>
      <div class="gw-ai-slide-actions">${copyBtn}${regenBtn}</div>
    </div>
    ${body}
  </div>`;
}

function wizardRenderAiSlidesHtml() {
  if (!wizardState.aiSelected.size) return "";
  return [...wizardState.aiSelected].map(id => wizardAiSlideHtml(id)).join("");
}

function wizardUpdateAiSlidesOnly() {
  const el = $("#gw-ai-slides");
  if (!el) return;
  el.innerHTML = wizardRenderAiSlidesHtml();
  wireWizardAiSlideHandlers();
  const genBtn = $("#gw-ai-gen");
  if (genBtn) {
    genBtn.disabled = !wizardState.aiSelected.size || wizardState.aiLoading.size > 0;
    genBtn.textContent = wizardState.aiLoading.size
      ? "Generating…"
      : wizardState.aiSelected.size
        ? `Generate ${wizardState.aiSelected.size} selected`
        : "Generate selected";
  }
}

async function wizardGenerateAiTopics(ids) {
  if (!ids.length) return;
  if (!aiIsConfigured()) {
    showToast("Configure AI first — your plan stays here");
    $("#gw-ai-cfg")?.click();
    return;
  }
  ids.forEach(id => wizardState.aiLoading.add(id));
  wizardUpdateAiSlidesOnly();
  const fp = wizardFingerprint();
  await Promise.all(ids.map(async id => {
    const p = wizardPromptById(id);
    if (!p) return;
    const result = await fetchAiResponse(p.q);
    wizardState.aiLoading.delete(id);
    if (result.text) {
      wizardState.aiResponses[id] = { text: result.text, fp, at: Date.now() };
    } else if (result.error === "no_config") {
      wizardState.aiResponses[id] = { err: "Configure AI to generate this deliverable.", fp, at: Date.now() };
    } else {
      wizardState.aiResponses[id] = { err: result.message || "Generation failed — try again.", fp, at: Date.now() };
    }
  }));
  wizardSaveSession();
  wizardUpdateAiSlidesOnly();
}

async function wizardGenerateSelectedAi() {
  const ids = [...wizardState.aiSelected].filter(id => {
    const resp = wizardState.aiResponses[id];
    return !resp || resp.fp !== wizardFingerprint() || resp.err;
  });
  if (!ids.length && wizardState.aiSelected.size) {
    showToast("All selected deliverables are up to date");
    return;
  }
  await wizardGenerateAiTopics(ids.length ? ids : [...wizardState.aiSelected]);
}

function wireWizardAiSlideHandlers() {
  $("#gw-body")?.querySelectorAll(".gw-ai-chip").forEach(chip => {
    chip.onclick = () => {
      const id = chip.dataset.id;
      if (wizardState.aiSelected.has(id)) wizardState.aiSelected.delete(id);
      else wizardState.aiSelected.add(id);
      chip.classList.toggle("sel", wizardState.aiSelected.has(id));
      const slides = $("#gw-ai-slides");
      if (slides) slides.innerHTML = wizardRenderAiSlidesHtml();
      wireWizardAiSlideHandlers();
      const genBtn = $("#gw-ai-gen");
      if (genBtn) {
        genBtn.disabled = !wizardState.aiSelected.size || wizardState.aiLoading.size > 0;
        genBtn.textContent = wizardState.aiSelected.size
          ? `Generate ${wizardState.aiSelected.size} selected` : "Generate selected";
      }
      wizardSaveSession();
    };
  });
  $("#gw-body")?.querySelectorAll(".gw-ai-regen").forEach(btn => {
    btn.onclick = () => wizardGenerateAiTopics([btn.dataset.id]);
  });
  $("#gw-body")?.querySelectorAll(".gw-ai-copy").forEach(btn => {
    btn.onclick = () => {
      const t = wizardState.aiResponses[btn.dataset.id]?.text;
      if (t) navigator.clipboard.writeText(t).then(() => showToast("Copied")).catch(() => showToast("Copy failed"));
    };
  });
}

function wizardDomainsForIndustry(industryId) {
  return WIZARD_DOMAINS.filter(d => !industryId || !(d.hideFor || []).includes(industryId));
}

function wizardBuildStackIds() {
  const ids = new Set();
  if (wizardState.industry) {
    const t = INDUSTRY_TEMPLATES.find(x => x.id === wizardState.industry);
    if (t) t.products.forEach(p => { if (nodeById[p]) ids.add(p); });
  }
  wizardState.domains.forEach(domId => {
    const dom = WIZARD_DOMAINS.find(d => d.id === domId);
    if (!dom) return;
    dom.families.forEach(f => { if (nodeById[f]) ids.add(f); });
  });
  if (!ids.size) {
    INDUSTRY_TEMPLATES.find(x => x.id === "smb")?.products.forEach(p => {
      if (nodeById[p]) ids.add(p);
    });
  }
  return ids;
}

function wizardApplyPlan() {
  stack.clear(); stackItems.clear(); legacySel.clear();
  wizardBuildStackIds().forEach(id => { stack.add(id); stackItems.set(id, "node"); });
  wizardState.legacy.forEach(id => legacySel.add(id));
  const vert = WIZARD_INDUSTRY_VERTICAL[wizardState.industry] || "";
  const size = wizardState.size || "";
  if ($("#prof-vert")) $("#prof-vert").value = vert;
  if ($("#prof-size")) $("#prof-size").value = size;
  lsSet(STORAGE_KEYS.profile, { vertical: vert, size, mode: "" });
  if (vert) { activeInd = vert; if ($("#inds")) $("#inds").value = vert; applyFilters(); }
  renderChips(); updateAB();
  $$(".lc").forEach(c => c.classList.toggle("sel", legacySel.has(c.dataset.id)));
  highlightStack();
  analyzed = true;
  plannerSetupExpanded = false;
  scheduleAutoSave();
  window.runAnalysis();
  if (typeof updatePlannerUI === "function") updatePlannerUI();
  wizardState.appliedFp = wizardFingerprint();
  wizardState.completed = true;
  wizardState.needsReapply = false;
  refreshGuidedBtnLabel();
  wizardSaveSession();
}

function wizardNarrative() {
  const t = INDUSTRY_TEMPLATES.find(x => x.id === wizardState.industry);
  const indName = t ? t.name : "General business";
  const sizeLbl = WIZARD_SIZES.find(s => s.id === wizardState.size)?.label || "unspecified size";
  const n = stack.size;
  const bundles = BUNDLES.map(b => {
    const eff = new Set([...stack].map(id => getEffectiveNodeId(id)));
    const owned = b.products.filter(p => eff.has(p)).length;
    return { name: b.name, pct: Math.round(owned / b.products.length * 100) };
  }).sort((a, b) => b.pct - a.pct);
  const best = bundles[0];
  const weak = bundles[bundles.length - 1];
  let line = `${sizeLbl} **${indName.split(" / ")[0]}** account with ${n} ${n !== 1 ? "capabilities" : "capability"} mapped.`;
  if (best) line += ` Strongest bundle: ${best.name} (${best.pct}%).`;
  if (weak && weak.pct < 60) line += ` Biggest gap: ${weak.name} (${weak.pct}%).`;
  if (wizardState.legacy.size) line += ` ${wizardState.legacy.size} legacy refresh trigger${wizardState.legacy.size !== 1 ? "s" : ""} selected.`;
  return line.replace(/\*\*/g, "");
}

function wizardTopRecs(limit) {
  const cards = $$("#tab-recs .rec-card");
  const names = [];
  cards.forEach(c => {
    const nm = c.querySelector(".rc-name");
    if (nm) names.push(nm.textContent.trim());
  });
  return names.slice(0, limit);
}

function wizardRenderStep() {
  const body = $("#gw-body");
  const footLbl = $("#gw-step-lbl");
  const btnBack = $("#gw-back");
  const btnNext = $("#gw-next");
  const dots = $$("#gw-progress .gw-dot");
  dots.forEach((d, i) => {
    d.classList.toggle("done", i + 1 < wizardState.step);
    d.classList.toggle("cur", i + 1 === wizardState.step);
  });
  footLbl.textContent = wizardState.step === 5 ? "Your plan" : `Step ${wizardState.step} of 5`;
  btnBack.style.visibility = wizardState.step > 1 ? "visible" : "hidden";
  btnNext.textContent = wizardState.step === 4 ? "Build my plan →" : wizardState.step === 5 ? "Open full analysis" : "Continue";

  wizardUpdateFooterForStep();

  if (wizardState.step === 1) {

      <div class="gw-cards gw-cards--hero" id="gw-ind-cards">

          const th = wizardIndustryTheme(t.id);

          <button type="button" class="gw-card gw-card--hero${wizardState.industry === t.id ? " sel" : ""}" data-id="${t.id}"

            <div class="gw-lbl">${escapeHtml(th.short)}</div>
          </button>`;
        }).join("")}
      </div>
      <div class="gw-preview" id="gw-ind-preview">${wizardState.industry

      card.addEventListener("click", () => {
        wizardState.industry = card.dataset.id;

        body.querySelectorAll(".gw-card").forEach(c => c.classList.toggle("sel", c.dataset.id === wizardState.industry));
        const t = INDUSTRY_TEMPLATES.find(x => x.id === wizardState.industry);

      });

  } else if (wizardState.step === 2) {

      <div class="gw-cards gw-cards--size" id="gw-size-cards">
        ${WIZARD_SIZES.map(s => {
          const th = WIZARD_SIZE_THEME[s.id] || { from: "#64748B", to: "#475569" };
          return `
          <button type="button" class="gw-card gw-card--size${wizardState.size === s.id ? " sel" : ""}" data-id="${escapeHtml(s.id)}"
            style="--gw-from:${th.from};--gw-to:${th.to}">
            <div class="gw-lbl">${escapeHtml(s.label)}</div>
            <div class="gw-desc">${escapeHtml(s.desc)}</div>
          </button>`;
        }).join("")}
      </div>`;
    body.querySelectorAll(".gw-card").forEach(card => {
      card.addEventListener("click", () => {
        wizardState.size = card.dataset.id;
        markWizardDirty();
        body.querySelectorAll(".gw-card").forEach(c => c.classList.toggle("sel", c.dataset.id === wizardState.size));
        btnNext.disabled = false;
      });
    });
    btnNext.disabled = !wizardState.size;
  } else if (wizardState.step === 3) {
    const domains = wizardDomainsForIndustry(wizardState.industry);
    const previewCount = wizardBuildStackIds().size;
    body.innerHTML = `
      <div class="gw-tiles" id="gw-dom-tiles">
        ${domains.map(d => `
          <button type="button" class="gw-tile${wizardState.domains.has(d.id) ? " sel" : ""}" data-id="${d.id}">
            <div class="gw-tl">${escapeHtml(d.label)}</div>
            <div class="gw-td">${escapeHtml(d.desc)}</div>
          </button>`).join("")}
      </div>
      <div class="gw-preview"><strong>${previewCount}</strong> products in their list so far${wizardState.domains.size ? ` (${wizardState.domains.size} area${wizardState.domains.size !== 1 ? "s" : ""} selected)` : " — industry baseline only"}.</div>`;
    body.querySelectorAll(".gw-tile").forEach(tile => {
      tile.addEventListener("click", () => {
        const id = tile.dataset.id;
        if (wizardState.domains.has(id)) wizardState.domains.delete(id);
        else wizardState.domains.add(id);
        markWizardDirty();
        tile.classList.toggle("sel", wizardState.domains.has(id));
        const cnt = wizardBuildStackIds().size;
        const prev = body.querySelector(".gw-preview");
        if (prev) prev.innerHTML = `<strong>${cnt}</strong> products in their list so far (${wizardState.domains.size} area${wizardState.domains.size !== 1 ? "s" : ""} selected).`;
      });
    });
    btnNext.disabled = false;
  } else if (wizardState.step === 4) {
    body.innerHTML = `
      <div class="gw-tiles" id="gw-leg-tiles">
        ${WIZARD_LEGACY_TILES.map(l => `
          <button type="button" class="gw-tile${wizardState.legacy.has(l.id) ? " sel" : ""}" data-id="${l.id}">
            <div class="gw-tl">${escapeHtml(l.label)}</div>
            <div class="gw-td">${escapeHtml(l.sub)}</div>
          </button>`).join("")}
      </div>
      <div class="gw-preview">${wizardState.legacy.size
        ? `<strong>${wizardState.legacy.size}</strong> migration stor${wizardState.legacy.size !== 1 ? "ies" : "y"} selected.`
        : "No legacy selected — skip is fine."}</div>`;
    body.querySelectorAll(".gw-tile").forEach(tile => {
      tile.addEventListener("click", () => {
        const id = tile.dataset.id;
        if (wizardState.legacy.has(id)) wizardState.legacy.delete(id);
        else wizardState.legacy.add(id);
        markWizardDirty();
        tile.classList.toggle("sel", wizardState.legacy.has(id));
        const prev = body.querySelector(".gw-preview");
        if (prev) prev.innerHTML = wizardState.legacy.size
          ? `<strong>${wizardState.legacy.size}</strong> migration stor${wizardState.legacy.size !== 1 ? "ies" : "y"} selected.`
          : "No legacy selected — skip is fine.";
      });
    });
    btnNext.disabled = false;
  } else if (wizardState.step === 5) {
    const reapply = wizardState.needsReapply || !wizardState.completed;
    btnNext.disabled = true;
    footLbl.textContent = "Your plan";
    if (reapply) {
      body.innerHTML = `<div id="gw-reveal"><div class="gw-spin">Building your account map…</div></div>`;
      wizardUpdateFooterForStep();
      setTimeout(() => wizardShowReveal({ reapply: true }), 600);
    } else {
      wizardShowReveal({ reapply: false });
    }
  }
}

function wizardShowReveal(opts = {}) {
  const reapply = opts.reapply !== false;
  if (reapply) wizardApplyPlan();
  else if (!analyzed && stack.size) window.runAnalysis();
  const t = INDUSTRY_TEMPLATES.find(x => x.id === wizardState.industry);
  const eff = new Set([...stack].map(id => getEffectiveNodeId(id)));
  const bundles = BUNDLES.map(b => {
    const owned = b.products.filter(p => eff.has(p)).length;
    return { name: b.name, pct: Math.round(owned / b.products.length * 100) };
  }).sort((a, b) => b.pct - a.pct);
  const best = bundles[0] || { name: "—", pct: 0 };
  const weak = bundles[bundles.length - 1] || best;
  const recs = wizardTopRecs(3);
  const repCnt = $("#rep-cnt")?.textContent || "0";
  const acct = $("#acct-name")?.value.trim() || "Your account";
  const aiHint = aiIsConfigured()
    ? ""
    : `<div class="gw-ai-hint">First time using Ask AI? <button type="button" id="gw-ai-cfg">Configure AI</button> once (OpenRouter recommended). Your plan stays here when you return.</div>`;

  $("#gw-body").innerHTML = `
    <div id="gw-reveal">
      <div class="gw-summary">
        <div class="gw-sn">${escapeHtml(acct)}</div>
        <div class="gw-snarr">${escapeHtml(wizardNarrative())}</div>
        <div class="gw-stats">
          <div class="gw-stat"><div class="gw-sv">${stack.size}</div><div class="gw-sl">Stack items</div></div>
          <div class="gw-stat"><div class="gw-sv">${best.pct}%</div><div class="gw-sl">${escapeHtml(best.name.split(" ")[0])} bundle</div></div>
          <div class="gw-stat"><div class="gw-sv">${repCnt}</div><div class="gw-sl">Replacements</div></div>
        </div>
        ${recs.length ? `<div class="gw-toprecs"><strong style="color:var(--text);font-size:11px">Top suggestions</strong><ul>${recs.map(r => `<li>${escapeHtml(r)}</li>`).join("")}</ul></div>` : ""}
        ${dcloudGuidedRecommendationsHtml()}
        ${weak.pct < 50 ? `<div style="margin-top:10px;font-size:11px;color:var(--orange)">Gap alert: ${escapeHtml(weak.name)} at ${weak.pct}% coverage</div>` : ""}
        <div class="gw-ai-section">
          <div class="gw-ai-lbl">Ask AI — select deliverables to generate</div>
          <div class="gw-ai-chips" id="gw-ai-chips">
            ${WIZARD_AI_PROMPTS.map(p => `<button type="button" class="gw-ai-chip${wizardState.aiSelected.has(p.id) ? " sel" : ""}" data-id="${p.id}">${escapeHtml(p.label)}</button>`).join("")}
          </div>
          <div class="gw-ai-actions">
            <button type="button" class="gw-btn ai-accent" id="gw-ai-gen"${wizardState.aiSelected.size ? "" : " disabled"}>${wizardState.aiSelected.size ? `Generate ${wizardState.aiSelected.size} selected` : "Generate selected"}</button>
          </div>
          <div id="gw-ai-slides">${wizardRenderAiSlidesHtml()}</div>
          ${aiHint}
        </div>
      </div>
    </div>`;
  wizardInvalidateAiResponses();
  $("#gw-ai-gen").onclick = () => wizardGenerateSelectedAi();
  wireWizardAiSlideHandlers();
  $("#gw-ai-cfg")?.addEventListener("click", () => {
    closeGuidedWizard(false);
    $("#ai-panel")?.classList.add("show");
    $("#ai-cfg")?.click();
  });
  $("#gw-next").disabled = false;
  $("#gw-next").textContent = "Open full analysis";
  wizardUpdateHeader();
  wizardUpdateFooterForStep();
  highlightStack();
}

function openGuidedWizard() {
  wizardOpen = true;
  if (wizardIsComplete()) {
    wizardState.step = 5;
  } else if (!wizardState.industry) {
    wizardState.step = 1;
  }
  // else: resume in-progress step (unchanged)
  $("#gw-overlay").classList.add("show");
  document.body.style.overflow = "hidden";
  if (wizardState.step === 5 && wizardIsComplete() && !wizardState.needsReapply) {
    wizardUpdateFooterForStep();
    wizardShowReveal({ reapply: false });
  } else {
    wizardUpdateFooterForStep();
    wizardRenderStep();
  }
}

function closeGuidedWizard(openPlannerAfter) {
  wizardOpen = false;
  $("#gw-overlay").classList.remove("show");
  document.body.style.overflow = "";
  if (openPlannerAfter) {
    if (!plannerOpen) openPlanner();
    $("#analysis-results")?.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }
}

function wizardNext() {
  if (wizardState.step === 1 && !wizardState.industry) return;
  if (wizardState.step === 2 && !wizardState.size) return;
  if (wizardState.step === 5) { closeGuidedWizard(true); return; }
  if (wizardState.step === 4) { wizardState.step = 5; wizardRenderStep(); return; }
  wizardState.step++;
  wizardRenderStep();
}

function wizardBack() {
  if (wizardState.step <= 1) return;
  wizardState.step--;
  wizardRenderStep();
}

function buildGuidedWizard() {
  const ov = document.createElement("div");
  ov.id = "gw-overlay";
  ov.setAttribute("role", "dialog");
  ov.setAttribute("aria-modal", "true");
  ov.setAttribute("aria-labelledby", "gw-title");
  ov.innerHTML = `
    <div id="gw-panel">
      <button type="button" class="gw-close" id="gw-close" aria-label="Close">×</button>
      <div id="gw-head">

/* ════════════════════════════════════════════════════════════════════════
   [17] BREADCRUMBS + back/forward in detail panel
   ════════════════════════════════════════════════════════════════════════*/
const bcHistory = []; let bcIndex = -1;

function productFamilyEntry(productId){
  const p = prodById[productId];
  if (!p?.family || !nodeById[p.family]) return null;
  return { type: "node", id: p.family };
}

/** Keep the product's portfolio family as the breadcrumb parent — not stale nav history. */
function ensureProductBreadcrumbContext(productId){
  const familyEntry = productFamilyEntry(productId);
  if (!familyEntry) return;

  if (bcIndex < bcHistory.length - 1) bcHistory.splice(bcIndex + 1);

  const last = bcHistory[bcIndex];
  const prev = bcIndex > 0 ? bcHistory[bcIndex - 1] : null;
  const parentOk = prev && prev.type === "node" && prev.id === familyEntry.id;

  if (last?.type === "product" && last.id === productId){
    if (!parentOk){
      if (prev?.type === "node") bcHistory[bcIndex - 1] = { ...familyEntry };
      else {
        bcHistory.splice(bcIndex, 0, { ...familyEntry });
        bcIndex++;
      }
    }
    return;
  }

  if (!(last?.type === "node" && last.id === familyEntry.id)){
    bcHistory.push({ ...familyEntry });
    bcIndex = bcHistory.length - 1;
  }
}

function goToFamilyBreadcrumb(familyId){
  const sp = pushBreadcrumb; pushBreadcrumb = () => {};
  for (let i = bcIndex; i >= 0; i--){
    if (bcHistory[i].type === "node" && bcHistory[i].id === familyId){
      bcIndex = i;
      break;
    }
  }
  if (bcIndex < bcHistory.length - 1) bcHistory.splice(bcIndex + 1);
  openFamilyProductDrawer(familyId);
  pushBreadcrumb = sp;
}

function pushBreadcrumb(entry){
  // Trim forward history if user navigates from middle
  if (bcIndex < bcHistory.length - 1) bcHistory.splice(bcIndex + 1);
  // De-dup consecutive
  const last = bcHistory[bcHistory.length - 1];
  if (last && last.id === entry.id && last.type === entry.type) return;
  bcHistory.push(entry);
  if (bcHistory.length > 30) bcHistory.shift();
  bcIndex = bcHistory.length - 1;
}
function navHistory(delta){
  const i = bcIndex + delta;
  if (i < 0 || i >= bcHistory.length) return;
  bcIndex = i;
  const e = bcHistory[i];
  // Temporarily avoid pushing
  const savedPush = pushBreadcrumb; pushBreadcrumb = () => {};
  if (e.type === "product") window.showProductDetail(e.id);
  else if (viewMode === "composition" && nodeById[e.id]) openFamilyProductDrawer(e.id);
  else window.jumpTo(e.id);
  pushBreadcrumb = savedPush;
}
function renderBreadcrumbs(){
  const pb = $("#pbody"); if (!pb) return;
  pb.querySelector(".p-bc")?.remove();
  const current = bcHistory[bcIndex];
  if (!current) return;

  let crumbs = "";
  if (current.type === "product"){
    const fam = productFamilyEntry(current.id);
    if (fam){
      crumbs += `<button class="p-bc-i" data-jump="family" data-id="${escapeHtml(fam.id)}">${escapeHtml(nameOf(fam.id))}</button><span class="p-bc-sep">›</span>`;
    }
    crumbs += `<span style="color:var(--text);font-weight:600">${escapeHtml(nameOf(current.id))}</span>`;
  } else {
    const start = Math.max(0, bcIndex - 3);
    crumbs = bcHistory.slice(start, bcIndex + 1).map((e, idx) => {
      const realIdx = start + idx;
      const name = nameOf(e.id);
      if (realIdx === bcIndex)
        return `<span style="color:var(--text);font-weight:600">${escapeHtml(name)}</span>`;
      return `<button class="p-bc-i" data-i="${realIdx}">${escapeHtml(name)}</button><span class="p-bc-sep">›</span>`;
    }).join("");
  }

  const navHtml = `<div class="p-bc-nav">
    <button id="bc-back" title="Back" ${bcIndex<=0?"disabled":""}>‹</button>
    <button id="bc-fwd" title="Forward" ${bcIndex>=bcHistory.length-1?"disabled":""}>›</button>
  </div>`;
  const bcDiv = document.createElement("div");
  bcDiv.className = "p-bc";
  bcDiv.innerHTML = crumbs + navHtml;
  pb.insertBefore(bcDiv, pb.firstChild);
  bcDiv.querySelectorAll(".p-bc-i[data-jump='family']").forEach(b => {
    b.addEventListener("click", () => goToFamilyBreadcrumb(b.dataset.id));
  });
  bcDiv.querySelectorAll(".p-bc-i[data-i]").forEach(b => b.addEventListener("click", () => {
    const i = parseInt(b.dataset.i, 10);
    bcIndex = i;
    const e = bcHistory[i];
    const sp = pushBreadcrumb; pushBreadcrumb = () => {};
    if (e.type === "product") window.showProductDetail(e.id);
    else if (viewMode === "composition" && nodeById[e.id]) openFamilyProductDrawer(e.id);
    else window.jumpTo(e.id);
    pushBreadcrumb = sp;
  }));
  bcDiv.querySelector("#bc-back")?.addEventListener("click", () => navHistory(-1));
  bcDiv.querySelector("#bc-fwd")?.addEventListener("click", () => navHistory(+1));
}

let DCLOUD_ENTRIES = [];
let DCLOUD_PATHS = [];

  sectionHint: "Understand the solution, explore in the portfolio, then launch a hands-on lab.",

};
const DCLOUD_LABS_DONE_KEY = "cpn-dcloud-labs-done";

  obs: ["Digital Transformation"]
};

function dcloudLabsDoneSet(){
  return new Set(lsGet(DCLOUD_LABS_DONE_KEY, []));
}
function dcloudMarkLabDone(id, done){
  const s = dcloudLabsDoneSet();
  if (done) s.add(id); else s.delete(id);
  lsSet(DCLOUD_LABS_DONE_KEY, [...s]);
}
function dcloudNormalizeEntry(e){
  if (!e) return e;
  e.demoType = e.demoType || (e.instantUrl ? "instant" : "scheduled");
  e.level = e.level || (e.primary ? "intro" : "intermediate");
  e.duration = e.duration || (e.demoType === "instant" ? "~30 min" : "~45 min");
  if (!e.learningObjectives?.length && e.hint){
    const h = e.hint.replace(/\u2026/g, "").trim();
    e.learningObjectives = [h.length > 140 ? h.slice(0, 137) + "…" : h];
  }
  if (!e.relatedFamilies?.length) e.relatedFamilies = e.families ? [...e.families] : [];
  return e;
}

async function loadDcloudLinks(){
  const apply = (data) => {
    if (Array.isArray(data)) {
      DCLOUD_ENTRIES = data.map(dcloudNormalizeEntry);
    } else {
      DCLOUD_ENTRIES = (data.entries || []).map(dcloudNormalizeEntry);
      DCLOUD_PATHS = data.paths || [];
      Object.assign(DCLOUD_DEFAULTS, data.defaults || {});
    }
  };
  try {
    const res = await fetch("dcloud-links.json", { cache: "no-cache" });
    if (res.ok) {
      apply(await res.json());
      return;
    }
  } catch (_) { /* file:// or offline */ }
  if (typeof window.__DCLOUD_BOOT !== "undefined" && window.__DCLOUD_BOOT) {
    apply(window.__DCLOUD_BOOT);
    try { delete window.__DCLOUD_BOOT; } catch (_) {}
  }
}

function dcloudEntryFamiliesLabel(e){
  if (!e?.families?.length) return "";
  return e.families.slice(0, 3).map(f => nodeById[f]?.name || f).join(" · ");
}

function dcloudEntrySearchHaystack(e){
  return [
    e.name, e.linkLabel, e.hint, e.id,
    ...(e.learningObjectives || []),
    ...(e.useCases || []),
    ...(e.families || []).map(f => nodeById[f]?.name || f),
    ...(e.products || []).map(p => prodById[p]?.name || p),
    e.demoType === "instant" ? "instant demo" : "scheduled lab"
  ].filter(Boolean).join(" ").toLowerCase();
}

function dcloudSearchEntries(q, limit = 8){
  if (!DCLOUD_ENTRIES.length) return [];
  const qq = q.trim().toLowerCase();
  if (!qq) return [];
  let pool = DCLOUD_ENTRIES;
  if (qq === "dcloud" || qq === "d cloud" || qq === "dc"){
    const recIds = new Set(dcloudPlanRecommendations(Math.min(limit, 12)).map(r => r.id));
    const rec = DCLOUD_ENTRIES.filter(e => recIds.has(e.id));
    const rest = DCLOUD_ENTRIES.filter(e => !recIds.has(e.id));
    pool = [...rec, ...rest];
  } else {
    pool = DCLOUD_ENTRIES.filter(e => dcloudEntrySearchHaystack(e).includes(qq));
    pool.sort((a, b) => {
      if (b.primary !== a.primary) return (b.primary ? 1 : 0) - (a.primary ? 1 : 0);
      const al = (a.linkLabel || a.name).toLowerCase();
      const bl = (b.linkLabel || b.name).toLowerCase();
      const as = al.startsWith(qq) ? 1 : 0;
      const bs = bl.startsWith(qq) ? 1 : 0;
      if (bs !== as) return bs - as;
      return al.localeCompare(bl);
    });
  }
  return pool.slice(0, limit);
}

let dcloudBrowserQuery = "";

    ? DCLOUD_ENTRIES.filter(e => dcloudEntrySearchHaystack(e).includes(q))
    : DCLOUD_ENTRIES.slice();
  entries.sort((a, b) => {
    const ar = recIds.has(a.id) ? 1 : 0;
    const br = recIds.has(b.id) ? 1 : 0;
    if (br !== ar) return br - ar;
    if (b.primary !== a.primary) return (b.primary ? 1 : 0) - (a.primary ? 1 : 0);
    return (a.linkLabel || a.name).localeCompare(b.linkLabel || b.name);
  });
  if (countEl) countEl.textContent = `${entries.length} lab${entries.length === 1 ? "" : "s"}`;

    const hint = (e.learningObjectives?.[0] || e.hint || "").slice(0, 180);

      <h4>${escapeHtml(e.linkLabel || e.name)}</h4>
      <div class="dbc-meta">${escapeHtml(meta)}</div>
      ${hint ? `<div class="dbc-hint">${escapeHtml(hint)}${hint.length >= 180 ? "…" : ""}</div>` : ""}
      <div class="dcloud-browser-actions">
        <a class="dbc-launch" href="${escapeHtml(primary)}" target="_blank" rel="noopener" data-dcloud-id="${escapeHtml(e.id)}">Launch lab ↗</a>
        ${famId ? `<button type="button" class="dbc-family" data-family="${escapeHtml(famId)}">View ${escapeHtml(nodeById[famId]?.name || famId)}</button>` : ""}
      </div>
    </article>`;
  });
  list.innerHTML = html;
  list.querySelectorAll("[data-dcloud-id]").forEach(a => {
    a.addEventListener("click", () => dcloudMarkLabDone(a.dataset.dcloudId, true));
  });
  list.querySelectorAll("[data-family]").forEach(btn => {

function dcloudEntryById(id){
  return DCLOUD_ENTRIES.find(e => e.id === id);
}

function dcloudPrimaryUrl(e){
  return e?.instantUrl || e?.catalogUrl || "";
}

function dcloudConnectedFamilyIds(familyIds = []){
  const connected = new Set(familyIds.filter(id => nodeById[id]));
  LINKS.forEach(l => {
    const s = sid(l), t = tid(l);
    if (connected.has(s) && nodeById[t]) connected.add(t);
    if (connected.has(t) && nodeById[s]) connected.add(s);
  });
  return [...connected];
}

function learningScoreEntry(e, ctx){
  const { familyIds = [], productIds = [], connected = [], connectedBonus = true } = ctx;
  const familyHit = familyIds.some(f => e.families?.includes(f));
  const productHit = productIds.some(p => e.products?.includes(p));
  const nFam = e.families?.length || 0;
  const nProd = e.products?.length || 0;
  let score = 0;

  if (productHit){
    score += 30;
    if (nProd === 1) score += 22;
    else if (nProd === 2) score += 10;
    else score -= 3 * (nProd - 2);
  }

  if (familyHit){
    if (productIds.length){
      score += 4;
    } else {
      score += 12;
      if (nFam === 1) score += 18;
      else if (nFam === 2) score += 10;
      else score -= 4 * (nFam - 2);
    }
  }

  if (productIds.length){
    for (const pid of productIds){
      const p = prodById[pid];
      if (!p) continue;
      const hay = `${e.linkLabel || ""} ${e.name || ""} ${e.hint || ""}`.toLowerCase();
      const name = p.name.toLowerCase();
      if (hay.includes(name)) score += 16;
      else {
        const tokens = name.split(/[\s·/]+/).filter(t => t.length > 3);
        if (tokens.filter(t => hay.includes(t)).length >= Math.min(2, tokens.length)) score += 10;
      }
    }
  }

  if (e.primary) score += 3;
  if (e.pathStep === 1) score += 5;

  if (connectedBonus && !productIds.length && familyHit){
    const rel = e.relatedFamilies?.length ? e.relatedFamilies : (e.families || []);
    const multiHit = connected.filter(f => rel.includes(f)).length;
    if (multiHit >= 2 && nFam <= 3) score += 4;
    else if (multiHit === 1 && !familyHit) score += 1;
  }

  if (!productIds.length && nProd > 0) score -= 15;

  return score;
}

function dcloudScoreEntry(e, ctx){
  return learningScoreEntry(e, ctx);
}

function dcloudRankEntries({ familyIds = [], productIds = [], useCases = [], limit = 5, requireProductOrFamily = false, connectedBonus = true } = {}){
  if (!DCLOUD_ENTRIES.length) return [];
  const connected = connectedBonus ? dcloudConnectedFamilyIds(familyIds) : familyIds;
  const ctx = { familyIds, productIds, connected, connectedBonus };
  const scored = DCLOUD_ENTRIES.map(e => {
    const productSpecific = (e.products?.length ?? 0) > 0;
    const familyHit = familyIds.some(f => e.families?.includes(f));
    const productHit = productIds.some(p => e.products?.includes(p));
    const useCaseHit = useCases.some(u => e.useCases?.includes(u));
    if (productSpecific){
      if (!productHit && !familyHit) return null;
    } else {
      const relevant = requireProductOrFamily
        ? (familyHit || productHit)
        : (familyHit || productHit || useCaseHit);
      if (!relevant) return null;
    }
    const score = dcloudScoreEntry(e, ctx);
    return { entry: e, score };
  }).filter(Boolean);
  scored.sort((a, b) => {
    if (b.score !== a.score) return b.score - a.score;
    if (b.entry.primary !== a.entry.primary) return (b.entry.primary ? 1 : 0) - (a.entry.primary ? 1 : 0);
    const bSpec = (b.entry.products?.length || 99) + (b.entry.families?.length || 99);
    const aSpec = (a.entry.products?.length || 99) + (a.entry.families?.length || 99);
    if (aSpec !== bSpec) return aSpec - bSpec;
    return (a.entry.linkLabel || a.entry.name).localeCompare(b.entry.linkLabel || b.entry.name);
  });
  const seen = new Set();
  const out = [];
  for (const { entry } of scored) {
    if (seen.has(entry.id)) continue;
    seen.add(entry.id);
    out.push(entry);
    if (out.length >= limit) break;
  }
  return out;
}

const PANEL_LEARNING_TIER = {
  family: {
    dcloudLimit: 1,
    skillsLimit: 1,
    partnerLimit: 1,
    starter: true,
    dcloudHint: "Recommended starting point for this family — open a product below for SKU-specific labs.",
    skillsHint: "Foundational course for this portfolio area.",
    dcloudNote: "Open a product in this family for hands-on labs matched to that device or platform."
  },
  product: {
    dcloudLimit: 4,
    skillsLimit: 2,
    partnerLimit: 1,
    starter: false,
    dcloudHint: null,
    skillsHint: null,
    dcloudNote: null
  }
};

function panelLearningTier(kind){
  return kind === "product" ? PANEL_LEARNING_TIER.product : PANEL_LEARNING_TIER.family;
}

function dcloudLinksFor({ familyId, productId, kind = "node", limit } = {}){
  const product = productId ? prodById[productId] : null;
  const fam = familyId || product?.family;
  const tier = panelLearningTier(kind);
  return dcloudRankEntries({
    familyIds: fam ? [fam] : [],
    productIds: productId ? [productId] : [],
    limit: limit ?? tier.dcloudLimit,
    requireProductOrFamily: true
  });
}

function learningNormalizeEntry(e){
  if (!e) return e;
  if (!e.relatedFamilies?.length) e.relatedFamilies = e.families ? [...e.families] : [];
  return e;
}

async function loadLearningLinks(){
  const apply = (data) => {
    LEARNING_ENTRIES = (Array.isArray(data) ? data : (data.entries || [])).map(learningNormalizeEntry);
    Object.assign(LEARNING_DEFAULTS, data.defaults || {});
    Object.assign(LEARNING_SOURCES, data.sources || {});
  };
  try {
    const res = await fetch("learning-links.json", { cache: "no-cache" });
    if (res.ok) {
      apply(await res.json());
      return;
    }
  } catch (_) { /* file:// or offline */ }
  if (typeof window.__LEARNING_BOOT !== "undefined" && window.__LEARNING_BOOT) {
    apply(window.__LEARNING_BOOT);
    try { delete window.__LEARNING_BOOT; } catch (_) {}
  }
}

function learningEntryById(id){
  return LEARNING_ENTRIES.find(e => e.id === id);
}

function learningSourceContextBonus(e, ctx){
  const collab = (ctx.familyIds || []).some(f => COLLAB_LEARNING_FAMILIES.has(f));
  if (collab && e.source === "webex-academy") return 14;
  if (!collab && e.source === "cisco-u") return 6;
  return 0;
}

function learningRankEntries({ familyIds = [], productIds = [], sources = [], limit = 2, requireProductOrFamily = true } = {}){
  if (!LEARNING_ENTRIES.length) return [];
  const sourceSet = sources.length ? new Set(sources) : null;
  const connected = dcloudConnectedFamilyIds(familyIds);
  const ctx = { familyIds, productIds, connected, connectedBonus: true };
  const scored = LEARNING_ENTRIES.map(e => {
    if (sourceSet && !sourceSet.has(e.source)) return null;
    const productSpecific = (e.products?.length ?? 0) > 0;
    const familyHit = familyIds.some(f => e.families?.includes(f));
    const productHit = productIds.some(p => e.products?.includes(p));
    if (productSpecific){
      if (!productHit && !familyHit) return null;
    } else if (requireProductOrFamily && !familyHit && !productHit) {
      return null;
    }
    const score = learningScoreEntry(e, ctx) + learningSourceContextBonus(e, ctx);
    return { entry: e, score };
  }).filter(Boolean);
  scored.sort((a, b) => {
    if (b.score !== a.score) return b.score - a.score;
    if (b.entry.primary !== a.entry.primary) return (b.entry.primary ? 1 : 0) - (a.entry.primary ? 1 : 0);
    const bSpec = (b.entry.products?.length || 99) + (b.entry.families?.length || 99);
    const aSpec = (a.entry.products?.length || 99) + (a.entry.families?.length || 99);
    if (aSpec !== bSpec) return aSpec - bSpec;
    return (a.entry.linkLabel || a.entry.name).localeCompare(b.entry.linkLabel || b.entry.name);
  });
  const seen = new Set();
  const out = [];
  for (const { entry } of scored) {
    if (seen.has(entry.id)) continue;
    seen.add(entry.id);
    out.push(entry);
    if (out.length >= limit) break;
  }
  return out;
}

function learningLinksFor({ familyId, productId, kind = "node" } = {}){
  const product = productId ? prodById[productId] : null;
  const fam = familyId || product?.family;
  const familyIds = fam ? [fam] : [];
  const productIds = productId ? [productId] : [];
  const tier = panelLearningTier(kind);
  return {
    skills: learningRankEntries({
      familyIds, productIds, sources: SKILLS_SOURCES, limit: tier.skillsLimit, requireProductOrFamily: true
    }),
    partner: learningRankEntries({
      familyIds, productIds, sources: PARTNER_SOURCES, limit: tier.partnerLimit, requireProductOrFamily: true
    })
  };
}

function learningSourceMeta(source){
  return LEARNING_SOURCES[source] || { label: source || "Learn", cta: "Open ↗" };
}

function learningEntryChipClass(source){
  if (source === "cisco-u") return "p-learn-chip--cu";
  if (source === "webex-academy") return "p-learn-chip--wa";
  if (source === "blackbelt") return "p-learn-chip--bb";
  return "";
}

function learningEntryMetaHtml(e){

  chips.push({ label: src.label, cls: learningEntryChipClass(e.source) });
  if (e.format === "learning-path") chips.push({ label: "Learning path", cls: "" });
  if (e.duration) chips.push({ label: e.duration, cls: "" });
  if (e.level) chips.push({ label: e.level, cls: "" });
  if (!chips.length) return "";
  return `<div class="p-learn-meta-row">${chips.map(c =>
    `<span class="p-learn-chip${c.cls ? " " + c.cls : ""}">${escapeHtml(c.label)}</span>`

}

function learningEntryActionsHtml(e){

function renderLearningEntry(e){

function renderLearningSectionBody(entries, opts = {}){

  const title = opts.title || LEARNING_DEFAULTS.skillsTitle;

  return `${`<div class="p-learn-header">
      <span class="p-learn-title">${escapeHtml(title)}</span>

    </div>

    <div class="p-learn-entries">${entriesHtml}</div>`}${note ? `<div class="p-learn-note">${escapeHtml(note)}</div>` : ""}`;

function insertLearningSections(id, kind){
  const pb = $("#pbody");
  if (!pb) return;
  pb.querySelectorAll(".p-learn").forEach(el => el.remove());
  if (!LEARNING_ENTRIES.length) return;

  const product = kind === "product" ? prodById[id] : null;
  const familyId = kind === "product" ? product?.family : id;
  const tier = panelLearningTier(kind);
  const { skills, partner } = learningLinksFor(
    kind === "product" ? { productId: id, familyId, kind: "product" } : { familyId: id, kind: "node" }
  );
  if (!skills.length && !partner.length) return;

  const anchor = pb.querySelector(".p-dcloud") || pb.querySelector(".p-matrix-link") ||
    pb.querySelector(".p-desc") || pb.querySelector(".add-stack-btn");

  const insertAfter = (el, node) => {
    if (el) el.insertAdjacentElement("afterend", node);
    else pb.appendChild(node);
  };

  const skillsHint = tier.skillsHint || LEARNING_DEFAULTS.skillsHint;
  let last = anchor;
  if (skills.length){
    const sec = document.createElement("div");
    sec.className = "p-sec p-learn p-learn-skills" + (tier.starter ? " p-learn--starter" : "");
    sec.innerHTML = `<div class="p-learn-card">${renderLearningSectionBody(skills, {
      title: LEARNING_DEFAULTS.skillsTitle,
      hint: skillsHint,
      note: LEARNING_DEFAULTS.skillsNote,
      badge: tier.starter ? "Overview" : "Self-paced"
    })}</div>`;
    insertAfter(last, sec);
    last = sec;
  }
  if (partner.length){
    const sec = document.createElement("div");
    sec.className = "p-sec p-learn p-learn-partner" + (tier.starter ? " p-learn--starter" : "");
    sec.innerHTML = `<div class="p-learn-card">${renderLearningSectionBody(partner, {
      title: LEARNING_DEFAULTS.partnerTitle,
      hint: LEARNING_DEFAULTS.partnerHint,
      note: LEARNING_DEFAULTS.partnerNote,
      badge: "Partner"
    })}</div>`;
    insertAfter(last, sec);
  }
}

function dcloudEcosystemLabs(familyId, limit = 2){
  if (!familyId) return [];
  const connected = dcloudConnectedFamilyIds([familyId]).filter(f => f !== familyId);
  return dcloudRankEntries({
    familyIds: connected,
    limit,
    requireProductOrFamily: true,
    connectedBonus: false
  });
}

function dcloudPathForUseCase(useCase){
  if (!useCase) return null;
  return DCLOUD_PATHS.find(p => p.useCase === useCase) || null;
}

function dcloudPathEntries(path){
  if (!path?.steps?.length) return [];
  return path.steps.map(id => dcloudEntryById(id)).filter(Boolean);
}

function dcloudRefArchLab(useCase){
  const path = dcloudPathForUseCase(useCase);
  if (path) return dcloudPathEntries(path)[0] || null;
  return dcloudRankEntries({ useCases: [useCase], limit: 1 })[0] || null;
}

function dcloudStackContext(){
  const familyIds = new Set();
  const productIds = [];
  stack.forEach(id => {
    const p = prodById[id];
    if (p) {
      productIds.push(id);
      if (p.family) familyIds.add(p.family);
    } else if (nodeById[id]) familyIds.add(id);
  });
  return { familyIds: [...familyIds], productIds };
}

function dcloudWizardFamilies(){
  const families = new Set();
  wizardState.domains.forEach(domId => {
    WIZARD_DOMAINS.find(d => d.id === domId)?.families?.forEach(f => families.add(f));
  });
  return [...families];
}

function dcloudWizardUseCases(){
  const ucs = new Set();
  wizardState.domains.forEach(id => (WIZARD_DOMAIN_USECASES[id] || []).forEach(u => ucs.add(u)));
  return [...ucs];
}

function dcloudEntryExportRow(e){
  return {
    id: e.id,
    label: e.linkLabel || e.name,
    name: e.name,
    hint: e.hint || "",
    catalogUrl: e.catalogUrl || e.instantUrl || "",
    instantUrl: e.instantUrl || e.catalogUrl || "",
    datacenter: e.datacenter || "RTP",
    duration: e.duration || "",
    level: e.level || "",
    demoType: e.demoType || "",
    learningObjectives: e.learningObjectives || []
  };
}

function dcloudPlanRecommendations(limit = 5){
  const stackCtx = dcloudStackContext();
  const wizardFamilies = (typeof wizardState !== "undefined" && wizardState?.domains?.length)
    ? dcloudWizardFamilies() : [];
  const useCases = (typeof wizardState !== "undefined" && wizardState?.domains?.length)
    ? dcloudWizardUseCases() : [];
  const ucSet = new Set(useCases);
  const ucFilter = $("#ucs")?.value;
  if (ucFilter) ucSet.add(ucFilter);
  const familyIds = [...new Set([...stackCtx.familyIds, ...wizardFamilies])];
  return dcloudRankEntries({
    familyIds,
    productIds: stackCtx.productIds,
    useCases: [...ucSet],
    limit
  }).map(dcloudEntryExportRow);
}

function dcloudGuidedRecommendations(limit = 5){
  return dcloudPlanRecommendations(limit);
}

function dcloudEntryActionsHtml(e){

    <span class="la-dcloud-meta">${instantLabel}</span>
  </a>`;

function dcloudPanelProgressHtml(entries){
  if (entries.length < 2) return "";
  const done = dcloudLabsDoneSet();
  const covered = entries.filter(e => done.has(e.id)).length;
  return `<div class="p-dcloud-progress" data-dcloud-progress><strong>${covered}</strong> of ${entries.length} labs complete</div>`;
}

function renderDcloudPanelEntry(e, opts = {}){
  const isDone = !opts.starter && dcloudLabsDoneSet().has(e.id);
  const objectiveMax = opts.objectiveMax ?? 1;
  const headInner = opts.starter
    ? `<div class="p-dcloud-entry-title">${escapeHtml(e.linkLabel || e.name)}</div>`
    : `<input type="checkbox" class="p-dcloud-done" data-lab-id="${escapeHtml(e.id)}" ${isDone ? "checked" : ""} aria-label="Mark lab complete"/>
      <div class="p-dcloud-entry-title">${escapeHtml(e.linkLabel || e.name)}</div>`;
  return `<div class="p-dcloud-entry${opts.primary ? " is-primary" : ""}${opts.starter ? " p-dcloud-entry--starter" : ""}${isDone ? " is-done" : ""}" data-lab-id="${escapeHtml(e.id)}">
    <div class="p-dcloud-entry-head">${headInner}</div>
    ${dcloudEntryMetaHtml(e, opts)}
    ${dcloudEntryObjectivesHtml(e, objectiveMax)}
    <div class="p-dcloud-entry-actions">${dcloudEntryActionsHtml(e)}</div>
  </div>`;
}

function renderDcloudPanelEntries(entries, opts = {}){
  if (!entries.length) return "";
  const primary = entries[0];
  const rest = opts.starter ? [] : entries.slice(1);
  let html = opts.starter ? "" : dcloudPanelProgressHtml(entries);
  html += renderDcloudPanelEntry(primary, { ...opts, bestMatch: true, primary: true, objectiveMax: 1 });
  if (rest.length){
    html += `<div class="p-dcloud-more" hidden>${rest.map(e => renderDcloudPanelEntry(e, { ...opts, objectiveMax: 1 })).join("")}</div>`;
    html += `<button type="button" class="p-dcloud-toggle" aria-expanded="false">+ ${rest.length} more lab${rest.length > 1 ? "s" : ""}</button>`;
  }
  if (opts.browseLabel){
    html += `<button type="button" class="p-dcloud-browse-all" data-dcloud-browse="1">Browse all labs for ${escapeHtml(opts.browseLabel)}</button>`;
  }
  if (opts.starterNote){
    html += `<div class="p-dcloud-starter-note">${escapeHtml(opts.starterNote)}</div>`;
  }
  return html;
}

function updateDcloudPanelProgress(sec, entries){
  const el = sec.querySelector("[data-dcloud-progress]");
  if (!el || !entries?.length) return;
  const done = dcloudLabsDoneSet();
  const covered = entries.filter(e => done.has(e.id)).length;
  el.innerHTML = `<strong>${covered}</strong> of ${entries.length} labs complete`;
}

function wireDcloudPanelSection(sec, entries, browseQuery){
  sec.querySelector(".p-dcloud-toggle")?.addEventListener("click", function(){
    const more = sec.querySelector(".p-dcloud-more");
    if (!more) return;
    const open = more.hasAttribute("hidden");
    if (open){
      more.removeAttribute("hidden");
      this.setAttribute("aria-expanded", "true");
      this.textContent = "Show fewer labs";
    } else {
      more.setAttribute("hidden", "");
      this.setAttribute("aria-expanded", "false");
      const n = entries.length - 1;
      this.textContent = `+ ${n} more lab${n > 1 ? "s" : ""}`;
    }
  });
  sec.querySelector("[data-dcloud-browse]")?.addEventListener("click", () => {
    openDcloudBrowser({ query: browseQuery || "" });
  });
  sec.querySelectorAll(".p-dcloud-done").forEach(cb => {
    cb.addEventListener("change", () => {
      const id = cb.dataset.labId;
      if (!id) return;
      dcloudMarkLabDone(id, cb.checked);
      cb.closest(".p-dcloud-entry")?.classList.toggle("is-done", cb.checked);
      updateDcloudPanelProgress(sec, entries);
    });
  });
  sec.querySelectorAll("[data-dcloud-id]").forEach(a => {
    a.addEventListener("click", () => {
      const id = a.dataset.dcloudId;
      if (!id) return;
      dcloudMarkLabDone(id, true);
      const entry = a.closest(".p-dcloud-entry");
      entry?.classList.add("is-done");
      const cb = entry?.querySelector(".p-dcloud-done");
      if (cb) cb.checked = true;
      updateDcloudPanelProgress(sec, entries);
    });
  });
}

function renderDcloudEntryBlock(e, opts = {}){
  const compact = !!opts.compact;
  return `<div class="p-dcloud-entry">
    ${compact ? "" : dcloudEntryMetaHtml(e, opts)}
    ${dcloudEntryObjectivesHtml(e, compact ? 1 : 3)}
    <div class="p-dcloud-entry-actions">${dcloudEntryActionsHtml(e)}</div>
    ${e.hint && compact ? `<div class="p-dcloud-entry-hint">${escapeHtml(e.hint)}</div>` : ""}
  </div>`;
}

function renderDcloudSectionBody(entries, opts = {}){
  if (!entries.length) return "";
  const hint = opts.sectionHint ?? DCLOUD_DEFAULTS.sectionHint;
  const loginNote = opts.loginNote ?? DCLOUD_DEFAULTS.loginNote;
  const compact = !!opts.compact;
  const panel = !!opts.panel;
  const starter = !!opts.starter;
  const links = panel
    ? renderDcloudPanelEntries(entries, opts)
    : entries.map(e => renderDcloudEntryBlock(e, opts)).join("");
  const eco = opts.ecosystemNote ? `<div class="p-dcloud-eco">${escapeHtml(opts.ecosystemNote)}</div>` : "";
  return `${dcloudHeaderHtml(compact && !panel, opts)}
    ${compact && !panel ? `<div class="gw-dcloud-title">Hands-on labs for this plan</div>` : `<div class="p-dcloud-tagline">${escapeHtml(DCLOUD_DEFAULTS.sectionTitle)}</div>`}
    ${compact || panel ? "" : `<div class="p-dcloud-hint">${escapeHtml(hint)}</div>`}
    ${panel ? `<div class="p-dcloud-hint p-dcloud-hint--panel">${escapeHtml(hint)}</div>` : ""}
    ${eco}
    <div class="lb la-dcloud-list">${links}</div>
    ${loginNote && !starter ? `<div class="p-dcloud-note">${escapeHtml(loginNote)}</div>` : ""}`;
}

function dcloudGuidedRecommendationsHtml(){
  const entries = dcloudGuidedRecommendations(5);
  if (!entries.length) return "";
  const raw = entries.map(r => dcloudEntryById(r.id) || r);
  return `<div class="gw-dcloud-section">${renderDcloudSectionBody(raw, { compact: true })}</div>`;

function insertDcloudLinks(id, kind){
  const pb = $("#pbody"); if (!pb || pb.querySelector(".p-dcloud")) return;
  const product = kind === "product" ? prodById[id] : null;
  const familyId = kind === "product" ? product?.family : id;
  const tier = panelLearningTier(kind);
  const entries = dcloudLinksFor(
    kind === "product"
      ? { productId: id, familyId, kind: "product" }
      : { familyId: id, kind: "node" }
  );
  if (entries.length){
    const browseLabel = (kind === "product" ? product?.name : nodeById[id]?.name) ||
      nodeById[familyId]?.name || "this family";
    const browseQuery = nodeById[familyId]?.name || browseLabel;
    const panelOpts = {
      panel: true,
      browseLabel,
      browseQuery,
      starter: tier.starter,
      sectionHint: tier.dcloudHint || DCLOUD_DEFAULTS.sectionHint,
      starterNote: tier.dcloudNote || ""
    };

    const sec = document.createElement("div");
    sec.className = "p-sec p-dcloud" + (tier.starter ? " p-dcloud--starter" : "");
    sec.innerHTML = `<div class="p-dcloud-card">${renderDcloudSectionBody(entries, panelOpts)}</div>`;

    wireDcloudPanelSection(sec, entries, browseQuery);

    const matrix = pb.querySelector(".p-matrix-link");
    if (matrix){ matrix.insertAdjacentElement("afterend", sec); }
    else {
      const desc = pb.querySelector(".p-desc");
      if (desc){ desc.insertAdjacentElement("afterend", sec); }
      else {
        const anchor = pb.querySelector(".add-stack-btn");
        if (anchor) pb.insertBefore(sec, anchor);
        else pb.appendChild(sec);
      }
    }
  }
  insertLearningSections(id, kind);
}

function refreshDcloudPanelIfOpen(){
  const pb = $("#pbody");
  const panel = $("#panel");
  if (!pb || !panel?.classList.contains("open") || !pb.dataset.lastId) return;
  pb.querySelector(".p-dcloud")?.remove();
  pb.querySelectorAll(".p-learn").forEach(el => el.remove());
  insertDcloudLinks(pb.dataset.lastId, pb.dataset.lastKind || "node");
}

function parseHexColor(hex){
  const h = String(hex || "#64748b").replace("#", "");
  const full = h.length === 3 ? h.split("").map(c => c + c).join("") : h.slice(0, 6);
  return {
    r: parseInt(full.slice(0, 2), 16) || 100,
    g: parseInt(full.slice(2, 4), 16) || 116,
    b: parseInt(full.slice(4, 6), 16) || 139,
  };
}
function mixChannel(c, w, pct){
  return Math.round(c * pct / 100 + w * (100 - pct) / 100);
}
function heroCategoryGradient(hex){
  const { r, g, b } = parseHexColor(hex);
  const top = `${mixChannel(r, 255, 6)}, ${mixChannel(g, 255, 6)}, ${mixChannel(b, 255, 6)}`;
  const bot = `${mixChannel(r, 248, 4)}, ${mixChannel(g, 248, 4)}, ${mixChannel(b, 249, 4)}`;
  return `linear-gradient(165deg, rgb(${top}) 0%, rgb(${bot}) 100%)`;
}

/* ════════════════════════════════════════════════════════════════════════
   [09] COMPARE MODE

   Compare uses its own queue (STORAGE_KEYS.compare), separate from ★ Pin.
   Show in Compare adds/promotes items in that list (up to COMPARE_LIMIT).
   Pin only affects Recent / Pinned — not the compare queue.
   ════════════════════════════════════════════════════════════════════════*/
const COMPARE_LIMIT = 4;

function isValidCompareId(id){
  return !!(nodeById[id] || prodById[id]);
}

function getCompareList(){
  return lsGet(STORAGE_KEYS.compare, []).filter(isValidCompareId);
}

function setCompareList(list){
  lsSet(STORAGE_KEYS.compare, list.filter(isValidCompareId).slice(0, COMPARE_LIMIT));
}

function compareItems(){
  return getCompareList();
}

function addToCompare(id){
  if (!isValidCompareId(id)) return;
  const prev = getCompareList();
  const had = prev.includes(id);
  const list = [id, ...prev.filter(x => x !== id)].slice(0, COMPARE_LIMIT);
  setCompareList(list);
  renderCompare();
  openComparePanel();
  refreshDetailPinButtons(id);
  if (!had) showToast(`Added to Compare (${list.length}/${COMPARE_LIMIT})`);
  else if (prev.indexOf(id) > 0) showToast("Moved to front of Compare list");
  else showToast("Shown in Compare");
}

function removeFromCompare(id){
  setCompareList(getCompareList().filter(x => x !== id));
  renderCompare();
  refreshDetailPinButtons(id);
  if (!compareItems().length) closeCompare();
}

function clearCompareList(){
  setCompareList([]);
  renderCompare();
  closeCompare();
}
function openComparePanel(){
  const cmp = $("#cmp-panel"); if (!cmp) return;
  cmp.classList.add("open");
  document.body.classList.add("cmp-open");
}
function closeCompare(){
  const cmp = $("#cmp-panel"); if (cmp) cmp.classList.remove("open");
  document.body.classList.remove("cmp-open");
  // Compare list persists while the panel is hidden.
}
function buildComparePanel(){
  const p = document.createElement("div");
  p.id = "cmp-panel";
  p.innerHTML = `
    <div id="cmp-head">
      <div>
        <div class="ph-t">Compare</div>
        <div class="ph-s" style="font-size:11px;color:var(--muted)"><strong>Show in Compare</strong> builds a separate list (up to ${COMPARE_LIMIT}) — independent of ★ Pin. Click × on a chip or column to remove.</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <button id="cmp-clear" type="button" title="Clear compare list">Clear</button>
        <button id="cmp-x" title="Hide compare panel">×</button>
      </div>
    </div>
    <div id="cmp-body"></div>
  `;
  document.body.appendChild(p);
  $("#cmp-x").addEventListener("click", closeCompare);
  $("#cmp-clear").addEventListener("click", clearCompareList);
  renderCompare();
}
function renderCompareColumn(id){

  return `<div class="cmp-col">

    <div style="font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.5">${escapeHtml(it.desc || nodeById[it.family]?.desc || "")}</div>
    <div class="cmp-row"><span class="cmp-rk">Kind</span><span class="cmp-rv">${isP?"Specific Product":"Family"}</span></div>

    <div class="cmp-row"><span class="cmp-rk">Status</span><span class="cmp-rv">${(it.status||"current").toUpperCase()}</span></div>
    ${tier?`<div class="cmp-row"><span class="cmp-rk">Tier</span><span class="cmp-rv">${escapeHtml(tier.tier)}</span></div>`:""}
    ${tier?`<div class="cmp-row"><span class="cmp-rk">Model</span><span class="cmp-rv">${escapeHtml(tier.model)}</span></div>`:""}
    ${!isP?`<div class="cmp-row"><span class="cmp-rk">Connections</span><span class="cmp-rv">${rels}</span></div>`:""}
    ${!isP?`<div class="cmp-row"><span class="cmp-rk">Use cases</span><span class="cmp-rv">${(it.useCases||[]).slice(0,3).join(", ")}${(it.useCases||[]).length>3?"…":""}</span></div>`:""}
    ${it.eosDate?`<div class="cmp-row"><span class="cmp-rk">EOS date</span><span class="cmp-rv">${it.eosDate}</span></div>`:""}
    ${it.eolDate?`<div class="cmp-row"><span class="cmp-rk">EOL date</span><span class="cmp-rv">${it.eolDate}</span></div>`:""}

    <div style="margin-top:10px;display:flex;gap:5px">

      <button class="rc-btn" onclick="window.addToStack('${id}','${isP?"product":"node"}')">+ Stack</button>
    </div>

function renderCompare(){
  const body = $("#cmp-body"); if (!body) return;
  const items = compareItems();
  if (!items.length){
    body.innerHTML = `<div id="cmp-empty">Compare list is empty. Click <strong>⇆ Show in Compare</strong> on any detail panel to add items here (up to ${COMPARE_LIMIT}). ★ Pin saves favorites separately.</div>`;
    return;
  }
  const chips = items.map(id => {
    const it = nodeById[id] || prodById[id];
    if (!it) return "";
    const c = catOf(id);
    return `<button class="cmp-chip" type="button" data-r="${id}" title="Remove from compare">
      <span class="cmp-chip-dot" style="background:${c && CATS[c] ? CATS[c].color : "#666"}"></span>
      <span>${escapeHtml(it.name)}</span>
      <span class="cmp-chip-x">×</span>
    </button>`;
  }).join("");
  const cols = items.map(renderCompareColumn).filter(Boolean).join("");
  body.innerHTML = `
    <div class="cmp-layout">
      <div class="cmp-chips-wrap">
        <div class="cmp-chips-lbl">Compare list (${items.length}/${COMPARE_LIMIT})</div>
        <div class="cmp-chips">${chips}</div>
      </div>
      <div class="cmp-cols">${cols || `<div id="cmp-empty">Could not render compare columns.</div>`}</div>
    </div>`;
  body.querySelectorAll("[data-r]").forEach(b => b.addEventListener("click", ev => {
    ev.stopPropagation();
    removeFromCompare(b.dataset.r);
  }));
}
